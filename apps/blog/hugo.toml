    [languages.zh-cn.params.sidebar]
      subtitle = "你的文件管理守护神"
  [languages.ja]
    languageName = "日本語"
    title = "Keeply ブログ"
    weight = 4
    contentDir = "content/ja"
    [languages.ja.params]
      description = "Keeply ブログ — デザイナー・建築士・士業向けのファイルバージョン管理と復元の実践ガイド。Word / Excel / OneDrive / SharePoint のバージョン履歴の落とし穴、Time Machine vs Dropbox の使い分けまで解説。"
    [languages.ja.params.sidebar]
      subtitle = "ファイル管理の守り神"
  [languages.ko]
    languageName = "한국어"
    title = "Keeply 블로그"
    weight = 5
    contentDir = "content/ko"
    [languages.ko.params]
      description = "Keeply 블로그 — 디자이너 · 건축사 · 변호사 · 회계사를 위한 파일 버전 관리와 복구 가이드. Word / Excel / OneDrive / SharePoint 버전 기록의 한계, Time Machine vs Dropbox 비교까지 한 번에 정리합니다."
  [languages.it]
    languageName = "Italiano"
    title = "Keeply Blog"
    weight = 6
    contentDir = "content/it"
    [languages.it.params]
      description = "Keeply Blog — il tuo guardiano della gestione file. Appunti sul campo su cronologia versioni, recupero file e le tattiche per non perdere mai una versione."
  # de re-added 2026-05-22 (R1 SELECTIVE reversal): NOT the blanket MT R1 removed.
  # Country-specific concentrated publishing — native-written, keyword-targeted
  # German articles for the DE market (excel-nicht-gespeicherte-datei-... pilot,
  # 720 vol). Only hand-crafted /de/ pages live here; no blanket auto-translate.
  # NOTE: the CF Bulk Redirect /de/* → /en/* (subpath_matching) must carve a
  # path exception for each shipped /de/ slug, or the page 301s away. See
  # _dev/seo/SEO operational decision.md + project memory (multi-country decision).
  [languages.de]
    languageName = "Deutsch"
    title = "Keeply Blog"
    weight = 7
    contentDir = "content/de"
    [languages.de.params]
      description = "Keeply Blog — Ihr Wächter für die Dateiverwaltung. Praxisnahe Notizen zu Versionsverlauf, Dateiwiederherstellung und wie Sie nie wieder eine Version verlieren."
  # es re-added 2026-05-22 (R1 SELECTIVE reversal, same as de): native-written,
  # keyword-targeted ES-market pilot (recuperar-archivo-excel-no-guardado, 390 vol).
  # Only hand-crafted /es/ pages; NOT blanket auto-translate. CF Bulk Redirect
  # /es/* → /en/* needs a per-path exception per shipped /es/ slug (subpath off).
  [languages.es]
    languageName = "Español"
    title = "Keeply Blog"
    weight = 8
    contentDir = "content/es"
    [languages.es.params]
      description = "Keeply Blog — tu guardián de la gestión de archivos. Notas de campo sobre historial de versiones, recuperación de archivos y cómo no perder nunca una versión."
  # pt-br re-added 2026-05-22 (R1 SELECTIVE reversal, same as de/es): native-written,
  # keyword-targeted BR-market pilot (recuperar-documento-word-nao-salvo, 720 vol).
  # LANG KEY IS "pt-br" not "pt": the theme ships pt-br.toml + pt-pt.toml i18n, and
  # go-i18n's matcher fails to bind project i18n for the bare base "pt" when regional
  # variants exist (it falls back to en → English chrome on an otherwise pt-BR page).
  # "pt-br" matches the theme's pt-br.toml cleanly (full native chrome). URL = /pt-br/
  # (region-explicit, fine for Brazil). Unlike /de/ /es/, /pt-br/ is NOT in the CF
  # bulk redirect (only "pt" was) → it serves 200 directly, no CF exception needed.
  [languages.pt-br]
    languageName = "Português"
    title = "Keeply Blog"
    weight = 9
    contentDir = "content/pt-br"
    [languages.pt-br.params]
      description = "Keeply Blog — o seu guardião da gestão de arquivos. Notas de campo sobre histórico de versões, recuperação de arquivos e como nunca mais perder uma versão."
  # pl re-added 2026-05-23 (R1 SELECTIVE reversal, same as de/es/pt-br): native-written,
  # keyword-targeted PL-market pilot (odzyskac-niezapisany-dokument-word, 590 vol Word recovery).
  # Only hand-crafted /pl/ pages live here; the 8 R1-MT leftovers in content/pl/ were deleted.
  # LANG KEY IS "pl" (theme ships pl.toml, binds cleanly — no pt→pt-br shadowing). URL = /pl/.
  # /pl/* IS in the CF bulk redirect (subpath → /en/), so the pilot slug needs a CF exception:
  # subpath OFF on the /pl/ entry + per-old-slug 301s for the 8 deleted MT articles.
  [languages.pl]
    languageName = "Polski"
    title = "Keeply Blog"
    weight = 10
    contentDir = "content/pl"
    [languages.pl.params]
      description = "Keeply Blog — Twój strażnik zarządzania plikami. Notatki z praktyki o historii wersji, odzyskiwaniu plików i o tym, jak nigdy nie stracić wersji."
  # R1 (2026-05-18 GSC audit): 11 zero-click auto-translate locales removed
  # from build entirely. Evidence: 90-day GSC data showed only pt + es had any
  # clicks (1 each); de/fr/ru/nl/pl/tr/vi/th/id/ar/hi all 0 clicks. All 11
  # redirect to /en/ via CF Bulk Redirect subpath_matching.
  # 2026-05-18 follow-up: pt + es 也砍 (Q3 高階模型 verdict 75% confidence).
  # Reason: 1 click/90d 屬 noise floor; Mueller 2024 仍標 unreviewed MT 為
  # quality risk; same-slug 301 to /en/ 保留 link equity 零成本. See
  # _dev/seo/SEO operational decision.md Q3 evidence notes.

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Keeply 主站"
    url = "https://keeply.work"
    weight = -100
