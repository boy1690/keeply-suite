{{- /* Keeply logo — 與 keeply-website 一致。參數：size ("nav" | "footer" | "hero") */ -}}
{{- $size := . | default "nav" -}}
{{- $class := "w-9 h-9" -}}
{{- if eq $size "footer" -}}{{- $class = "w-7 h-7" -}}{{- end -}}
{{- if eq $size "hero" -}}{{- $class = "w-14 h-14" -}}{{- end -}}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" class="{{ $class }}">
  <defs>
    <linearGradient id="ring-{{ $size }}" x1="80" y1="404" x2="434" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="amber-{{ $size }}" x1="115" y1="171" x2="270" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/><stop offset="1" stop-color="#FFB300"/>
    </linearGradient>
    <linearGradient id="doc-front-{{ $size }}" x1="166" y1="164" x2="308" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5D54F6"/><stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="doc-back-{{ $size }}" x1="208" y1="160" x2="364" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9C98FF"/><stop offset="1" stop-color="#6F6AF0"/>
    </linearGradient>
  </defs>
  <g>
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#ring-{{ $size }})" stroke-width="44" stroke-linecap="round"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#amber-{{ $size }})" stroke-width="44" stroke-linecap="round"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#amber-{{ $size }})"/>
    <rect x="220" y="150" width="152" height="206" rx="32" fill="url(#doc-back-{{ $size }})" opacity="0.48"/>
    <rect x="192" y="167" width="152" height="206" rx="32" fill="url(#doc-back-{{ $size }})" opacity="0.72"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#doc-front-{{ $size }})"/>
    <path d="M250 184H316V247L250 184Z" fill="#BDBAFF" opacity="0.95"/>
  </g>
</svg>
