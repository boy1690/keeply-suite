name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Daily rebuild at 01:00 UTC = 09:00 Asia/Taipei.
    # Hugo skips posts whose `date` is in the future, so a post with
    # `date: 2026-05-12T09:00:00+08:00` first appears in the build that
    # runs on/after that timestamp — i.e. native scheduled publishing.
    - cron: "0 1 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
      # Force Node 24 runtime for javascript actions (deprecation notice 2026-09-16).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Tailwind
        run: npm ci
      - name: Build Tailwind CSS
        run: npm run css:build
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://blog.keeply.work/"
      - name: Build Pagefind search index
        run: npx --yes pagefind@latest --site public
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # IndexNow: notify Bing / Yandex / others when posts go live.
  # Runs on the daily cron (catches scheduled-publish posts the moment Hugo
  # starts rendering them) and on manual workflow_dispatch. Skipped on raw
  # `push` because most pushes are code/style and would just spam the API;
  # use workflow_dispatch to force a re-ping after a content edit.
  indexnow:
    needs: deploy
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages CDN propagation
        run: sleep 30
      - name: Collect post URLs from live sitemap
        id: collect
        run: |
          set -euo pipefail
          SUBMAPS=$(curl -fsS "https://blog.keeply.work/sitemap.xml" \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed -e 's|<loc>||' -e 's|</loc>||')
          URLS=""
          while IFS= read -r submap; do
            [ -z "$submap" ] && continue
            posts=$(curl -fsS "$submap" \
              | grep -oE '<loc>[^<]+/post/[^<]+</loc>' \
              | sed -e 's|<loc>||' -e 's|</loc>||' || true)
            URLS+="$posts"$'\n'
          done <<< "$SUBMAPS"
          URLS=$(echo "$URLS" | sort -u | grep -v '^$' || true)
          if [ -z "$URLS" ]; then
            echo "No post URLs found; nothing to submit"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(echo "$URLS" | wc -l)
          echo "Will submit $COUNT URL(s):"
          echo "$URLS"
          URL_JSON=$(echo "$URLS" | jq -R . | jq -s .)
          jq -n \
            --arg host "blog.keeply.work" \
            --arg key "ae904ebe06616630b93d07cff2d64afb" \
            --arg keyLocation "https://blog.keeply.work/ae904ebe06616630b93d07cff2d64afb.txt" \
            --argjson urlList "$URL_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}' \
            > payload.json
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
      - name: POST to IndexNow API
        if: steps.collect.outputs.skip != 'true'
        run: |
          echo "Submitting ${{ steps.collect.outputs.count }} URL(s) to IndexNow"
          HTTP_CODE=$(curl -sS -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data-binary @payload.json \
            -o response.txt \
            -w '%{http_code}')
          echo "HTTP $HTTP_CODE"
          cat response.txt || true
          # IndexNow returns 200 (success), 202 (accepted), or 400/422 (bad).
          # Treat 200/202 as success; everything else fails the job.
          case "$HTTP_CODE" in
            200|202) echo "IndexNow submission OK" ;;
            *) echo "IndexNow submission failed"; exit 1 ;;
          esac
