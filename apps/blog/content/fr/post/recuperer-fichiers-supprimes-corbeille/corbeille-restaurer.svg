<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, system-ui, sans-serif">
  <!-- host-app illustration: Corbeille Windows avec Restaurer — recuperer-fichiers-supprimes-corbeille (fr) -->
  <rect x="0" y="0" width="640" height="400" rx="8" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>

  <!-- window title bar -->
  <rect x="0" y="0" width="640" height="36" rx="8" fill="#F3F2F1"/>
  <rect x="0" y="18" width="640" height="18" fill="#F3F2F1"/>
  <text x="16" y="23" font-size="12" font-weight="600" fill="#323130">🗑️  Corbeille</text>
  <text x="612" y="23" font-size="13" fill="#605E5C" text-anchor="end">—  ☐  ✕</text>

  <!-- command ribbon -->
  <rect x="0" y="36" width="640" height="34" fill="#FAF9F8"/>
  <line x1="0" y1="70" x2="640" y2="70" stroke="#EDEBE9" stroke-width="1"/>
  <rect x="14" y="44" width="120" height="18" rx="3" fill="#2B579A"/>
  <text x="74" y="57" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">↩  Restaurer</text>
  <text x="150" y="57" font-size="11" fill="#A19F9D">Restaurer tous les éléments</text>
  <text x="320" y="57" font-size="11" fill="#A19F9D">Vider la Corbeille</text>

  <!-- column headers -->
  <text x="28" y="92" font-size="11" font-weight="700" fill="#605E5C">Nom</text>
  <text x="300" y="92" font-size="11" font-weight="700" fill="#605E5C">Emplacement d'origine</text>
  <text x="540" y="92" font-size="11" font-weight="700" fill="#605E5C">Date de suppression</text>
  <line x1="16" y1="100" x2="624" y2="100" stroke="#EDEBE9" stroke-width="1"/>

  <!-- selected row -->
  <rect x="16" y="100" width="608" height="32" fill="#E6ECF6"/>
  <text x="28" y="121" font-size="12" fill="#323130">📄  Contrat_final.docx</text>
  <text x="300" y="121" font-size="11" fill="#605E5C">C:\Clients\2026\Dupont</text>
  <text x="540" y="121" font-size="11" fill="#605E5C">Aujourd'hui 14:45</text>
  <line x1="16" y1="132" x2="624" y2="132" stroke="#F3F2F1" stroke-width="1"/>

  <!-- other rows -->
  <text x="28" y="153" font-size="12" fill="#323130">📄  Anciennes_notes.docx</text>
  <text x="300" y="153" font-size="11" fill="#605E5C">C:\Clients\2026\Dupont</text>
  <text x="540" y="153" font-size="11" fill="#605E5C">Aujourd'hui 14:45</text>
  <line x1="16" y1="164" x2="624" y2="164" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="185" font-size="12" fill="#323130">🖼️  Logo_v2.png</text>
  <text x="300" y="185" font-size="11" fill="#605E5C">C:\Clients\2026\Dupont</text>
  <text x="540" y="185" font-size="11" fill="#605E5C">Aujourd'hui 14:45</text>
  <line x1="16" y1="196" x2="624" y2="196" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="217" font-size="12" fill="#323130">📊  Budget_2025.xlsx</text>
  <text x="300" y="217" font-size="11" fill="#605E5C">C:\Clients\2026\Dupont</text>
  <text x="540" y="217" font-size="11" fill="#605E5C">12/05 09:30</text>
  <line x1="16" y1="228" x2="624" y2="228" stroke="#F3F2F1" stroke-width="1"/>

  <!-- callout: right-click menu -->
  <rect x="200" y="240" width="200" height="78" rx="4" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>
  <rect x="200" y="240" width="200" height="26" fill="#E6ECF6"/>
  <text x="214" y="257" font-size="11.5" font-weight="600" fill="#2B579A">↩  Restaurer</text>
  <text x="214" y="284" font-size="11.5" fill="#323130">✂  Couper</text>
  <text x="214" y="308" font-size="11.5" fill="#323130">🗑  Supprimer</text>

  <!-- status / caption -->
  <rect x="0" y="352" width="640" height="48" fill="#EEF6EE"/>
  <line x1="0" y1="352" x2="640" y2="352" stroke="#D6EBD6" stroke-width="1"/>
  <text x="16" y="372" font-size="11.5" fill="#1E7A34">✓  Clic droit ▸ Restaurer : le fichier revient à son emplacement d'origine, pas sur le Bureau.</text>
  <text x="16" y="389" font-size="11.5" fill="#8A6D1A">⚠  Vide après un Maj + Suppr ou un fichier trop volumineux ? La Corbeille ne l'a jamais reçu.</text>
</svg>
