<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <!-- mechanism diagram: die 3 Phasen einer Datei, nachdem der Papierkorb geleert wurde — geloeschte-excel-datei-wiederherstellen (de) -->
  <rect x="0" y="0" width="640" height="320" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="24" y="34" font-size="15" font-weight="700" fill="#111827">Was mit der Datei passiert, nachdem Sie den Papierkorb geleert haben</text>

  <!-- timeline axis -->
  <line x1="40" y1="232" x2="600" y2="232" stroke="#D1D5DB" stroke-width="2"/>
  <polygon points="600,232 590,227 590,237" fill="#D1D5DB"/>
  <text x="600" y="256" font-size="11" fill="#9CA3AF" text-anchor="end">Zeit · jeder Schreibvorgang →</text>

  <!-- Stage 1: intact -->
  <rect x="40" y="70" width="160" height="120" rx="6" fill="#EAF6EE" stroke="#34A853" stroke-width="1.5"/>
  <text x="120" y="96" font-size="12.5" font-weight="700" fill="#1E7A43" text-anchor="middle">1 · Intakt</text>
  <rect x="64" y="110" width="112" height="40" rx="3" fill="#34A853"/>
  <text x="120" y="135" font-size="11" fill="#FFFFFF" text-anchor="middle">Dateidaten</text>
  <text x="120" y="170" font-size="10.5" fill="#1E7A43" text-anchor="middle">Die Daten sind noch da.</text>
  <text x="120" y="184" font-size="10.5" fill="#1E7A43" text-anchor="middle">Wiederherstellung sehr wahrscheinlich.</text>
  <line x1="120" y1="190" x2="120" y2="232" stroke="#34A853" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="120" cy="232" r="4" fill="#34A853"/>

  <!-- Stage 2: marked free -->
  <rect x="240" y="70" width="160" height="120" rx="6" fill="#FEF6E7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="320" y="96" font-size="12.5" font-weight="700" fill="#B45309" text-anchor="middle">2 · Als frei markiert</text>
  <rect x="264" y="110" width="112" height="40" rx="3" fill="#FBBF24"/>
  <text x="320" y="129" font-size="10.5" fill="#7C4A03" text-anchor="middle">„freier Speicher"</text>
  <text x="320" y="143" font-size="9.5" fill="#7C4A03" text-anchor="middle">(Daten noch vorhanden)</text>
  <text x="320" y="170" font-size="10.5" fill="#B45309" text-anchor="middle">Windows darf den Platz</text>
  <text x="320" y="184" font-size="10.5" fill="#B45309" text-anchor="middle">jederzeit neu nutzen.</text>
  <line x1="320" y1="190" x2="320" y2="232" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="320" cy="232" r="4" fill="#F59E0B"/>

  <!-- Stage 3: overwritten -->
  <rect x="440" y="70" width="160" height="120" rx="6" fill="#FBEAEA" stroke="#EA4335" stroke-width="1.5"/>
  <text x="520" y="96" font-size="12.5" font-weight="700" fill="#B42318" text-anchor="middle">3 · Überschrieben</text>
  <rect x="464" y="110" width="112" height="40" rx="3" fill="#EA4335"/>
  <text x="520" y="135" font-size="11" fill="#FFFFFF" text-anchor="middle">neue Daten</text>
  <text x="520" y="170" font-size="10.5" fill="#B42318" text-anchor="middle">Nichts mehr zu lesen.</text>
  <text x="520" y="184" font-size="10.5" fill="#B42318" text-anchor="middle">Keine Software rettet das.</text>
  <line x1="520" y1="190" x2="520" y2="232" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="3 3"/>
  <circle cx="520" cy="232" r="4" fill="#EA4335"/>

  <!-- SSD note -->
  <rect x="40" y="270" width="560" height="34" rx="5" fill="#F3F4F6"/>
  <text x="56" y="291" font-size="11" fill="#374151">⚡  Auf einer SSD räumt TRIM die markierten Blöcke binnen Minuten weg — Phase 3 kommt viel schneller als bei einer HDD.</text>
</svg>
