<!-- ============================================================= -->
<!-- Cover: geloeschte-excel-datei-wiederherstellen (de) -->
<!-- Recipe: cost-hero / vanishing-window — hook word + emptied Papierkorb whose recovery odds drain on a clock, contrasted with a kept version timeline where the deleted Excel file is still present -->
<!-- ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>
    <linearGradient id="grad-bin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7CBD3"/><stop offset="1" stop-color="#9CA3AF"/>
    </linearGradient>
    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#312E81" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <!-- eyebrow -->
  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">DATEIVERWALTUNG · EDITORIAL</text>
  </g>

  <!-- big hook word -->
  <g transform="translate(120, 360)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="120" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-3">GELEERT?</text>
  </g>

  <!-- subtitle: 2 lines, amber emphasis -->
  <g transform="translate(124, 470)">
    <text x="0" y="0" font-size="31" font-weight="800" fill="#312E81" letter-spacing="0.5">Aus dem Papierkorb zurückholen ist leicht — bis Sie ihn leeren.</text>
    <text x="0" y="46" font-size="31" font-weight="800" fill="#312E81" letter-spacing="0.5">Danach wird es ein <tspan fill="#F59E0B">Wettlauf gegen die Zeit</tspan>.</text>
  </g>

  <!-- hero visual: empty bin with draining recovery clock, vs kept version timeline -->
  <g transform="translate(980, 150)">

    <!-- ===== LEFT: emptied Papierkorb + recovery clock ===== -->
    <g transform="translate(0, 60)">
      <text x="130" y="-18" font-size="16" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="1">Papierkorb geleert</text>

      <!-- trash can -->
      <g transform="translate(70, 60)">
        <rect x="-6" y="-22" width="132" height="20" rx="6" fill="url(#grad-bin)"/>
        <rect x="44" y="-34" width="32" height="14" rx="5" fill="url(#grad-bin)"/>
        <path d="M6 0 L114 0 L104 250 L16 250 Z" fill="#FFFFFF" stroke="#C7CBD3" stroke-width="3" filter="url(#card-shadow)"/>
        <line x1="38" y1="26" x2="32" y2="226" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round"/>
        <line x1="60" y1="26" x2="60" y2="226" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round"/>
        <line x1="82" y1="26" x2="88" y2="226" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round"/>
        <text x="60" y="150" font-size="20" font-weight="800" fill="#C7CBD3" text-anchor="middle" letter-spacing="2">LEER</text>
      </g>

      <!-- recovery clock draining -->
      <g transform="translate(196, 40)">
        <circle cx="0" cy="0" r="30" fill="url(#grad-amber)" filter="url(#card-shadow)"/>
        <circle cx="0" cy="0" r="30" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
        <path d="M0 -16 L0 0 L13 8" stroke="#312E81" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
      <text x="196" y="92" font-size="13" font-weight="700" fill="#B45309" text-anchor="middle">Chance ↓ pro Minute</text>
    </g>

    <text x="300" y="290" font-size="30" font-weight="900" fill="#9C98FF" text-anchor="middle" letter-spacing="1">VS</text>

    <!-- ===== RIGHT: kept version timeline, deleted file still present ===== -->
    <g transform="translate(360, 60)">
      <text x="130" y="-18" font-size="16" font-weight="700" fill="#4338CA" text-anchor="middle" letter-spacing="1">Versionsverlauf</text>

      <rect x="0" y="0" width="260" height="386" rx="14" fill="#FFFFFF" filter="url(#card-shadow)"/>
      <line x1="40" y1="36" x2="40" y2="356" stroke="#E4E3FF" stroke-width="3"/>

      <g transform="translate(40, 64)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-indigo)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#EEF2FF"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#312E81">14:30　Auto-Version</text>
      </g>
      <g transform="translate(40, 134)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-indigo)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#EEF2FF"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#312E81">14:00　Auto-Version</text>
      </g>
      <g transform="translate(40, 204)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-amber)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#FEF3C7"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#92400E">11:20　Version speichern</text>
      </g>
      <g transform="translate(40, 274)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-indigo)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#EEF2FF"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#312E81">09:30　Auto-Version</text>
      </g>
      <g transform="translate(40, 340)">
        <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="#22C55E" stroke-width="3"/>
        <path d="M-6 0 L-2 5 L7 -6" stroke="#22C55E" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="5" font-size="15" font-weight="700" fill="#16A34A">Datei vorhanden</text>
      </g>
    </g>
  </g>

  <!-- Keeply lockup bottom-right -->
  <g transform="translate(1320, 820)">
    <use href="#keeply-lockup" width="200" height="50"/>
  </g>

  <!-- bottom note -->
  <g transform="translate(120, 840)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="1.5">DE-MARKT · DSGVO-LOKAL · DER PAPIERKORB LEERT SICH; EIN VERSIONSVERLAUF SICHERT DIE DATEI SCHON VORHER</text>
  </g>
</svg>
