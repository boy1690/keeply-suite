<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, system-ui, sans-serif">
  <!-- host-app illustration: der UnsavedFiles-Cache-Ordner im Windows-Explorer — excel-nicht-gespeicherte-datei-wiederherstellen (de) -->
  <rect x="0" y="0" width="640" height="380" rx="8" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>

  <!-- window title bar -->
  <rect x="0" y="0" width="640" height="36" rx="8" fill="#F3F2F1"/>
  <rect x="0" y="18" width="640" height="18" fill="#F3F2F1"/>
  <text x="16" y="23" font-size="12" font-weight="600" fill="#323130">📁  UnsavedFiles</text>
  <text x="612" y="23" font-size="13" fill="#605E5C" text-anchor="end">—  ☐  ✕</text>

  <!-- address bar -->
  <rect x="16" y="46" width="608" height="28" rx="3" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>
  <text x="28" y="64" font-size="10" fill="#323130">Dieser PC ▸ Lokaler Datenträger (C:) ▸ Benutzer ▸ Name ▸ AppData ▸ Local ▸ Microsoft ▸ Office ▸ UnsavedFiles</text>

  <!-- column headers -->
  <line x1="16" y1="90" x2="624" y2="90" stroke="#EDEBE9" stroke-width="1"/>
  <text x="28" y="106" font-size="11" font-weight="700" fill="#605E5C">Name</text>
  <text x="360" y="106" font-size="11" font-weight="700" fill="#605E5C">Änderungsdatum</text>
  <text x="528" y="106" font-size="11" font-weight="700" fill="#605E5C">Typ</text>
  <line x1="16" y1="114" x2="624" y2="114" stroke="#EDEBE9" stroke-width="1"/>

  <!-- rows -->
  <text x="28" y="138" font-size="12" fill="#323130">📊  Q2_Bericht ((Nicht gespeichert)).xlsb</text>
  <text x="360" y="138" font-size="11" fill="#605E5C">Heute 11:15</text>
  <text x="528" y="138" font-size="11" fill="#605E5C">XLSB-Datei</text>
  <line x1="16" y1="150" x2="624" y2="150" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="172" font-size="12" fill="#323130">📊  Mappe1 ((Nicht gespeichert)).xlsb</text>
  <text x="360" y="172" font-size="11" fill="#605E5C">Heute 09:02</text>
  <text x="528" y="172" font-size="11" fill="#605E5C">XLSB-Datei</text>
  <line x1="16" y1="184" x2="624" y2="184" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="206" font-size="12" fill="#323130">📊  Prognose ((Nicht gespeichert)).xlsb</text>
  <text x="360" y="206" font-size="11" fill="#605E5C">19.05. 16:48</text>
  <text x="528" y="206" font-size="11" fill="#605E5C">XLSB-Datei</text>
  <line x1="16" y1="218" x2="624" y2="218" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="240" font-size="12" fill="#A19F9D">📊  Budget ((Nicht gespeichert)).xlsb</text>
  <text x="360" y="240" font-size="11" fill="#C8C6C4">15.05. — geleert</text>
  <text x="528" y="240" font-size="11" fill="#C8C6C4">(weg)</text>

  <!-- status / caption -->
  <rect x="0" y="332" width="640" height="48" fill="#FBF6EC"/>
  <line x1="0" y1="332" x2="640" y2="332" stroke="#F0E3C8" stroke-width="1"/>
  <text x="16" y="352" font-size="11.5" fill="#8A6D1A">⏳  Das ist ein temporärer Zwischenspeicher, kein Backup-Ordner.</text>
  <text x="16" y="369" font-size="11.5" fill="#8A6D1A">Excel leert ihn eigenständig – ältere Einträge (wie Budget oben) verschwinden klammheimlich.</text>
</svg>
