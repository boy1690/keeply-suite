<!-- Image 5: Dropbox 30-day retention pricing tier table -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EF4444"/><stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Top label -->
  <g transform="translate(60, 60)">
    <text x="0" y="0" font-size="14" font-weight="800" fill="#312E81" letter-spacing="3">DROPBOX VERSION HISTORY · OFFICIAL TIERS</text>
  </g>

  <!-- 3 cards (tier comparison) -->
  <g font-family="system-ui,sans-serif">

    <!-- Tier 1 (cheap, RED — most users land here) -->
    <g transform="translate(80, 160)" filter="url(#shadow)">
      <rect width="320" height="340" rx="14" fill="#ffffff"/>
      <rect width="320" height="50" rx="14" fill="url(#g-red)"/>
      <rect y="36" width="320" height="14" fill="url(#g-red)"/>
      <text x="20" y="32" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">CHEAP TIER</text>
      <text x="160" y="120" font-size="60" font-weight="900" fill="url(#g-red)" text-anchor="middle">30</text>
      <text x="160" y="148" font-size="14" font-weight="700" fill="#DC2626" text-anchor="middle" letter-spacing="2">DAYS</text>
      <text x="160" y="200" font-size="14" font-weight="600" fill="#312E81" text-anchor="middle">Basic / Plus</text>
      <text x="160" y="222" font-size="14" font-weight="600" fill="#312E81" text-anchor="middle">Family</text>
      <text x="160" y="288" font-size="11" font-weight="500" fill="#DC2626" text-anchor="middle" opacity="0.8">3-month-old version</text>
      <text x="160" y="306" font-size="11" font-weight="500" fill="#DC2626" text-anchor="middle" opacity="0.8">already gone</text>
    </g>

    <!-- Tier 2 (mid, AMBER) -->
    <g transform="translate(440, 160)" filter="url(#shadow)">
      <rect width="320" height="340" rx="14" fill="#ffffff"/>
      <rect width="320" height="50" rx="14" fill="url(#g-amber)"/>
      <rect y="36" width="320" height="14" fill="url(#g-amber)"/>
      <text x="20" y="32" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">MID TIER</text>
      <text x="160" y="120" font-size="60" font-weight="900" fill="url(#g-amber)" text-anchor="middle">180</text>
      <text x="160" y="148" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle" letter-spacing="2">DAYS</text>
      <text x="160" y="200" font-size="14" font-weight="600" fill="#312E81" text-anchor="middle">Professional</text>
      <text x="160" y="222" font-size="14" font-weight="600" fill="#312E81" text-anchor="middle">Business / Standard</text>
      <text x="160" y="288" font-size="11" font-weight="500" fill="#F59E0B" text-anchor="middle">half a year</text>
      <text x="160" y="306" font-size="11" font-weight="500" fill="#F59E0B" text-anchor="middle">paid plan only</text>
    </g>

    <!-- Tier 3 (enterprise, INDIGO) -->
    <g transform="translate(800, 160)" filter="url(#shadow)">
      <rect width="320" height="340" rx="14" fill="#ffffff"/>
      <rect width="320" height="50" rx="14" fill="url(#g-indigo)"/>
      <rect y="36" width="320" height="14" fill="url(#g-indigo)"/>
      <text x="20" y="32" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">TOP TIER</text>
      <text x="160" y="120" font-size="60" font-weight="900" fill="url(#g-indigo-deep)" text-anchor="middle">365</text>
      <text x="160" y="148" font-size="14" font-weight="700" fill="#4338CA" text-anchor="middle" letter-spacing="2">DAYS</text>
      <text x="160" y="200" font-size="14" font-weight="600" fill="#312E81" text-anchor="middle">Business Plus</text>
      <text x="160" y="222" font-size="14" font-weight="600" fill="#312E81" text-anchor="middle">Advanced / Enterprise</text>
      <text x="160" y="288" font-size="11" font-weight="500" fill="#4338CA" text-anchor="middle">a year</text>
      <text x="160" y="306" font-size="11" font-weight="500" fill="#4338CA" text-anchor="middle">large org plan</text>
    </g>
  </g>

  <!-- Bottom caption: the punchline -->
  <text x="600" y="560" font-size="16" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">YOUR FILE HISTORY · SOLD IN BUNDLES</text>

</svg>
