<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, system-ui, sans-serif">
  <!-- host-app illustration: okno Kosza w Windows z zaznaczonym plikiem i przyciskiem Przywróć — jak-odzyskac-usuniete-pliki-z-kosza (pl) -->
