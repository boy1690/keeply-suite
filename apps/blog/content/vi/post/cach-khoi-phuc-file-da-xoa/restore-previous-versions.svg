<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Tahoma, system-ui, sans-serif">
  <!-- host-OS illustration: Windows "Khôi phục phiên bản trước" properties dialog — cach-khoi-phuc-file-da-xoa (vi) -->
  <rect x="0" y="0" width="640" height="400" rx="8" fill="#F3F2F1" stroke="#D2D0CE" stroke-width="1"/>

  <!-- breadcrumb / how-to path (Windows Explorer blue) -->
  <rect x="0" y="0" width="640" height="40" rx="8" fill="#0067C0"/>
  <rect x="0" y="20" width="640" height="20" fill="#0067C0"/>
  <text x="16" y="25" font-size="13" font-weight="700" fill="#FFFFFF">Windows</text>
  <text x="92" y="25" font-size="9" fill="#D6E6F7">Chuột phải vào thư mục ▸ Thuộc tính ▸ Phiên bản trước</text>

  <!-- properties dialog window -->
  <rect x="40" y="64" width="560" height="300" rx="6" fill="#FFFFFF" stroke="#C8C6C4" stroke-width="1"/>
  <rect x="40" y="64" width="560" height="34" rx="6" fill="#FAF9F8"/>
  <rect x="40" y="86" width="560" height="12" fill="#FAF9F8"/>
  <text x="56" y="86" font-size="12" font-weight="600" fill="#323130">Thuộc tính: Dự án 2026</text>
  <text x="584" y="86" font-size="14" fill="#605E5C" text-anchor="end">✕</text>

  <!-- active tab: Previous Versions -->
  <rect x="56" y="108" width="118" height="24" rx="3" fill="#FFFFFF" stroke="#0067C0" stroke-width="1.5"/>
  <text x="115" y="124" font-size="11" font-weight="700" fill="#0067C0" text-anchor="middle">Phiên bản trước</text>
  <text x="200" y="124" font-size="11" fill="#A19F9D">Bảo mật</text>
  <text x="270" y="124" font-size="11" fill="#A19F9D">Tùy chỉnh</text>

  <!-- intro line -->
  <text x="56" y="150" font-size="10.5" fill="#605E5C">Các bản chụp thư mục do Windows lưu lại theo từng mốc thời gian:</text>

  <!-- column headers -->
  <line x1="56" y1="160" x2="584" y2="160" stroke="#EDEBE9" stroke-width="1"/>
  <text x="66" y="176" font-size="11" font-weight="700" fill="#605E5C">Tên thư mục</text>
  <text x="380" y="176" font-size="11" font-weight="700" fill="#605E5C">Ngày sửa đổi</text>
  <line x1="56" y1="184" x2="584" y2="184" stroke="#EDEBE9" stroke-width="1"/>

  <!-- group label -->
  <text x="66" y="200" font-size="10" font-weight="700" fill="#A19F9D">Hôm nay (2)</text>

  <!-- selected row -->
  <rect x="56" y="206" width="528" height="28" fill="#E6F0FA"/>
  <text x="66" y="224" font-size="12" fill="#323130">📁  Dự án 2026</text>
  <text x="380" y="224" font-size="11" fill="#605E5C">Hôm nay 15:30</text>

  <text x="66" y="252" font-size="12" fill="#323130">📁  Dự án 2026</text>
  <text x="380" y="252" font-size="11" fill="#605E5C">Hôm nay 11:00</text>
  <line x1="56" y1="262" x2="584" y2="262" stroke="#F3F2F1" stroke-width="1"/>

  <!-- group label -->
  <text x="66" y="278" font-size="10" font-weight="700" fill="#A19F9D">Hôm qua (1)</text>
  <text x="66" y="298" font-size="12" fill="#323130">📁  Dự án 2026</text>
  <text x="380" y="298" font-size="11" fill="#605E5C">22/05 17:48</text>

  <!-- buttons: Mở / Sao chép / Khôi phục -->
  <rect x="280" y="320" width="86" height="30" rx="3" fill="#FFFFFF" stroke="#C8C6C4" stroke-width="1"/>
  <text x="323" y="339" font-size="12" fill="#323130" text-anchor="middle">Mở</text>
  <rect x="374" y="320" width="98" height="30" rx="3" fill="#FFFFFF" stroke="#C8C6C4" stroke-width="1"/>
  <text x="423" y="339" font-size="12" fill="#323130" text-anchor="middle">Sao chép</text>
  <rect x="480" y="320" width="104" height="30" rx="3" fill="#0067C0"/>
  <text x="532" y="339" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Khôi phục</text>

  <!-- caption -->
  <text x="40" y="388" font-size="10" fill="#A19F9D">Danh sách này chỉ có dữ liệu nếu Lịch sử Tệp đã được bật từ trước — nếu chưa bật, nó trống.</text>
</svg>
