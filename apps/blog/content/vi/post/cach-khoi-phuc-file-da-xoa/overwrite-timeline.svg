<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none"
     font-family="'Inter','Segoe UI',Tahoma,-apple-system,system-ui,sans-serif">
  <!-- concept diagram: 3 stages of a file's data region after deletion — cach-khoi-phuc-file-da-xoa (vi) -->
  <defs>
    <linearGradient id="ot-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF0FF"/>
    </linearGradient>
    <filter id="ot-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#312E81" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="800" height="360" rx="14" fill="url(#ot-paper)"/>

  <!-- heading -->
  <text x="40" y="46" font-size="19" font-weight="800" fill="#312E81">Sau khi xóa: vùng dữ liệu của file đi qua 3 giai đoạn</text>
  <text x="40" y="70" font-size="13" font-weight="500" fill="#6B7280">Mỗi lần ổ đĩa ghi thêm dữ liệu, file lại tiến gần hơn tới giai đoạn không cứu được</text>

  <!-- timeline arrow under the three stages -->
  <line x1="60" y1="300" x2="720" y2="300" stroke="#C7CBD3" stroke-width="3"/>
  <path d="M720 300 l-12 -6 l0 12 Z" fill="#C7CBD3"/>
  <text x="744" y="305" font-size="12" font-weight="600" fill="#9CA3AF" text-anchor="end">thời gian</text>

  <!-- ===== Stage 1: intact ===== -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="200" height="150" rx="12" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="2" filter="url(#ot-shadow)"/>
    <circle cx="30" cy="34" r="15" fill="#4F46E5"/>
    <text x="30" y="40" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
    <!-- intact data blocks: full -->
    <rect x="22" y="62" width="22" height="22" rx="3" fill="#4F46E5"/>
    <rect x="49" y="62" width="22" height="22" rx="3" fill="#4F46E5"/>
    <rect x="76" y="62" width="22" height="22" rx="3" fill="#4F46E5"/>
    <rect x="103" y="62" width="22" height="22" rx="3" fill="#4F46E5"/>
    <rect x="130" y="62" width="22" height="22" rx="3" fill="#4F46E5"/>
    <rect x="157" y="62" width="22" height="22" rx="3" fill="#4F46E5"/>
    <text x="100" y="112" font-size="15" font-weight="800" fill="#16A34A" text-anchor="middle">Còn nguyên vẹn</text>
    <text x="100" y="134" font-size="11.5" font-weight="500" fill="#6B7280" text-anchor="middle">Dữ liệu chưa hề mất —</text>
    <text x="100" y="148" font-size="11.5" font-weight="500" fill="#6B7280" text-anchor="middle">khôi phục gần như chắc chắn</text>
  </g>

  <!-- arrow 1→2 -->
  <path d="M268 185 l24 0" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M292 185 l-10 -5 l0 10 Z" fill="#9CA3AF"/>

  <!-- ===== Stage 2: marked overwritable ===== -->
  <g transform="translate(300, 110)">
    <rect x="0" y="0" width="200" height="150" rx="12" fill="#FFFFFF" stroke="#FCD34D" stroke-width="2" filter="url(#ot-shadow)"/>
    <circle cx="30" cy="34" r="15" fill="#F59E0B"/>
    <text x="30" y="40" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
    <!-- data still present but flagged: dashed outline -->
    <rect x="22" y="62" width="22" height="22" rx="3" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 2"/>
    <rect x="49" y="62" width="22" height="22" rx="3" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 2"/>
    <rect x="76" y="62" width="22" height="22" rx="3" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 2"/>
    <rect x="103" y="62" width="22" height="22" rx="3" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 2"/>
    <rect x="130" y="62" width="22" height="22" rx="3" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 2"/>
    <rect x="157" y="62" width="22" height="22" rx="3" fill="#FCD34D" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="100" y="112" font-size="14" font-weight="800" fill="#B45309" text-anchor="middle">Bị đánh dấu</text>
    <text x="100" y="129" font-size="14" font-weight="800" fill="#B45309" text-anchor="middle">có thể ghi đè</text>
    <text x="100" y="147" font-size="11.5" font-weight="500" fill="#6B7280" text-anchor="middle">Còn đọc được, nhưng đồng hồ đã chạy</text>
  </g>

  <!-- arrow 2→3 -->
  <path d="M508 185 l24 0" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M532 185 l-10 -5 l0 10 Z" fill="#9CA3AF"/>

  <!-- ===== Stage 3: permanently overwritten ===== -->
  <g transform="translate(540, 110)">
    <rect x="0" y="0" width="200" height="150" rx="12" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="2" filter="url(#ot-shadow)"/>
    <circle cx="30" cy="34" r="15" fill="#DC2626"/>
    <text x="30" y="40" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
    <!-- data overwritten by new data: grey blocks with x -->
    <rect x="22" y="62" width="22" height="22" rx="3" fill="#E5E7EB"/>
    <rect x="49" y="62" width="22" height="22" rx="3" fill="#E5E7EB"/>
    <rect x="76" y="62" width="22" height="22" rx="3" fill="#9CA3AF"/>
    <rect x="103" y="62" width="22" height="22" rx="3" fill="#E5E7EB"/>
    <rect x="130" y="62" width="22" height="22" rx="3" fill="#9CA3AF"/>
    <rect x="157" y="62" width="22" height="22" rx="3" fill="#E5E7EB"/>
    <text x="100" y="112" font-size="14" font-weight="800" fill="#DC2626" text-anchor="middle">Bị ghi đè vĩnh viễn</text>
    <text x="100" y="134" font-size="11.5" font-weight="500" fill="#6B7280" text-anchor="middle">Dữ liệu mới đã đè lên —</text>
    <text x="100" y="148" font-size="11.5" font-weight="500" fill="#6B7280" text-anchor="middle">không công cụ nào cứu được</text>
  </g>
</svg>
