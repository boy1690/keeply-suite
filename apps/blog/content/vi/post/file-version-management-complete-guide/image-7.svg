<!-- Image 7: Rule vs Reality — naming convention PDF vs real desktop -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312E81" flood-opacity="0.16"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Headers -->
  <g transform="translate(60, 60)">
    <text x="0" y="0" font-size="13" font-weight="800" fill="#4338CA" letter-spacing="3">RULE — WHAT IT WAS</text>
  </g>
  <g transform="translate(640, 60)">
    <text x="0" y="0" font-size="13" font-weight="800" fill="#DC2626" letter-spacing="3">REALITY — 6 MONTHS LATER</text>
  </g>

  <!-- LEFT: A4 page with naming convention -->
  <g transform="translate(110, 110)" filter="url(#shadow)">
    <rect width="380" height="430" rx="4" fill="#ffffff" stroke="#E0E7FF" stroke-width="1"/>
    <!-- Page header bar -->
    <rect width="380" height="50" fill="url(#g-indigo)"/>
    <text x="20" y="32" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="2" font-family="system-ui,sans-serif">NAMING CONVENTION v1.0</text>
    <!-- Body content -->
    <g font-family="system-ui,sans-serif">
      <text x="30" y="100" font-size="14" font-weight="700" fill="#312E81" letter-spacing="1">FORMAT</text>
      <line x1="30" y1="108" x2="350" y2="108" stroke="#E0E7FF" stroke-width="1"/>
      <text x="30" y="140" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">[YYYY-MM-DD]_</text>
      <text x="30" y="162" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">[ProjectCode]_</text>
      <text x="30" y="184" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">[DocType]_</text>
      <text x="30" y="206" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">[Status]_</text>
      <text x="30" y="228" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">[Author].ext</text>

      <text x="30" y="280" font-size="14" font-weight="700" fill="#312E81" letter-spacing="1">EXAMPLE</text>
      <line x1="30" y1="288" x2="350" y2="288" stroke="#E0E7FF" stroke-width="1"/>
      <text x="30" y="318" font-size="12" font-weight="500" fill="#6F6AF0" font-family="'JetBrains Mono',ui-monospace,monospace">2025-04-15_Q4Pitch_</text>
      <text x="30" y="338" font-size="12" font-weight="500" fill="#6F6AF0" font-family="'JetBrains Mono',ui-monospace,monospace">deck_v1_AC.pptx</text>

      <text x="30" y="395" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.7">Approved by IT · circulated to all departments</text>
    </g>
  </g>

  <!-- RIGHT: Real desktop with chaotic filenames -->
  <g transform="translate(620, 110)" filter="url(#shadow)">
    <rect width="500" height="430" rx="10" fill="#ffffff"/>
    <rect width="500" height="46" rx="10" fill="url(#g-indigo-deep)"/>
    <rect y="32" width="500" height="14" fill="url(#g-indigo-deep)"/>
    <text x="20" y="30" font-size="14" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">📁 Joe's Desktop / Marketing</text>
    <!-- Window controls -->
    <g transform="translate(420, 12)" stroke="#ffffff" stroke-width="2" opacity="0.7">
      <line x1="0" y1="14" x2="14" y2="14" stroke-linecap="round"/>
      <rect x="26" y="0" width="14" height="14" rx="1" fill="none"/>
      <line x1="56" y1="0" x2="68" y2="14" stroke-linecap="round"/>
      <line x1="68" y1="0" x2="56" y2="14" stroke-linecap="round"/>
    </g>

    <!-- File rows: chaos -->
    <g font-family="'JetBrains Mono',ui-monospace,monospace">
      <rect y="46" width="500" height="36" fill="#ffffff"/>
      <text x="20" y="70" font-size="13" font-weight="500" fill="#312E81">📄 pitch.pptx</text>
      <text x="430" y="70" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Mar 8</text>
      <rect y="82" width="500" height="36" fill="#F8F7FF"/>
      <text x="20" y="106" font-size="13" font-weight="500" fill="#312E81">📄 pitch_v2.pptx</text>
      <text x="430" y="106" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Mar 12</text>
      <rect y="118" width="500" height="36" fill="#ffffff"/>
      <text x="20" y="142" font-size="13" font-weight="500" fill="#312E81">📄 pitch_final.pptx</text>
      <text x="430" y="142" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Mar 19</text>
      <rect y="154" width="500" height="36" fill="#F8F7FF"/>
      <text x="20" y="178" font-size="13" font-weight="500" fill="#312E81">📄 pitch_FINAL_v2.pptx</text>
      <text x="430" y="178" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Mar 22</text>
      <rect y="190" width="500" height="36" fill="#ffffff"/>
      <text x="20" y="214" font-size="13" font-weight="500" fill="#312E81">📄 pitch_use_this_one.pptx</text>
      <text x="430" y="214" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Mar 26</text>
      <rect y="226" width="500" height="36" fill="#F8F7FF"/>
      <text x="20" y="250" font-size="13" font-weight="500" fill="#312E81">📄 pitch_REAL_FINAL.pptx</text>
      <text x="430" y="250" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Apr 02</text>
      <rect y="262" width="500" height="36" fill="#ffffff"/>
      <text x="20" y="286" font-size="13" font-weight="500" fill="#312E81">📄 pitch_2.pptx</text>
      <text x="430" y="286" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Apr 04</text>
      <rect y="298" width="500" height="36" fill="#F8F7FF"/>
      <text x="20" y="322" font-size="13" font-weight="500" fill="#312E81">📄 Copy of pitch_FINAL.pptx</text>
      <text x="430" y="322" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Apr 05</text>
      <rect y="334" width="500" height="36" fill="#ffffff"/>
      <text x="20" y="358" font-size="13" font-weight="500" fill="#312E81">📄 Copy of Copy of pitch.pptx</text>
      <text x="430" y="358" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.6" font-family="system-ui,sans-serif">Apr 06</text>
    </g>

    <!-- "Approved IT rule violation" stamp diagonal -->
    <g transform="translate(120, 220)" opacity="0.92">
      <rect x="0" y="0" width="280" height="60" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="3" transform="rotate(-6)"/>
      <text x="140" y="40" font-size="22" font-weight="900" fill="#DC2626" text-anchor="middle" font-family="system-ui,sans-serif" transform="rotate(-6)">RULE IGNORED</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="570" font-size="16" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">PUSHING ORGANIZATIONAL MEMORY ONTO HUMAN DISCIPLINE · A KNOWN-BROKEN DESIGN</text>

</svg>
