<!-- Keeply blog cover -->
<!-- Cover: geri-donusum-kutusundan-silinen-dosyalari-kurtarma (tr) -->
<!-- Recipe: countdown-hero — hook word + emptied Recycle Bin draining a file on a clock, contrasted with a kept version timeline (deletion = non-event) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>
    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#312E81" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <!-- eyebrow -->
  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">DOSYA YÖNETİMİ · WINDOWS</text>
  </g>

  <!-- big hook word -->
  <g transform="translate(120, 320)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="112" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-3">KUTU BOŞ.</text>
  </g>

  <!-- subtitle: 2 lines, amber emphasis -->
  <g transform="translate(124, 430)">
    <text x="0" y="0" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">Geri dönüşüm kutusundan silinen dosyayı geri</text>
    <text x="0" y="48" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">getirmek artık <tspan fill="#F59E0B">kalan zamanla yarış</tspan></text>
  </g>

  <!-- left lower: the 4-method countdown ladder -->
  <g transform="translate(124, 560)">
    <text x="0" y="0" font-size="17" font-weight="700" fill="#4338CA">⏱  Aciliyete göre 4 yöntem — yukarıdan aşağı denenir</text>
    <g font-size="15" font-weight="600" fill="#4B5563">
      <text x="0" y="34">1 · Geri Dönüşüm Kutusu → Geri Yükle</text>
      <text x="0" y="62">2 · Ctrl + Z · Silmeyi Geri Al</text>
      <text x="0" y="90">3 · Önceki sürümleri geri yükle</text>
      <text x="0" y="118" fill="#B91C1C">4 · Kurtarma yazılımı — SSD'de pencere dakikalar</text>
    </g>
  </g>

  <!-- hero visual: emptied recycle bin draining a file on a clock, vs kept timeline -->
  <g transform="translate(980, 150)">

    <!-- ===== LEFT: emptied Recycle Bin + draining file on a clock ===== -->
    <g transform="translate(0, 60)">
      <text x="130" y="-18" font-size="16" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="1">Boşaltılmış kutu</text>

      <!-- recycle bin -->
      <path d="M70 60 L190 60 L178 210 L82 210 Z" fill="#FFFFFF" stroke="#C7CBD3" stroke-width="3" filter="url(#card-shadow)"/>
      <rect x="60" y="44" width="140" height="18" rx="6" fill="#C7CBD3"/>
      <rect x="116" y="30" width="28" height="12" rx="4" fill="#C7CBD3"/>
      <line x1="100" y1="84" x2="96" y2="190" stroke="#E4E3FF" stroke-width="4" stroke-linecap="round"/>
      <line x1="130" y1="84" x2="130" y2="190" stroke="#E4E3FF" stroke-width="4" stroke-linecap="round"/>
      <line x1="160" y1="84" x2="164" y2="190" stroke="#E4E3FF" stroke-width="4" stroke-linecap="round"/>

      <!-- a doc draining out, fading -->
      <g transform="translate(96, 232)" opacity="0.9">
        <rect x="0" y="0" width="68" height="84" rx="8" fill="#FFFFFF" stroke="#E4E3FF" stroke-width="2"/>
        <path d="M46 0 L68 22 L46 22 Z" fill="#EEF2FF"/>
        <rect x="12" y="40" width="44" height="6" rx="3" fill="#C7CBD3"/>
        <rect x="12" y="54" width="44" height="6" rx="3" fill="#C7CBD3"/>
        <rect x="12" y="68" width="28" height="6" rx="3" fill="#C7CBD3"/>
        <circle cx="58" cy="78" r="3" fill="#C7CBD3"/>
      </g>

      <!-- clock badge -->
      <g transform="translate(196, 38)">
        <circle cx="0" cy="0" r="26" fill="url(#grad-amber)" filter="url(#card-shadow)"/>
        <circle cx="0" cy="0" r="26" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <path d="M0 -14 L0 0 L11 7" stroke="#312E81" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      </g>
    </g>

    <text x="300" y="290" font-size="30" font-weight="900" fill="#9C98FF" text-anchor="middle" letter-spacing="1">VS</text>

    <!-- ===== RIGHT: kept version timeline, deletion = non-event ===== -->
    <g transform="translate(360, 60)">
      <text x="130" y="-18" font-size="16" font-weight="700" fill="#4338CA" text-anchor="middle" letter-spacing="1">Sürüm geçmişi</text>

      <rect x="0" y="0" width="260" height="386" rx="14" fill="#FFFFFF" filter="url(#card-shadow)"/>
      <line x1="40" y1="36" x2="40" y2="356" stroke="#E4E3FF" stroke-width="3"/>

      <g transform="translate(40, 64)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-indigo)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#EEF2FF"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#312E81">11:00　Son hâl</text>
      </g>
      <g transform="translate(40, 134)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-indigo)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#EEF2FF"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#312E81">10:30　Otomatik sürüm</text>
      </g>
      <g transform="translate(40, 204)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-amber)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#FEF3C7"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#92400E">09:40　Sürüm kaydet</text>
      </g>
      <g transform="translate(40, 274)">
        <circle cx="0" cy="0" r="11" fill="url(#grad-indigo)"/>
        <rect x="30" y="-13" width="200" height="26" rx="6" fill="#EEF2FF"/>
        <text x="46" y="5" font-size="15" font-weight="700" fill="#312E81">İlk sürüm</text>
      </g>
      <g transform="translate(40, 340)">
        <circle cx="0" cy="0" r="14" fill="#FFFFFF" stroke="#22C55E" stroke-width="3"/>
        <path d="M-6 0 L-2 5 L7 -6" stroke="#22C55E" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="30" y="5" font-size="15" font-weight="700" fill="#16A34A">Tek tıkla geri</text>
      </g>
    </g>
  </g>

  <!-- Keeply lockup bottom-right -->
  <g transform="translate(1320, 820)">
    <use href="#keeply-lockup" width="200" height="50"/>
  </g>

  <!-- bottom note -->
  <g transform="translate(120, 840)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="1.5">TR PAZARI · YEREL/AĞ · KUTU BOŞALINCA YARIŞ BAŞLAR; SÜRÜM GEÇMİŞİ YARIŞMAZ</text>
  </g>
</svg>
