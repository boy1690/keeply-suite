<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <!-- mechanism diagram: 3 phases after Recycle Bin emptied — geri-donusum-kutusundan-silinen-dosyalari-kurtarma (tr) -->
  <rect x="0" y="0" width="640" height="340" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>

  <text x="24" y="34" font-size="15" font-weight="800" fill="#312E81">Geri Dönüşüm Kutusu boşaltıldıktan sonra dosyaya ne olur?</text>

  <!-- timeline arrow -->
  <line x1="60" y1="74" x2="600" y2="74" stroke="#C7CBD3" stroke-width="2"/>
  <path d="M600 74 l-10 -5 l0 10 Z" fill="#C7CBD3"/>
  <text x="600" y="62" font-size="11" fill="#9CA3AF" text-anchor="end">zaman →</text>

  <!-- PHASE 1: intact -->
  <g transform="translate(40, 96)">
    <circle cx="80" cy="-22" r="6" fill="#22C55E"/>
    <rect x="0" y="0" width="160" height="120" rx="10" fill="#EAF6EF" stroke="#BBE6CD" stroke-width="1.5"/>
    <text x="80" y="26" font-size="13" font-weight="800" fill="#1E7544" text-anchor="middle">1 · Veriler sağlam</text>
    <g transform="translate(56, 40)">
      <rect x="0" y="0" width="48" height="58" rx="5" fill="#FFFFFF" stroke="#22C55E" stroke-width="2"/>
      <rect x="10" y="14" width="28" height="4" rx="2" fill="#22C55E"/>
      <rect x="10" y="24" width="28" height="4" rx="2" fill="#22C55E"/>
      <rect x="10" y="34" width="20" height="4" rx="2" fill="#22C55E"/>
    </g>
    <text x="80" y="112" font-size="10.5" fill="#1E7544" text-anchor="middle">Silindi ama hâlâ diskte</text>
  </g>

  <!-- PHASE 2: marked free -->
  <g transform="translate(240, 96)">
    <circle cx="80" cy="-22" r="6" fill="#F59E0B"/>
    <rect x="0" y="0" width="160" height="120" rx="10" fill="#FBF6EC" stroke="#F0E3C8" stroke-width="1.5"/>
    <text x="80" y="26" font-size="13" font-weight="800" fill="#8A6D1A" text-anchor="middle">2 · Alan "boş" işaretli</text>
    <g transform="translate(56, 40)">
      <rect x="0" y="0" width="48" height="58" rx="5" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 3"/>
      <rect x="10" y="14" width="28" height="4" rx="2" fill="#F0C674"/>
      <rect x="10" y="24" width="28" height="4" rx="2" fill="#F0C674"/>
      <rect x="10" y="34" width="20" height="4" rx="2" fill="#F0C674"/>
    </g>
    <text x="80" y="112" font-size="10.5" fill="#8A6D1A" text-anchor="middle">Hâlâ kurtarılabilir — şimdilik</text>
  </g>

  <!-- PHASE 3: overwritten -->
  <g transform="translate(440, 96)">
    <circle cx="80" cy="-22" r="6" fill="#EF4444"/>
    <rect x="0" y="0" width="160" height="120" rx="10" fill="#FDECEC" stroke="#F6C9C9" stroke-width="1.5"/>
    <text x="80" y="26" font-size="13" font-weight="800" fill="#B91C1C" text-anchor="middle">3 · Üzerine yazıldı</text>
    <g transform="translate(56, 40)">
      <rect x="0" y="0" width="48" height="58" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
      <line x1="6" y1="6" x2="42" y2="52" stroke="#EF4444" stroke-width="2.5"/>
      <line x1="42" y1="6" x2="6" y2="52" stroke="#EF4444" stroke-width="2.5"/>
    </g>
    <text x="80" y="112" font-size="10.5" fill="#B91C1C" text-anchor="middle">Geri dönüşü yok</text>
  </g>

  <!-- SSD/TRIM note -->
  <rect x="40" y="248" width="560" height="64" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="60" y="276" font-size="13" font-weight="800" fill="#4338CA">⚡ SSD'de bu üç aşama dakikalar içinde geçer</text>
  <text x="60" y="298" font-size="11.5" fill="#4338CA">TRIM, silinen blokları kendiliğinden temizler — sabit diskte pencere geniştir, SSD'de neredeyse yoktur.</text>
</svg>
