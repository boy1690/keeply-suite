<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">macOS Gatekeeper の確認ダイアログ、「開く」ボタンが強調されている</title>
  <desc id="desc">図解：macOS のシステムダイアログが Keeply を開くかどうか確認。下部に「開く」「キャンセル」の 2 ボタン。amber の囲みで「開く」を強調。</desc>
  <defs>
    <style>
      .bg { fill: #f0f1f5; }
      .dialog-bg { fill: #ffffff; stroke: #c5c5c8; stroke-width: 1; }
      .dialog-shadow { fill: rgba(0,0,0,0.08); }
      .icon-bg { fill: #4f46e5; }
      .icon-text { fill: #ffffff; font: 700 28px -apple-system, system-ui, sans-serif; }
      .dialog-title { fill: #1f1f1f; font: 600 15px -apple-system, 'SF Pro', system-ui, sans-serif; }
      .dialog-body { fill: #4a4a4d; font: 12px -apple-system, 'SF Pro', system-ui, sans-serif; }
      .btn-default { fill: #007aff; rx: 6; ry: 6; }
      .btn-default-text { fill: #ffffff; font: 600 13px -apple-system, 'SF Pro', system-ui, sans-serif; }
      .btn-secondary { fill: #ffffff; stroke: #c5c5c8; stroke-width: 1; rx: 6; ry: 6; }
      .btn-secondary-text { fill: #1f1f1f; font: 13px -apple-system, 'SF Pro', system-ui, sans-serif; }
      .annotation { fill: #f59e0b; font: 600 16px 'Noto Sans TC', system-ui, sans-serif; }
      .highlight-rect { fill: none; stroke: #f59e0b; stroke-width: 3; rx: 8; ry: 8; }
      .arrow { stroke: #f59e0b; stroke-width: 2.5; fill: none; }
      .arrow-head { fill: #f59e0b; }
    </style>
  </defs>

  <rect class="bg" width="800" height="500"/>

  <!-- Dialog shadow -->
  <rect class="dialog-shadow" x="208" y="98" width="404" height="294" rx="14" ry="14"/>
  <!-- Dialog -->
  <rect class="dialog-bg" x="200" y="90" width="400" height="290" rx="12" ry="12"/>

  <!-- Keeply icon -->
  <rect class="icon-bg" x="240" y="120" width="56" height="56" rx="14" ry="14"/>
  <text class="icon-text" x="268" y="161" text-anchor="middle">K</text>

  <!-- Title -->
  <text class="dialog-title" x="320" y="142">macOS は「Keeply」の開発元を確認できません。</text>
  <text class="dialog-title" x="320" y="162">本当に開きますか？</text>

  <!-- Body -->
  <text class="dialog-body" x="240" y="210">このアプリを開くとシステムのセキュリティ設定が省略され、</text>
  <text class="dialog-body" x="240" y="228">PC や個人データが危険にさらされる可能性があります。</text>

  <text class="dialog-body" x="240" y="265">「Keeply」は「ダウンロード」フォルダにあります。Safari が </text>
  <text class="dialog-body" x="240" y="283">本日 14:32 に keeply.work からダウンロードしました。</text>

  <!-- Buttons -->
  <rect class="btn-secondary" x="270" y="320" width="100" height="34"/>
  <text class="btn-secondary-text" x="320" y="342" text-anchor="middle">キャンセル</text>

  <rect class="btn-default" x="430" y="320" width="100" height="34"/>
  <text class="btn-default-text" x="480" y="342" text-anchor="middle">開く</text>

  <!-- Highlight on 開く -->
  <rect class="highlight-rect" x="425" y="315" width="110" height="44"/>

  <!-- Annotation -->
  <path class="arrow" d="M 480 420 L 480 372" />
  <polygon class="arrow-head" points="480,372 474,382 486,382" />
  <text class="annotation" x="480" y="450" text-anchor="middle">「開く」でインストール開始</text>
</svg>
