<!-- =============================================================
     Cover: word-unsaved-recovery (zh-CN)
     Recipe: cost-hero / blank-reveal — big "空白" = what the Document Recovery pane showed
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif">
  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>
    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">文件版本管理 · EDITORIAL</text>
  </g>

  <g transform="translate(120, 470)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="240" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-4">空白</text>
  </g>

  <g transform="translate(124, 560)">
    <text x="0" y="0" font-size="34" font-weight="800" fill="#312E81" letter-spacing="0.5">你按了「文档恢复」——</text>
    <text x="0" y="50" font-size="34" font-weight="800" fill="#312E81" letter-spacing="0.5">里面<tspan fill="#F59E0B">什么都没有</tspan>。</text>
  </g>

  <g transform="translate(980, 215)" filter="url(#hero-shadow)">
    <rect width="480" height="470" fill="#FFFFFF" rx="10"/>
    <rect width="480" height="54" fill="#F3F4F6" rx="10"/>
    <rect x="0" y="44" width="480" height="10" fill="#F3F4F6"/>
    <text x="24" y="34" font-size="18" font-weight="800" fill="#374151">文档恢复</text>
    <text x="456" y="34" font-size="18" fill="#9CA3AF" text-anchor="end">✕</text>
    <line x1="0" y1="54" x2="480" y2="54" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(240, 250)">
      <g transform="translate(-44, -120)" opacity="0.45">
        <path d="M0 0 L60 0 L88 28 L88 110 L0 110 Z" fill="none" stroke="#C7CBD3" stroke-width="3" stroke-dasharray="8 7"/>
        <path d="M60 0 L88 28 L60 28 Z" fill="none" stroke="#C7CBD3" stroke-width="3" stroke-dasharray="8 7"/>
      </g>
      <text x="0" y="40" font-size="20" font-weight="700" fill="#9CA3AF" text-anchor="middle">没有可恢复的项目</text>
      <text x="0" y="74" font-size="15" font-weight="500" fill="#B6BAC4" text-anchor="middle">自动恢复没有这份文件的记录</text>
    </g>
    <line x1="0" y1="416" x2="480" y2="416" stroke="#F3F4F6" stroke-width="1"/>
    <text x="24" y="446" font-size="14" font-weight="600" fill="#EF4444">强制结束前，从没按过 Ctrl+S</text>
  </g>

  <g transform="translate(1320, 820)">
    <use href="#keeply-lockup" width="200" height="50"/>
  </g>

  <g transform="translate(120, 840)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="1.5">P1 CLUSTER · 6 LOCALES · 自动恢复是崩溃缓冲，不是版本记录</text>
  </g>
</svg>
