<!-- Image 2: Keeply 時間軸 zoom-in：每筆檔案筆記顯示時間 + 變動行數 + 你之前的測試紀錄 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EF4444"/><stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <text x="600" y="48" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">KEEPLY 時間軸 · 找最後一筆能跑的版本</text>

  <!-- Keeply window -->
  <g transform="translate(80, 90)" filter="url(#shadow)">
    <rect width="1040" height="440" rx="10" fill="#ffffff"/>
    <path d="M0 10 Q0 0 10 0 L1030 0 Q1040 0 1040 10 L1040 50 L0 50 Z" fill="url(#g-indigo)"/>
    <text x="20" y="32" font-size="14" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">Keeply — my-project</text>

    <!-- timeline panel -->
    <rect x="0" y="50" width="420" height="390" fill="#F8F7FF"/>
    <text x="20" y="80" font-size="11" font-weight="800" fill="#4338CA" letter-spacing="2">時間軸 — 今天</text>
    <line x1="20" y1="92" x2="400" y2="92" stroke="#E0E7FF"/>

    <g font-family="system-ui,sans-serif">
      <!-- 失控狀態 -->
      <g transform="translate(20, 110)">
        <circle cx="6" cy="10" r="6" fill="url(#g-red)"/>
        <text x="22" y="14" font-size="13" font-weight="700" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">14:23 — 失控狀態</text>
        <text x="22" y="32" font-size="11" font-weight="500" fill="#DC2626" opacity="0.9">+12 檔 / -47 行 / build fail</text>
      </g>

      <g transform="translate(20, 158)">
        <circle cx="6" cy="10" r="5" fill="#FCA5A5"/>
        <text x="22" y="14" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.7">14:08 — AI fix #2</text>
        <text x="22" y="30" font-size="10" font-weight="500" fill="#6F6AF0" opacity="0.55">+5 檔 / build fail</text>
      </g>

      <g transform="translate(20, 200)">
        <circle cx="6" cy="10" r="5" fill="#FCA5A5"/>
        <text x="22" y="14" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.7">13:51 — AI fix #1</text>
        <text x="22" y="30" font-size="10" font-weight="500" fill="#6F6AF0" opacity="0.55">+3 檔 / build fail</text>
      </g>

      <g transform="translate(20, 242)">
        <circle cx="6" cy="10" r="5" fill="#FBBF24"/>
        <text x="22" y="14" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.85">13:30 — 加 feature 開始</text>
      </g>

      <!-- 最後能跑的版本 highlighted -->
      <g transform="translate(20, 282)">
        <rect x="-10" y="-2" width="380" height="62" rx="8" fill="url(#g-amber)" opacity="0.18" stroke="url(#g-amber)" stroke-width="2"/>
        <circle cx="6" cy="10" r="8" fill="url(#g-amber)"/>
        <path d="M2 10 L5 13 L11 7" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/>
        <text x="26" y="14" font-size="13" font-weight="800" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">13:00 — 最後能跑的版本</text>
        <text x="26" y="34" font-size="11" font-weight="700" fill="url(#g-amber)">★ 你記得這時候 tests pass</text>
        <text x="26" y="50" font-size="10" font-weight="500" fill="#312E81" opacity="0.65">build OK · 7 tests passed</text>
      </g>

      <g transform="translate(20, 360)" opacity="0.55">
        <circle cx="6" cy="10" r="5" fill="#9C98FF"/>
        <text x="22" y="14" font-size="13" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">12:30 — 自動儲存</text>
      </g>
    </g>

    <!-- detail panel -->
    <rect x="420" y="50" width="620" height="390" fill="#ffffff"/>
    <text x="444" y="84" font-size="14" font-weight="800" fill="#312E81">這一筆的內容（13:00）</text>
    <line x1="444" y1="100" x2="1016" y2="100" stroke="#E0E7FF"/>

    <!-- 檔案筆記 detail -->
    <g transform="translate(444, 120)" font-family="'JetBrains Mono',ui-monospace,monospace">
      <text x="0" y="0" font-size="13" font-weight="700" fill="#312E81">變動：handler.ts + 2 個檔案</text>

      <g transform="translate(0, 24)">
        <rect width="560" height="22" fill="#D1FAE5" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#059669">+ function handleRequest(req): Response</text>
      </g>
      <g transform="translate(0, 50)">
        <rect width="560" height="22" fill="#D1FAE5" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#059669">+ return new Response(data, { status: 200 })</text>
      </g>
      <g transform="translate(0, 76)">
        <rect width="560" height="22" fill="#D1FAE5" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#059669">+ }</text>
      </g>

      <!-- test 結果 -->
      <g transform="translate(0, 116)">
        <rect width="560" height="56" rx="6" fill="#ECFDF5" stroke="url(#g-green)" stroke-width="1.5"/>
        <text x="16" y="22" font-size="12" font-weight="800" fill="#059669" font-family="system-ui,sans-serif">$ npm test</text>
        <text x="16" y="42" font-size="11" font-weight="700" fill="#059669" font-family="system-ui,sans-serif">✓ 7 tests passed (143ms)</text>
      </g>

      <!-- 還原 button -->
      <g transform="translate(0, 200)" filter="url(#shadow)">
        <rect width="220" height="40" rx="20" fill="url(#g-amber)"/>
        <text x="110" y="26" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2" font-family="system-ui,sans-serif">↶ 還原到此</text>
      </g>
      <text x="240" y="226" font-size="12" font-weight="500" fill="#4338CA" opacity="0.7" font-family="system-ui,sans-serif">右鍵 → 還原 · 30 秒</text>
    </g>
  </g>

  <text x="600" y="568" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">點進去看變動內容 · 找你記得 OK 的版本</text>

</svg>
