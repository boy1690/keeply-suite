<text x="588" y="248" font-size="11" font-weight="600" fill="#F87171">~5%</text>
<text x="20" y="320" font-size="11" font-style="italic" fill="#6B7280">⚠ 4 가지 중 3 가지는 사전 준비가 필요. 나머지 1 가지는 운에 달렸음.</text>
