<!-- =============================================================
     Cover: time-machine-vs-dropbox (ko)
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grad-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="grad-number" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <pattern id="pat-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.12"/>
    </filter>
  </defs>

  <symbol id="keeply-mark" viewBox="0 0 512 512">
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#grad-indigo)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#grad-amber)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#grad-amber)"/>
    <rect x="220" y="150" width="152" height="206" rx="32" fill="url(#grad-indigo-deep)" opacity="0.48"/>
    <rect x="192" y="167" width="152" height="206" rx="32" fill="url(#grad-indigo-deep)" opacity="0.72"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#grad-indigo)"/>
  </symbol>

  <symbol id="keeply-lockup" viewBox="0 0 260 64">
    <g transform="translate(0,4) scale(0.11)"><use href="#keeply-mark"/></g>
    <text x="66" y="28" font-size="24" font-weight="800" fill="#312E81" font-family="system-ui,sans-serif" letter-spacing="0.2">Keeply</text>
    <text x="66" y="50" font-size="11" font-weight="600" fill="#4338CA" opacity="0.72" font-family="system-ui,sans-serif" letter-spacing="1.5">KEEPLY.WORK</text>
  </symbol>

  <symbol id="avatar-client" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="28" fill="url(#grad-indigo-deep)"/>
    <circle cx="30" cy="24" r="9" fill="#ffffff" opacity="0.95"/>
    <path d="M14 50 Q14 36 30 36 Q46 36 46 50 Z" fill="#ffffff" opacity="0.95"/>
  </symbol>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <rect width="1600" height="900" fill="url(#pat-grid)"/>
  <circle cx="1450" cy="780" r="200" fill="#FDE68A" opacity="0.28"/>
  <circle cx="1180" cy="200" r="240" fill="#DDD6FE" opacity="0.30"/>
  <line x1="720" y1="120" x2="720" y2="780" stroke="#C7D2FE" stroke-width="1" opacity="0.55" stroke-dasharray="4 8"/>

  <g transform="translate(120, 120)">
    <rect x="0" y="2" width="14" height="14" fill="url(#grad-amber)"/>
    <text x="28" y="14" font-size="17" font-weight="800" fill="#312E81" letter-spacing="4">THE THIRD AXIS</text>
    <text x="28" y="40" font-size="14" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="2">두 도구가 놓친 제3의 축 · EDITORIAL</text>
  </g>

  <g transform="translate(120, 230)">
    <text x="0" y="120" font-size="170" font-weight="900" fill="url(#grad-number)" letter-spacing="-6">제3의</text>
    <text x="0" y="300" font-size="170" font-weight="900" fill="url(#grad-number)" letter-spacing="-6">축</text>
    <path d="M0 330 L420 330" stroke="url(#grad-amber)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(120, 600)">
    <text x="0" y="0" font-size="26" font-weight="800" fill="#312E81">backup 도, sync 도 아닌</text>
    <text x="0" y="34" font-size="15" font-weight="500" fill="#4338CA" opacity="0.75">NOT BACKUP, NOT SYNC — THE THIRD AXIS</text>
  </g>

  <g transform="translate(120, 690)">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#312E81">Time Machine은 snapshot,</text>
    <text x="0" y="30" font-size="19" font-weight="700" fill="#312E81">Dropbox는 동기화 파일—원하는 <tspan fill="#F59E0B">그 버전</tspan>은 둘 다 없다</text>
  </g>

  <use href="#keeply-lockup" x="120" y="790" width="200" height="50"/>

  <g transform="translate(820, 130)">
    <use href="#avatar-client" x="0" y="0" width="56" height="56"/>
    <text x="68" y="14" font-size="13" font-weight="700" fill="#312E81">클라이언트</text>
    <text x="68" y="30" font-size="11" font-weight="500" fill="#4338CA" opacity="0.65">3개월 후·월요일 오전 10:14</text>
    <g transform="translate(68, 38)" filter="url(#soft-shadow)">
      <rect x="0" y="0" width="640" height="56" rx="14" fill="#ffffff"/>
      <path d="M0 36 L-12 24 L0 14 Z" fill="#ffffff"/>
      <text x="20" y="34" font-size="17" font-weight="700" fill="#312E81">"<tspan fill="#F59E0B">3개월 전</tspan>에 보여준 그 버전, 다시 꺼낼 수 있어?"</text>
    </g>
  </g>

  <g transform="translate(820, 260)">
    <circle cx="28" cy="28" r="28" fill="url(#grad-indigo)"/>
    <circle cx="28" cy="28" r="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="28" y1="28" x2="28" y2="14" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="28" x2="40" y2="28" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="28" cy="28" r="2.5" fill="#FFB300"/>
    <text x="70" y="16" font-size="14" font-weight="800" fill="#312E81">Time Machine</text>
    <text x="70" y="34" font-size="11" font-weight="500" fill="#4338CA" opacity="0.65">SPACE REDUNDANCY · 공간 중복</text>
    <g transform="translate(70, 44)" filter="url(#soft-shadow)">
      <rect x="0" y="0" width="600" height="68" rx="14" fill="url(#grad-indigo-deep)"/>
      <path d="M0 24 L-12 36 L0 46 Z" fill="url(#grad-indigo-deep)"/>
      <text x="20" y="30" font-size="15" font-weight="700" fill="#ffffff"><tspan fill="#FFB300">어젯밤 23:00</tspan> 전체 디스크 스냅샷은 있어</text>
      <text x="20" y="54" font-size="13" font-weight="500" fill="#ffffff" opacity="0.75">— 3개월 전? 여긴 지난주까지밖에 없어</text>
    </g>
    <g transform="translate(700, 60)">
      <circle cx="0" cy="0" r="26" fill="#FEE2E2"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#DC2626" stroke-width="2"/>
      <path d="M-10 -10 L10 10 M10 -10 L-10 10" stroke="#DC2626" stroke-width="3.5" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(820, 420)">
    <circle cx="28" cy="28" r="28" fill="url(#grad-indigo)"/>
    <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M14 22 L40 22"/>
      <path d="M36 18 L40 22 L36 26"/>
      <path d="M40 34 L14 34"/>
      <path d="M18 30 L14 34 L18 38"/>
    </g>
    <text x="70" y="16" font-size="14" font-weight="800" fill="#312E81">Dropbox</text>
    <text x="70" y="34" font-size="11" font-weight="500" fill="#4338CA" opacity="0.65">SYNC REDUNDANCY · 동기화 중복</text>
    <g transform="translate(70, 44)" filter="url(#soft-shadow)">
      <rect x="0" y="0" width="600" height="68" rx="14" fill="url(#grad-indigo-deep)"/>
      <path d="M0 24 L-12 36 L0 46 Z" fill="url(#grad-indigo-deep)"/>
      <text x="20" y="30" font-size="15" font-weight="700" fill="#ffffff">모든 기기의 <tspan fill="#FFB300">지금</tspan> 최신 버전은 가지고 있어</text>
      <text x="20" y="54" font-size="13" font-weight="500" fill="#ffffff" opacity="0.75">— 3개월 전 버전? 진작에 동기화로 덮어쓰였어</text>
    </g>
    <g transform="translate(700, 60)">
      <circle cx="0" cy="0" r="26" fill="#FEE2E2"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#DC2626" stroke-width="2"/>
      <path d="M-10 -10 L10 10 M10 -10 L-10 10" stroke="#DC2626" stroke-width="3.5" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(820, 580)">
    <circle cx="28" cy="28" r="28" fill="url(#grad-amber)"/>
    <g fill="#ffffff">
      <rect x="14" y="20" width="3" height="16" rx="1"/>
      <rect x="20" y="16" width="3" height="20" rx="1"/>
      <rect x="26" y="12" width="3" height="24" rx="1"/>
      <rect x="32" y="18" width="3" height="18" rx="1"/>
      <rect x="38" y="22" width="3" height="14" rx="1"/>
    </g>
    <text x="70" y="16" font-size="14" font-weight="800" fill="#F59E0B">버전 기록</text>
    <text x="70" y="34" font-size="11" font-weight="500" fill="#F59E0B" opacity="0.85" letter-spacing="1">TIME · 의도적으로 저장한 버전</text>
    <g transform="translate(70, 44)" filter="url(#soft-shadow)">
      <rect x="0" y="0" width="600" height="68" rx="14" fill="#FFFBEB" stroke="url(#grad-amber)" stroke-width="2"/>
      <path d="M0 24 L-12 36 L0 46 Z" fill="#FFFBEB"/>
      <text x="20" y="30" font-size="16" font-weight="700" fill="#312E81"><tspan fill="#F59E0B" font-weight="800">2026-02-13 16:42</tspan>의 그 버전</text>
      <text x="20" y="54" font-size="13" font-weight="500" fill="#4338CA">— 클라이언트에게 보여줄 때 태그한 그 시점, 더블클릭으로 복원</text>
    </g>
    <g transform="translate(700, 60)">
      <circle cx="0" cy="0" r="26" fill="#D1FAE5"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#059669" stroke-width="2"/>
      <path d="M-12 0 L-3 9 L12 -8" stroke="#059669" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(670, 92)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#F59E0B" opacity="0.85" letter-spacing="1">★ Keeply의 위치</text>
    </g>
  </g>

  <g transform="translate(820, 820)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="1">backup ≠ sync ≠ version history　·　세 축은 서로 대체할 수 없다</text>
  </g>

</svg>
