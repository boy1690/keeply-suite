<!-- Image 2: Dropbox + Google Drive — both hide version history -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.16"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Top label -->
  <text x="600" y="48" font-size="14" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">VERSION HISTORY · HIDDEN BY BOTH</text>

  <!-- LEFT: Dropbox right-click menu -->
  <g transform="translate(80, 90)">
    <text x="0" y="-10" font-size="13" font-weight="800" fill="#0061FF" letter-spacing="2" font-family="system-ui,sans-serif">▪ DROPBOX · right-click menu</text>
    <g filter="url(#shadow)">
      <rect width="480" height="430" rx="10" fill="#ffffff" stroke="#E0E7FF" stroke-width="1"/>
      <g font-family="system-ui,sans-serif">
        <text x="24" y="42" font-size="16" font-weight="500" fill="#312E81">Open</text>
        <text x="24" y="78" font-size="16" font-weight="500" fill="#312E81">Share...</text>
        <text x="24" y="114" font-size="16" font-weight="500" fill="#312E81">Copy link</text>
        <line x1="20" y1="138" x2="460" y2="138" stroke="#E0E7FF"/>
        <text x="24" y="170" font-size="16" font-weight="500" fill="#312E81">Open in Word</text>
        <text x="24" y="206" font-size="16" font-weight="500" fill="#312E81">Move to...</text>
        <line x1="20" y1="230" x2="460" y2="230" stroke="#E0E7FF"/>
        <!-- Highlighted: Version history (5th, hidden) -->
        <rect y="240" width="480" height="46" fill="#FFFBEB" stroke="url(#g-amber)" stroke-width="2"/>
        <text x="24" y="270" font-size="16" font-weight="800" fill="url(#g-amber)">Version history</text>
        <text x="456" y="270" font-size="14" font-weight="600" fill="#F59E0B" text-anchor="end">▸</text>
        <line x1="20" y1="298" x2="460" y2="298" stroke="#E0E7FF"/>
        <text x="24" y="330" font-size="16" font-weight="500" fill="#312E81">Rename</text>
        <text x="24" y="366" font-size="16" font-weight="500" fill="#312E81">Star</text>
        <text x="24" y="402" font-size="16" font-weight="500" fill="#DC2626">Delete</text>
      </g>
    </g>
    <!-- Note below -->
    <text x="240" y="468" font-size="12" font-weight="600" fill="#6F6AF0" text-anchor="middle">5th item · most users never click it</text>
  </g>

  <!-- RIGHT: Google Drive 管理版本 panel -->
  <g transform="translate(640, 90)">
    <text x="0" y="-10" font-size="13" font-weight="800" fill="#1A73E8" letter-spacing="2" font-family="system-ui,sans-serif">▪ GOOGLE DRIVE · 管理版本 dialog</text>
    <g filter="url(#shadow)">
      <rect width="480" height="430" rx="10" fill="#ffffff" stroke="#E0E7FF" stroke-width="1"/>
      <!-- Title bar -->
      <rect width="480" height="48" rx="10" fill="#F8F7FF"/>
      <rect y="36" width="480" height="12" fill="#F8F7FF"/>
      <text x="24" y="32" font-size="17" font-weight="600" fill="#312E81" font-family="system-ui,sans-serif">管理版本</text>
      <line x1="0" y1="48" x2="480" y2="48" stroke="#E0E7FF"/>
      <!-- Body content -->
      <g font-family="system-ui,sans-serif">
        <text x="24" y="86" font-size="13" font-weight="600" fill="#6F6AF0">「proposal.docx」的臨時版本可能會在</text>
        <rect x="280" y="74" width="80" height="20" rx="3" fill="#FFFBEB" stroke="url(#g-amber)" stroke-width="1.5"/>
        <text x="320" y="90" font-size="14" font-weight="800" fill="#F59E0B" text-anchor="middle">30 天</text>
        <text x="364" y="86" font-size="13" font-weight="600" fill="#6F6AF0">後刪除。</text>
        <text x="24" y="116" font-size="13" font-weight="600" fill="#6F6AF0">如要避免，請開啟版本選單，然後</text>
        <text x="24" y="138" font-size="13" font-weight="600" fill="#6F6AF0">選擇「永久保存」（手動逐個操作）。</text>
        <!-- Mini version list -->
        <rect x="20" y="170" width="440" height="180" rx="6" fill="#F8F7FF"/>
        <text x="32" y="194" font-size="11" font-weight="700" fill="#4338CA" letter-spacing="1.5">VERSION LIST · oldest first</text>
        <line x1="32" y1="204" x2="448" y2="204" stroke="#E0E7FF"/>
        <g font-family="'JetBrains Mono',ui-monospace,monospace">
          <text x="32" y="226" font-size="12" font-weight="500" fill="#6F6AF0">Apr 4 — Anna  ⓘ 30 天後刪</text>
          <text x="32" y="250" font-size="12" font-weight="500" fill="#6F6AF0">Apr 2 — Brian ⓘ 30 天後刪</text>
          <text x="32" y="274" font-size="12" font-weight="500" fill="#6F6AF0">Mar 28 — Anna ⓘ 30 天後刪</text>
          <text x="32" y="298" font-size="12" font-weight="500" fill="#6F6AF0">Mar 22 — Carol ⓘ 30 天後刪</text>
          <text x="32" y="322" font-size="12" font-weight="500" fill="#DC2626">Mar 8 — (deleted, was 30+ days)</text>
        </g>
        <!-- Upload new version btn -->
        <rect x="32" y="368" width="180" height="36" rx="18" fill="#ffffff" stroke="#4338CA" stroke-width="1"/>
        <text x="122" y="392" font-size="13" font-weight="600" fill="#4338CA" text-anchor="middle">⬆ 上傳新版本</text>
      </g>
    </g>
    <!-- Note below -->
    <text x="240" y="468" font-size="12" font-weight="600" fill="#6F6AF0" text-anchor="middle">3 menus deep · same 30-day cap</text>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="572" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">SAME PROBLEM · TWO PRODUCT LOGOS</text>

</svg>
