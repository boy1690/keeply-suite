<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, system-ui, sans-serif">
  <!-- host-app illustration: a pasta de cache UnsavedFiles no Explorador de Arquivos — recuperar-documento-word-nao-salvo (pt) -->
  <rect x="0" y="0" width="640" height="380" rx="8" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>

  <!-- window title bar -->
  <rect x="0" y="0" width="640" height="36" rx="8" fill="#F3F2F1"/>
  <rect x="0" y="18" width="640" height="18" fill="#F3F2F1"/>
  <text x="16" y="23" font-size="12" font-weight="600" fill="#323130">📁  UnsavedFiles</text>
  <text x="612" y="23" font-size="13" fill="#605E5C" text-anchor="end">—  ☐  ✕</text>

  <!-- address bar -->
  <rect x="16" y="46" width="608" height="28" rx="3" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>
  <text x="28" y="64" font-size="10" fill="#323130">Este Computador ▸ Disco Local (C:) ▸ Usuários ▸ Nome ▸ AppData ▸ Local ▸ Microsoft ▸ Office ▸ UnsavedFiles</text>

  <!-- column headers -->
  <line x1="16" y1="90" x2="624" y2="90" stroke="#EDEBE9" stroke-width="1"/>
  <text x="28" y="106" font-size="11" font-weight="700" fill="#605E5C">Nome</text>
  <text x="360" y="106" font-size="11" font-weight="700" fill="#605E5C">Data de modificação</text>
  <text x="540" y="106" font-size="11" font-weight="700" fill="#605E5C">Tipo</text>
  <line x1="16" y1="114" x2="624" y2="114" stroke="#EDEBE9" stroke-width="1"/>

  <!-- rows -->
  <text x="28" y="138" font-size="12" fill="#323130">📄  Parecer_mensal ((Não salvo)).asd</text>
  <text x="360" y="138" font-size="11" fill="#605E5C">Hoje 11:15</text>
  <text x="540" y="138" font-size="11" fill="#605E5C">Arquivo ASD</text>
  <line x1="16" y1="150" x2="624" y2="150" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="172" font-size="12" fill="#323130">📄  Documento1 ((Não salvo)).asd</text>
  <text x="360" y="172" font-size="11" fill="#605E5C">Hoje 09:02</text>
  <text x="540" y="172" font-size="11" fill="#605E5C">Arquivo ASD</text>
  <line x1="16" y1="184" x2="624" y2="184" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="206" font-size="12" fill="#323130">📄  Contrato ((Não salvo)).asd</text>
  <text x="360" y="206" font-size="11" fill="#605E5C">19/05 16:48</text>
  <text x="540" y="206" font-size="11" fill="#605E5C">Arquivo ASD</text>
  <line x1="16" y1="218" x2="624" y2="218" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="240" font-size="12" fill="#A19F9D">📄  Rascunho ((Não salvo)).asd</text>
  <text x="360" y="240" font-size="11" fill="#C8C6C4">15/05 — esvaziado</text>
  <text x="540" y="240" font-size="11" fill="#C8C6C4">(sumiu)</text>

  <!-- status / caption -->
  <rect x="0" y="332" width="640" height="48" fill="#FBF6EC"/>
  <line x1="0" y1="332" x2="640" y2="332" stroke="#F0E3C8" stroke-width="1"/>
  <text x="16" y="352" font-size="11.5" fill="#8A6D1A">⏳  É um cache temporário, não uma pasta de backup.</text>
  <text x="16" y="369" font-size="11.5" fill="#8A6D1A">O Word a esvazia sozinho — entradas antigas (como Rascunho, acima) somem sem aviso.</text>
</svg>
