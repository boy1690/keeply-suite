<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Segoe UI, system-ui, sans-serif">
  <!-- host-app illustration: the UnsavedFiles cache folder in File Explorer — excel-unsaved-recovery (en) -->
  <rect x="0" y="0" width="640" height="380" rx="8" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>

  <!-- window title bar -->
  <rect x="0" y="0" width="640" height="36" rx="8" fill="#F3F2F1"/>
  <rect x="0" y="18" width="640" height="18" fill="#F3F2F1"/>
  <text x="16" y="23" font-size="12" font-weight="600" fill="#323130">📁  UnsavedFiles</text>
  <text x="612" y="23" font-size="13" fill="#605E5C" text-anchor="end">—  ☐  ✕</text>

  <!-- address bar -->
  <rect x="16" y="46" width="608" height="28" rx="3" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>
  <text x="28" y="64" font-size="11" fill="#323130">This PC ▸ Local Disk (C:) ▸ Users ▸ you ▸ AppData ▸ Local ▸ Microsoft ▸ Office ▸ UnsavedFiles</text>

  <!-- column headers -->
  <line x1="16" y1="90" x2="624" y2="90" stroke="#EDEBE9" stroke-width="1"/>
  <text x="28" y="106" font-size="11" font-weight="700" fill="#605E5C">Name</text>
  <text x="360" y="106" font-size="11" font-weight="700" fill="#605E5C">Date modified</text>
  <text x="520" y="106" font-size="11" font-weight="700" fill="#605E5C">Type</text>
  <line x1="16" y1="114" x2="624" y2="114" stroke="#EDEBE9" stroke-width="1"/>

  <!-- rows -->
  <text x="28" y="138" font-size="12" fill="#323130">📊  Q2_report ((Unsaved)).xlsb</text>
  <text x="360" y="138" font-size="11" fill="#605E5C">Today 11:15 AM</text>
  <text x="520" y="138" font-size="11" fill="#605E5C">XLSB File</text>
  <line x1="16" y1="150" x2="624" y2="150" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="172" font-size="12" fill="#323130">📊  Book1 ((Unsaved)).xlsb</text>
  <text x="360" y="172" font-size="11" fill="#605E5C">Today 09:02 AM</text>
  <text x="520" y="172" font-size="11" fill="#605E5C">XLSB File</text>
  <line x1="16" y1="184" x2="624" y2="184" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="206" font-size="12" fill="#323130">📊  forecast ((Unsaved)).xlsb</text>
  <text x="360" y="206" font-size="11" fill="#605E5C">05/19 04:48 PM</text>
  <text x="520" y="206" font-size="11" fill="#605E5C">XLSB File</text>
  <line x1="16" y1="218" x2="624" y2="218" stroke="#F3F2F1" stroke-width="1"/>

  <text x="28" y="240" font-size="12" fill="#A19F9D">📊  budget ((Unsaved)).xlsb</text>
  <text x="360" y="240" font-size="11" fill="#C8C6C4">05/15 — cleared</text>
  <text x="520" y="240" font-size="11" fill="#C8C6C4">(gone)</text>

  <!-- status / caption -->
  <rect x="0" y="332" width="640" height="48" fill="#FBF6EC"/>
  <line x1="0" y1="332" x2="640" y2="332" stroke="#F0E3C8" stroke-width="1"/>
  <text x="16" y="352" font-size="11.5" fill="#8A6D1A">⏳  This is a temporary cache, not a backup folder.</text>
  <text x="16" y="369" font-size="11.5" fill="#8A6D1A">Excel clears it on its own — older entries (like budget, above) quietly disappear.</text>
</svg>
