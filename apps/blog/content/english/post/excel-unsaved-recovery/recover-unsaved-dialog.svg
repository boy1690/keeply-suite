<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, system-ui, sans-serif">
  <!-- host-app illustration: Excel "Recover Unsaved Workbooks" — excel-unsaved-recovery (en) -->
  <rect x="0" y="0" width="640" height="400" rx="8" fill="#F3F2F1" stroke="#D2D0CE" stroke-width="1"/>

  <!-- breadcrumb / how-to path -->
  <rect x="0" y="0" width="640" height="40" rx="8" fill="#217346"/>
  <rect x="0" y="20" width="640" height="20" fill="#217346"/>
  <text x="16" y="25" font-size="13" font-weight="700" fill="#FFFFFF">Excel</text>
  <text x="74" y="25" font-size="12" fill="#D7EEE0">File  ▸  Info  ▸  Manage Workbook  ▸  Recover Unsaved Workbooks</text>

  <!-- open-style dialog -->
  <rect x="40" y="64" width="560" height="300" rx="6" fill="#FFFFFF" stroke="#C8C6C4" stroke-width="1"/>
  <rect x="40" y="64" width="560" height="34" rx="6" fill="#FAF9F8"/>
  <rect x="40" y="86" width="560" height="12" fill="#FAF9F8"/>
  <text x="56" y="86" font-size="13" font-weight="600" fill="#323130">Open — Recover Unsaved Workbooks</text>
  <text x="584" y="86" font-size="14" fill="#605E5C" text-anchor="end">✕</text>

  <!-- address bar -->
  <rect x="56" y="108" width="528" height="26" rx="3" fill="#FFFFFF" stroke="#D2D0CE" stroke-width="1"/>
  <text x="66" y="125" font-size="11" fill="#605E5C">C:\Users\you\AppData\Local\Microsoft\Office\UnsavedFiles</text>

  <!-- column headers -->
  <line x1="56" y1="148" x2="584" y2="148" stroke="#EDEBE9" stroke-width="1"/>
  <text x="66" y="164" font-size="11" font-weight="700" fill="#605E5C">Name</text>
  <text x="380" y="164" font-size="11" font-weight="700" fill="#605E5C">Date modified</text>
  <text x="520" y="164" font-size="11" font-weight="700" fill="#605E5C">Type</text>
  <line x1="56" y1="172" x2="584" y2="172" stroke="#EDEBE9" stroke-width="1"/>

  <!-- selected row -->
  <rect x="56" y="172" width="528" height="30" fill="#E7F2EC"/>
  <text x="66" y="192" font-size="12" fill="#323130">📊  Q2_report ((Unsaved)).xlsb</text>
  <text x="380" y="192" font-size="11" fill="#605E5C">Today 11:15 AM</text>
  <text x="520" y="192" font-size="11" fill="#605E5C">.xlsb</text>

  <!-- other rows -->
  <text x="66" y="222" font-size="12" fill="#323130">📊  Book1 ((Unsaved)).xlsb</text>
  <text x="380" y="222" font-size="11" fill="#605E5C">Today 09:02 AM</text>
  <text x="520" y="222" font-size="11" fill="#605E5C">.xlsb</text>
  <line x1="56" y1="232" x2="584" y2="232" stroke="#F3F2F1" stroke-width="1"/>

  <text x="66" y="252" font-size="12" fill="#323130">📊  forecast ((Unsaved)).xlsb</text>
  <text x="380" y="252" font-size="11" fill="#605E5C">05/19 04:48 PM</text>
  <text x="520" y="252" font-size="11" fill="#605E5C">.xlsb</text>

  <!-- buttons -->
  <rect x="392" y="316" width="88" height="30" rx="3" fill="#217346"/>
  <text x="436" y="335" font-size="12" fill="#FFFFFF" text-anchor="middle">Open</text>
  <rect x="492" y="316" width="92" height="30" rx="3" fill="#FFFFFF" stroke="#C8C6C4" stroke-width="1"/>
  <text x="538" y="335" font-size="12" fill="#323130" text-anchor="middle">Cancel</text>

  <!-- caption -->
  <text x="40" y="388" font-size="11" fill="#A19F9D">The recovered file is a temporary .xlsb in the UnsavedFiles cache — Save As to keep it.</text>
</svg>
