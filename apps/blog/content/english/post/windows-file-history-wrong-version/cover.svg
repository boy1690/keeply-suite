<!-- =============================================================
     Cover: windows-file-history-wrong-version (zh-TW master)
     Kit version: 0.1
     Recipe: Timeline gap reveal — 我問昨天，它給我 2019
     Layout: 大數字 2019 + 對比 timeline gap visual
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grad-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="grad-big-number" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#92400E"/>
    </linearGradient>
    <pattern id="pat-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.12"/>
    </filter>
  </defs>

  <symbol id="keeply-mark" viewBox="0 0 512 512">
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#grad-indigo)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#grad-amber)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#grad-amber)"/>
    <rect x="220" y="150" width="152" height="206" rx="32" fill="url(#grad-indigo-deep)" opacity="0.48"/>
    <rect x="192" y="167" width="152" height="206" rx="32" fill="url(#grad-indigo-deep)" opacity="0.72"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#grad-indigo)"/>
  </symbol>

  <symbol id="keeply-lockup" viewBox="0 0 260 64">
    <g transform="translate(0,4) scale(0.11)"><use href="#keeply-mark"/></g>
    <text x="66" y="28" font-size="24" font-weight="800" fill="#312E81" font-family="system-ui,sans-serif" letter-spacing="0.2">Keeply</text>
    <text x="66" y="50" font-size="11" font-weight="600" fill="#4338CA" opacity="0.72" font-family="system-ui,sans-serif" letter-spacing="1.5">KEEPLY.WORK</text>
  </symbol>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <rect width="1600" height="900" fill="url(#pat-grid)"/>

  <!-- Top eyebrow -->
  <g transform="translate(96,84)">
    <rect width="14" height="36" fill="url(#grad-amber)"/>
    <text x="28" y="20" font-size="16" font-weight="800" fill="#312E81" letter-spacing="2.4">WHEN A SNAPSHOT MISSES</text>
    <text x="28" y="40" font-size="13" font-weight="600" fill="#4338CA" opacity="0.7" letter-spacing="1.2">Windows Backup Series ‧ EDITORIAL</text>
  </g>

  <!-- Left text -->
  <g transform="translate(96,210)">
    <text font-size="48" font-weight="800" fill="#312E81" letter-spacing="-0.5">
      <tspan x="0" y="60">I asked File History</tspan>
      <tspan x="0" y="124">"give me yesterday's"</tspan>
    </text>
    <text x="0" y="200" font-size="32" font-weight="600" fill="#4338CA" opacity="0.8">what it returned——</text>

    <!-- Big year number -->
    <text x="0" y="430" font-size="280" font-weight="900" fill="url(#grad-big-number)" letter-spacing="-8">2019</text>

    <text x="0" y="500" font-size="24" font-weight="700" fill="#92400E">Keeply doesn't have this blind spot</text>
    <text x="0" y="538" font-size="20" font-weight="500" fill="#4338CA" opacity="0.7">Runs locally, notes on every version, no drive needed</text>
  </g>

  <!-- Right timeline visualization -->
  <g transform="translate(960,200)" filter="url(#soft-shadow)">
    <rect width="560" height="540" rx="24" fill="white"/>

    <!-- Timeline label -->
    <text x="32" y="48" font-size="14" font-weight="800" fill="#4338CA" letter-spacing="1.8">FILE HISTORY TIMELINE</text>
    <text x="32" y="72" font-size="12" font-weight="600" fill="#4338CA" opacity="0.6">Drive connection decides whether snapshots exist</text>

    <!-- Today (top) -->
    <circle cx="60" cy="120" r="14" fill="url(#grad-indigo)"/>
    <text x="92" y="115" font-size="20" font-weight="800" fill="#312E81">Today</text>
    <text x="92" y="138" font-size="14" font-weight="500" fill="#4338CA" opacity="0.7">The draft I want (yesterday 14:47)</text>
    <text x="430" y="125" font-size="22" font-weight="800" fill="#DC2626">⚠ Not captured</text>

    <!-- Gap line with dashes -->
    <line x1="60" y1="140" x2="60" y2="380" stroke="url(#grad-indigo)" stroke-width="3" stroke-dasharray="6 8" opacity="0.4"/>

    <!-- Gap label -->
    <rect x="160" y="220" width="380" height="80" rx="12" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
    <text x="350" y="252" font-size="16" font-weight="800" fill="#92400E" text-anchor="middle">18-month gap</text>
    <text x="350" y="278" font-size="13" font-weight="500" fill="#92400E" opacity="0.85" text-anchor="middle">Drive went with the laptop, never plugged in</text>

    <!-- 2019 (bottom) -->
    <circle cx="60" cy="400" r="14" fill="url(#grad-amber)"/>
    <text x="92" y="395" font-size="20" font-weight="800" fill="#312E81">2019</text>
    <text x="92" y="418" font-size="14" font-weight="500" fill="#4338CA" opacity="0.7">Last snapshot (before drive went offline)</text>
    <text x="430" y="405" font-size="22" font-weight="800" fill="#059669">← It returned this</text>

    <!-- Bottom annotation — Keeply pinned as solution -->
    <rect x="32" y="450" width="496" height="64" rx="10" fill="url(#grad-indigo)"/>
    <text x="48" y="478" font-size="14" font-weight="800" fill="white">Keeply: runs locally, every version can have a note</text>
    <text x="48" y="500" font-size="13" font-weight="500" fill="white" opacity="0.92">"After the meeting" gets its own row — no guessing timestamps.</text>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="820" width="1600" height="80" fill="url(#grad-indigo-deep)"/>
  <g transform="translate(96,840)">
    <use href="#keeply-lockup" width="260" height="64"/>
  </g>
  <text x="1504" y="868" font-size="16" font-weight="700" fill="white" opacity="0.85" text-anchor="end" letter-spacing="1.2">KEEPLY HAS NEITHER BLIND SPOT</text>
</svg>
