<!-- Image 1: The Storage-Locus Test — decision matrix (location → verdict → first move). Signature/citable visual. en. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <text x="600" y="46" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">THE STORAGE-LOCUS TEST · WHERE YOUR FILE LIVED DECIDES THE VERDICT</text>

  <g transform="translate(70, 80)" filter="url(#shadow)">
    <rect width="1060" height="476" rx="14" fill="#ffffff"/>

    <!-- header bar -->
    <path d="M0 14 Q0 0 14 0 L1046 0 Q1060 0 1060 14 L1060 56 L0 56 Z" fill="url(#g-indigo)"/>
    <text x="36" y="35" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1.5">WHERE THE FILE LIVED</text>
    <text x="560" y="35" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1.5">VERDICT</text>
    <text x="770" y="35" font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1.5">YOUR FIRST MOVE</text>

    <!-- row 1 — cloud ✅ -->
    <g transform="translate(0,56)">
      <rect x="0" y="0" width="1060" height="102" fill="#ffffff"/>
      <line x1="0" y1="102" x2="1060" y2="102" stroke="#E0E7FF" stroke-width="1"/>
      <text x="36" y="44" font-size="19" font-weight="700" fill="#312E81">In the cloud</text>
      <text x="36" y="72" font-size="13" fill="#6366F1">Dropbox · OneDrive · Google Drive · SharePoint · iCloud</text>
      <rect x="540" y="33" width="150" height="36" rx="18" fill="#DCFCE7"/>
      <text x="560" y="56" font-size="14" font-weight="700" fill="#15803D">✓ Usually yes</text>
      <text x="770" y="50" font-size="15" fill="#312E81">Restore the prior version</text>
    </g>

    <!-- row 2 — local + backup ✅ -->
    <g transform="translate(0,158)">
      <rect x="0" y="0" width="1060" height="102" fill="#ffffff"/>
      <line x1="0" y1="102" x2="1060" y2="102" stroke="#E0E7FF" stroke-width="1"/>
      <text x="36" y="44" font-size="19" font-weight="700" fill="#312E81">Local disk, with a backup</text>
      <text x="36" y="72" font-size="13" fill="#6366F1">Time Machine · File History · Previous Versions</text>
      <rect x="540" y="33" width="150" height="36" rx="18" fill="#DCFCE7"/>
      <text x="560" y="56" font-size="14" font-weight="700" fill="#15803D">✓ Usually yes</text>
      <text x="770" y="50" font-size="15" fill="#312E81">Restore the snapshot</text>
    </g>

    <!-- row 3 — local SSD, no backup ❌ (the killshot row, tinted) -->
    <g transform="translate(0,260)">
      <rect x="0" y="0" width="1060" height="108" fill="#FEF2F2"/>
      <rect x="0" y="0" width="6" height="108" fill="#DC2626"/>
      <line x1="0" y1="108" x2="1060" y2="108" stroke="#E0E7FF" stroke-width="1"/>
      <text x="36" y="46" font-size="19" font-weight="800" fill="#991B1B">Local SSD, no backup</text>
      <text x="36" y="76" font-size="13" fill="#B91C1C">TRIM has already wiped the freed blocks</text>
      <rect x="540" y="36" width="150" height="36" rx="18" fill="#FEE2E2"/>
      <text x="560" y="59" font-size="14" font-weight="800" fill="#DC2626">✕ Usually gone</text>
      <text x="770" y="46" font-size="15" font-weight="700" fill="#991B1B">Stop. Don't buy</text>
      <text x="770" y="68" font-size="15" font-weight="700" fill="#991B1B">recovery software</text>
    </g>

    <!-- row 4 — local HDD, no backup ⚠️ -->
    <g transform="translate(0,368)">
      <rect x="0" y="0" width="1060" height="108" fill="#ffffff"/>
      <text x="36" y="46" font-size="19" font-weight="700" fill="#312E81">Local hard drive (HDD), no backup</text>
      <text x="36" y="74" font-size="13" fill="#6366F1">No TRIM — a slim, fast-closing window</text>
      <rect x="540" y="35" width="160" height="36" rx="18" fill="#FEF3C7"/>
      <text x="560" y="58" font-size="14" font-weight="700" fill="#B45309">! Slim, closing</text>
      <text x="770" y="48" font-size="15" fill="#312E81">Stop using the drive;</text>
      <text x="770" y="70" font-size="15" fill="#312E81">a pro lab is the only shot</text>
    </g>
  </g>

  <text x="600" y="586" font-size="12" fill="#6366F1" text-anchor="middle">Three checks: where it lived · how long ago · what was backing it up</text>
</svg>
