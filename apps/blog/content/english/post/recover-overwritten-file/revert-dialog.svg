<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Inter','Noto Sans TC','PingFang TC','Microsoft JhengHei','Noto Sans JP','Noto Sans KR',-apple-system,system-ui,sans-serif">
<rect x="0" y="0" width="480" height="280" fill="#F3F4F6"/>
<rect x="40" y="32" width="400" height="216" rx="8" fill="#FFFFFF" stroke="#E5E7EB" filter="drop-shadow(0 4px 8px rgba(0,0,0,.1))"/>
<text x="56" y="60" font-size="15" font-weight="700" fill="#1F2937">Revert monthly_report.xlsx to this version?</text>
