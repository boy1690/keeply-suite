<!-- Image 4: Keeply Timeline + 檔案筆記 視覺 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <text x="600" y="48" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">KEEPLY Timeline · every save = one file note</text>

  <!-- Keeply 視窗 mockup -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <rect width="1040" height="440" rx="10" fill="#ffffff"/>

    <!-- Title bar -->
    <path d="M0 10 Q0 0 10 0 L1030 0 Q1040 0 1040 10 L1040 50 L0 50 Z" fill="url(#g-indigo)"/>
    <text x="20" y="32" font-size="14" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">Keeply — my-project</text>

    <!-- 左側 sidebar -->
    <rect x="0" y="50" width="280" height="390" fill="#F8F7FF"/>
    <text x="20" y="80" font-size="11" font-weight="800" fill="#4338CA" letter-spacing="2">Timeline</text>
    <line x1="20" y1="92" x2="260" y2="92" stroke="#E0E7FF"/>

    <!-- Timeline節點 -->
    <g font-family="system-ui,sans-serif">
      <!-- Today -->
      <text x="20" y="116" font-size="11" font-weight="700" fill="#312E81" opacity="0.8">Today</text>
      <g transform="translate(20, 130)">
        <circle cx="6" cy="6" r="6" fill="url(#g-amber)"/>
        <text x="22" y="10" font-size="13" font-weight="700" fill="#312E81">14:23 — 1 file updated</text>
      </g>
      <g transform="translate(20, 156)" opacity="0.85">
        <circle cx="6" cy="6" r="6" fill="url(#g-indigo)"/>
        <text x="22" y="10" font-size="13" font-weight="500" fill="#312E81">11:50 — autosave</text>
      </g>
      <g transform="translate(20, 182)" opacity="0.85">
        <circle cx="6" cy="6" r="6" fill="url(#g-indigo)"/>
        <text x="22" y="10" font-size="13" font-weight="500" fill="#312E81">10:12 — autosave</text>
      </g>

      <text x="20" y="216" font-size="11" font-weight="700" fill="#312E81" opacity="0.8">Yesterday</text>
      <g transform="translate(20, 230)" opacity="0.85">
        <circle cx="6" cy="6" r="6" fill="url(#g-indigo)"/>
        <text x="22" y="10" font-size="13" font-weight="500" fill="#312E81">19:08 — 3 files updated</text>
      </g>
      <g transform="translate(20, 256)" opacity="0.7">
        <circle cx="6" cy="6" r="6" fill="url(#g-indigo)"/>
        <text x="22" y="10" font-size="13" font-weight="500" fill="#312E81">15:32 — autosave</text>
      </g>

      <text x="20" y="290" font-size="11" font-weight="700" fill="#312E81" opacity="0.6">2 days ago</text>
      <g transform="translate(20, 304)" opacity="0.6">
        <circle cx="6" cy="6" r="6" fill="url(#g-indigo)"/>
        <text x="22" y="10" font-size="13" font-weight="500" fill="#312E81">10:45 — 1 file updated</text>
      </g>
    </g>

    <!-- 右側 detail panel -->
    <rect x="280" y="50" width="760" height="390" fill="#ffffff"/>

    <!-- 檔案筆記 panel 標題 -->
    <text x="304" y="84" font-size="14" font-weight="800" fill="#312E81">File-note contents</text>
    <text x="304" y="106" font-size="12" font-weight="500" fill="#4338CA" opacity="0.7">2026/04/29 14:23 · 1 file changed</text>
    <line x1="304" y1="120" x2="1016" y2="120" stroke="#E0E7FF"/>

    <!-- diff 內容 -->
    <g transform="translate(304, 140)" font-family="'JetBrains Mono',ui-monospace,monospace">
      <text x="0" y="0" font-size="13" font-weight="700" fill="#312E81">Edit proposal.docx</text>

      <!-- diff 行 -->
      <g transform="translate(0, 28)">
        <rect width="700" height="22" fill="#FEE2E2" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#DC2626">- Client feedback round 3, budget needs re-evaluation</text>
      </g>
      <g transform="translate(0, 54)">
        <rect width="700" height="22" fill="#D1FAE5" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#059669">+ Adjusted client feedback round 3 + budget up 8%</text>
      </g>
      <g transform="translate(0, 82)">
        <rect width="700" height="22" fill="#D1FAE5" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#059669">+ Add appendix B: schedule details</text>
      </g>
      <g transform="translate(0, 110)">
        <rect width="700" height="22" fill="#D1FAE5" opacity="0.5"/>
        <text x="8" y="16" font-size="11" font-weight="500" fill="#059669">+ 200 words added in total</text>
      </g>

      <!-- 統計 stamp -->
      <g transform="translate(0, 156)">
        <rect width="160" height="32" rx="6" fill="#FFFBEB" stroke="url(#g-amber)" stroke-width="1.5"/>
        <text x="80" y="20" font-size="12" font-weight="800" fill="url(#g-amber)" text-anchor="middle" font-family="system-ui,sans-serif">+200 words / -1 paragraph</text>
      </g>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="568" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">Edit · save · automatically logged · no buttons to press</text>

</svg>
