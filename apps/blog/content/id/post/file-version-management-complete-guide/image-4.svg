      <g transform="translate(28,182)"><rect width="22" height="28" rx="2" fill="url(#g-indigo)"/></g>
      <text x="64" y="198" font-size="16" font-weight="500" fill="#312E81">cover_v3.psd</text>
      <text x="700" y="198" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">Mar 19</text>
      <text x="900" y="198" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">248 MB</text>
      <!-- Row 4 -->
      <rect y="214" width="1040" height="44" fill="#F8F7FF"/>
      <g transform="translate(28,226)"><rect width="22" height="28" rx="2" fill="url(#g-indigo)"/></g>
      <text x="64" y="242" font-size="16" font-weight="500" fill="#312E81">cover_v3_final.psd</text>
      <text x="700" y="242" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">Mar 24</text>
      <text x="900" y="242" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">256 MB</text>
