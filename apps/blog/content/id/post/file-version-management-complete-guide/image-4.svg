      <g transform="translate(28,402)"><rect width="22" height="28" rx="2" fill="url(#g-indigo)"/></g>
      <text x="64" y="418" font-size="16" font-weight="500" fill="#312E81">cover_USE_THIS_ONE.psd</text>
      <text x="700" y="418" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">Apr 5</text>
      <text x="900" y="418" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">271 MB</text>
