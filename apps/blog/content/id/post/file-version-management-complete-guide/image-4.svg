    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#312E81" flood-opacity="0.18"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Top label -->
  <g transform="translate(60, 60)">
    <text x="0" y="0" font-size="14" font-weight="800" fill="#312E81" letter-spacing="3">COMPANY NAS · DESIGN PROJECT FOLDER</text>
  </g>

  <!-- NAS folder window -->
  <g transform="translate(80, 110)" filter="url(#shadow)">
    <rect width="1040" height="430" rx="10" fill="#ffffff"/>
    <!-- Title bar -->
    <rect width="1040" height="46" rx="10" fill="url(#g-indigo-deep)"/>
    <rect y="32" width="1040" height="14" fill="url(#g-indigo-deep)"/>
    <text x="24" y="30" font-size="15" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">📁 NAS › Design › Cover Q4</text>
    <!-- Window controls -->
    <g transform="translate(950, 12)" stroke="#ffffff" stroke-width="2" opacity="0.7">
      <line x1="0" y1="14" x2="14" y2="14" stroke-linecap="round"/>
      <rect x="26" y="0" width="14" height="14" rx="1" fill="none"/>
      <line x1="56" y1="0" x2="68" y2="14" stroke-linecap="round"/>
      <line x1="68" y1="0" x2="56" y2="14" stroke-linecap="round"/>
