  <!-- Bottom caption -->
  <text x="600" y="570" font-size="16" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">8 FILES · ALL THE SAME PROJECT · THIS IS YOUR VERSION HISTORY</text>

