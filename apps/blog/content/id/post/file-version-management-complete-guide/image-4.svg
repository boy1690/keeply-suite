    <text x="28" y="68" font-size="11" font-weight="700" fill="#4338CA" letter-spacing="2" font-family="system-ui,sans-serif">NAME</text>
    <text x="700" y="68" font-size="11" font-weight="700" fill="#4338CA" letter-spacing="2" font-family="system-ui,sans-serif">MODIFIED</text>
    <text x="900" y="68" font-size="11" font-weight="700" fill="#4338CA" letter-spacing="2" font-family="system-ui,sans-serif">SIZE</text>
    <line x1="0" y1="82" x2="1040" y2="82" stroke="#E0E7FF"/>

