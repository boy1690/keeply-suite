      <g transform="translate(28,138)"><rect width="22" height="28" rx="2" fill="url(#g-indigo)"/></g>
      <text x="64" y="154" font-size="16" font-weight="500" fill="#312E81">cover_v2.psd</text>
      <text x="700" y="154" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">Mar 12</text>
      <text x="900" y="154" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">232 MB</text>
      <!-- Row 3 -->
