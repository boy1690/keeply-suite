      <g transform="translate(28,270)"><rect width="22" height="28" rx="2" fill="url(#g-indigo)"/></g>
      <text x="64" y="286" font-size="16" font-weight="500" fill="#312E81">cover_v3_final_real.psd</text>
      <text x="700" y="286" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">Mar 28</text>
      <text x="900" y="286" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">261 MB</text>
      <!-- Row 6 (highlight: _v3_final_FINAL) -->
      <rect y="302" width="1040" height="44" fill="#FFFBEB"/>
      <rect y="302" width="6" height="44" fill="url(#g-amber)"/>
      <g transform="translate(28,314)"><rect width="22" height="28" rx="2" fill="url(#g-amber)"/></g>
      <text x="64" y="330" font-size="16" font-weight="700" fill="#312E81">cover_v3_final_<tspan fill="#F59E0B">FINAL</tspan>.psd</text>
      <text x="700" y="330" font-size="13" font-weight="700" fill="#F59E0B" font-family="system-ui,sans-serif">Apr 2</text>
      <text x="900" y="330" font-size="13" font-weight="700" fill="#F59E0B" font-family="system-ui,sans-serif">268 MB</text>
      <!-- Row 7 -->
      <rect y="346" width="1040" height="44" fill="#F8F7FF"/>
      <g transform="translate(28,358)"><rect width="22" height="28" rx="2" fill="url(#g-indigo)"/></g>
      <text x="64" y="374" font-size="16" font-weight="500" fill="#312E81">cover_v3_finalfinal.psd</text>
      <text x="700" y="374" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">Apr 4</text>
      <text x="900" y="374" font-size="13" font-weight="500" fill="#6F6AF0" opacity="0.7" font-family="system-ui,sans-serif">271 MB</text>
      <!-- Row 8 (final mockery) -->
