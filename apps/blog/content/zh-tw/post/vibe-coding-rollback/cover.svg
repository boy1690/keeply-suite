<!-- =============================================================
     Cover: vibe-coding-rollback (cluster of PILLAR 3)
     Recipe: 失控對比 — AI 衝太遠 vs Keeply 時間軸把它叫回來
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter','Noto Sans TC','PingFang TC',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="grad-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EF4444"/><stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <pattern id="pat-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#312E81" flood-opacity="0.16"/>
    </filter>
  </defs>

  <symbol id="keeply-mark" viewBox="0 0 512 512">
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#grad-indigo)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#grad-amber)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#grad-amber)"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#grad-indigo)"/>
  </symbol>

  <symbol id="keeply-lockup" viewBox="0 0 280 70">
    <g transform="translate(0,4) scale(0.13)"><use href="#keeply-mark"/></g>
    <text x="78" y="32" font-size="28" font-weight="800" fill="#312E81" font-family="system-ui,sans-serif" letter-spacing="0.2">Keeply</text>
    <text x="78" y="56" font-size="12" font-weight="600" fill="#4338CA" opacity="0.72" font-family="system-ui,sans-serif" letter-spacing="1.5">KEEPLY.WORK</text>
  </symbol>

  <!-- 背景 -->
  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <rect width="1600" height="900" fill="url(#pat-grid)"/>
  <circle cx="200" cy="180" r="220" fill="#FCA5A5" opacity="0.20"/>
  <circle cx="1400" cy="720" r="240" fill="#DDD6FE" opacity="0.30"/>

  <!-- Eyebrow -->
  <g transform="translate(120, 88)">
    <rect x="0" y="2" width="14" height="14" fill="url(#grad-amber)"/>
    <text x="28" y="14" font-size="17" font-weight="800" fill="#312E81" letter-spacing="4">VIBE CODING · CLUSTER</text>
    <text x="28" y="40" font-size="14" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="2">CLUSTER OF · KEEPLY GETTING STARTED</text>
  </g>

  <!-- LEFT: AI 失控的 terminal -->
  <g transform="translate(120, 220)" filter="url(#soft-shadow)">
    <rect width="640" height="500" rx="10" fill="#1E1B4B"/>
    <!-- Title bar -->
    <rect width="640" height="36" rx="10" fill="#312E81"/>
    <rect y="22" width="640" height="14" fill="#312E81"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#A5B4FC" font-family="system-ui,sans-serif">AI agent — 衝太遠中</text>
    <!-- traffic lights -->
    <circle cx="540" cy="18" r="5" fill="#10B981"/>
    <circle cx="560" cy="18" r="5" fill="#FBBF24"/>
    <circle cx="580" cy="18" r="5" fill="#EF4444"/>

    <!-- terminal lines -->
    <g font-family="'JetBrains Mono',ui-monospace,monospace" font-size="13">
      <text x="20" y="68" fill="#A5B4FC">$ run tests</text>
      <text x="20" y="92" fill="#FCA5A5">FAIL  src/handler.ts:47</text>
      <text x="20" y="116" fill="#FCA5A5">FAIL  src/utils.ts:12</text>
      <text x="20" y="140" fill="#A5B4FC">$ ai fix</text>
      <text x="20" y="164" fill="#FDE68A">→ modified 3 files</text>
      <text x="20" y="188" fill="#A5B4FC">$ run tests</text>
      <text x="20" y="212" fill="#FCA5A5">FAIL  src/handler.ts:47</text>
      <text x="20" y="236" fill="#FCA5A5">FAIL  src/utils.ts:12</text>
      <text x="20" y="260" fill="#FCA5A5">FAIL  src/config.ts:3 (NEW)</text>
      <text x="20" y="284" fill="#A5B4FC">$ ai fix</text>
      <text x="20" y="308" fill="#FDE68A">→ modified 5 files</text>
      <text x="20" y="332" fill="#FDE68A">→ added helper.ts (you didn't ask)</text>
      <text x="20" y="356" fill="#FDE68A">→ touched .env</text>
      <text x="20" y="380" fill="#A5B4FC">$ run tests</text>
      <text x="20" y="404" fill="#FCA5A5">FAIL  ×7 errors</text>
      <text x="20" y="428" fill="#A5B4FC" opacity="0.6">$ </text>
      <!-- blinking cursor -->
      <rect x="32" y="418" width="8" height="14" fill="#A5B4FC" opacity="0.85"/>
    </g>

    <!-- 失控 stamp -->
    <g transform="translate(420, 440)" opacity="0.95">
      <rect width="200" height="42" rx="6" fill="url(#grad-red)" filter="url(#soft-shadow)"/>
      <text x="100" y="27" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2" font-family="system-ui,sans-serif">AI 衝太遠</text>
    </g>
  </g>

  <!-- ARROW (rollback symbol) -->
  <g transform="translate(800, 470)">
    <!-- circular rollback arrow -->
    <circle cx="0" cy="0" r="60" fill="url(#grad-amber)" filter="url(#soft-shadow)"/>
    <!-- rollback arrow inside -->
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-22 -14 A 28 28 0 1 0 22 14" />
      <path d="M-26 -22 L-22 -14 L-14 -18"/>
    </g>
    <text x="0" y="92" font-size="14" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="2" font-family="system-ui,sans-serif">ROLLBACK</text>
  </g>

  <!-- RIGHT: Keeply 時間軸 -->
  <g transform="translate(880, 220)" filter="url(#soft-shadow)">
    <rect width="600" height="500" rx="10" fill="#ffffff" stroke="url(#grad-amber)" stroke-width="2"/>
    <!-- Title bar -->
    <rect width="600" height="36" rx="10" fill="url(#grad-amber)"/>
    <rect y="22" width="600" height="14" fill="url(#grad-amber)"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">Keeply — 時間軸</text>

    <!-- 時間軸節點 -->
    <g font-family="system-ui,sans-serif" transform="translate(40, 70)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#4338CA" letter-spacing="2">今天</text>

      <!-- 失控時間點 (red marker) -->
      <g transform="translate(0, 30)">
        <circle cx="6" cy="6" r="6" fill="url(#grad-red)"/>
        <text x="22" y="10" font-size="14" font-weight="700" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">14:23 — 失控狀態</text>
        <text x="22" y="28" font-size="11" font-weight="500" fill="#DC2626" opacity="0.85">+12 個檔案 / -47 行 / build fail</text>
      </g>

      <g transform="translate(0, 75)">
        <circle cx="6" cy="6" r="6" fill="#FCA5A5"/>
        <text x="22" y="10" font-size="14" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.7">14:08 — AI fix #2</text>
      </g>

      <g transform="translate(0, 105)">
        <circle cx="6" cy="6" r="6" fill="#FCA5A5"/>
        <text x="22" y="10" font-size="14" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.7">13:51 — AI fix #1</text>
      </g>

      <g transform="translate(0, 135)">
        <circle cx="6" cy="6" r="6" fill="#FBBF24"/>
        <text x="22" y="10" font-size="14" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.85">13:30 — 加 feature 開始</text>
      </g>

      <!-- 還能跑的版本 (highlighted) -->
      <g transform="translate(0, 175)">
        <rect x="-12" y="-8" width="380" height="56" rx="8" fill="url(#grad-amber)" opacity="0.15" stroke="url(#grad-amber)" stroke-width="2"/>
        <circle cx="6" cy="6" r="8" fill="url(#grad-amber)"/>
        <path d="M2 6 L5 9 L11 3" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none"/>
        <text x="26" y="10" font-size="14" font-weight="800" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">13:00 — 最後能跑的版本</text>
        <text x="26" y="30" font-size="11" font-weight="600" fill="url(#grad-amber)" font-family="system-ui,sans-serif">★ 點這個還原 → 30 秒回去</text>
      </g>

      <g transform="translate(0, 250)" opacity="0.55">
        <circle cx="6" cy="6" r="6" fill="#9C98FF"/>
        <text x="22" y="10" font-size="14" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">12:30 — 自動儲存</text>
      </g>

      <g transform="translate(0, 280)" opacity="0.4">
        <circle cx="6" cy="6" r="6" fill="#9C98FF"/>
        <text x="22" y="10" font-size="14" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">11:50 — 自動儲存</text>
      </g>

      <text x="0" y="330" font-size="12" font-weight="700" fill="#4338CA" letter-spacing="2" opacity="0.8">昨天</text>
      <g transform="translate(0, 358)" opacity="0.4">
        <circle cx="6" cy="6" r="6" fill="#9C98FF"/>
        <text x="22" y="10" font-size="14" font-weight="500" fill="#312E81" font-family="'JetBrains Mono',ui-monospace,monospace">19:08 — 一天的工作</text>
      </g>
    </g>

    <!-- 叫得回它 stamp -->
    <g transform="translate(380, 440)">
      <rect width="200" height="42" rx="6" fill="url(#grad-indigo)" filter="url(#soft-shadow)"/>
      <text x="100" y="27" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2" font-family="system-ui,sans-serif">叫得回它</text>
    </g>
  </g>

  <!-- Title (bottom) -->
  <g transform="translate(120, 800)">
    <text x="0" y="0" font-size="34" font-weight="800" fill="#312E81" letter-spacing="1">Vibe Coding 失控了？<tspan fill="url(#grad-amber)">1 個動作</tspan>回到上一個能跑的版本</text>
    <text x="0" y="32" font-size="15" font-weight="500" fill="#4338CA" opacity="0.72" letter-spacing="1">不用記 AI 動過哪幾個檔案 · Keeply 全記了</text>
  </g>

  <use href="#keeply-lockup" x="1380" y="790" width="180" height="48"/>

</svg>
