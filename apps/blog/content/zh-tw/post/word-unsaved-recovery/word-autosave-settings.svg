<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect x="0" y="0" width="520" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="0" y="0" width="520" height="40" rx="8" fill="#F3F4F6"/>
  <rect x="0" y="32" width="520" height="8" fill="#F3F4F6"/>
  <text x="18" y="26" font-size="14" font-weight="800" fill="#374151">Word 選項 — 儲存</text>
  <text x="500" y="26" font-size="14" fill="#9CA3AF" text-anchor="end">&#10005;</text>
  <line x1="0" y1="40" x2="520" y2="40" stroke="#E5E7EB" stroke-width="1"/>
  <text x="18" y="72" font-size="12" font-weight="700" fill="#6B7280" letter-spacing="0.5">儲存文件</text>
  <rect x="18" y="90" width="16" height="16" rx="3" fill="#4F46E5"/>
  <path d="M22 98 L25 101 L31 94" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="103" font-size="13" fill="#374151">儲存自動回復資訊時間間隔</text>
  <rect x="250" y="90" width="48" height="22" rx="4" fill="#FFFFFF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="264" y="106" font-size="13" font-weight="700" fill="#312E81">10</text>
  <path d="M290 96 L294 100 L286 100 Z" fill="#9CA3AF"/>
  <path d="M290 106 L294 102 L286 102 Z" fill="#9CA3AF"/>
  <text x="308" y="106" font-size="13" fill="#374151">分鐘</text>
  <rect x="18" y="126" width="16" height="16" rx="3" fill="#4F46E5"/>
  <path d="M22 134 L25 137 L31 130" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="139" font-size="13" fill="#374151">如果關閉時未儲存，保留上一個自動回復版本</text>
  <text x="18" y="178" font-size="12" font-weight="700" fill="#6B7280" letter-spacing="0.5">自動回復檔案位置</text>
  <rect x="18" y="190" width="484" height="26" rx="4" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="30" y="207" font-size="12" fill="#6B7280" font-family="'JetBrains Mono',ui-monospace,monospace">C:\Users\&#8230;\AppData\Roaming\Microsoft\Word\</text>
  <rect x="18" y="240" width="484" height="42" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
  <text x="32" y="258" font-size="12" font-weight="700" fill="#B45309">預設 10 分鐘 = 兩次寫入之間最多 10 分鐘在記憶體裡</text>
  <text x="32" y="275" font-size="11.5" fill="#92400E">調成 1 分鐘可縮短風險，但這仍是當機緩衝、不是版本歷史</text>
</svg>
