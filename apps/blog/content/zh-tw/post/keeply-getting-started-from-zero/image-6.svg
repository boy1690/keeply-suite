<!-- Image 6: 4 種使用情境決策樹 + Keeply 落點 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <text x="600" y="40" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">你的需求 · 對應的工具 · KEEPLY 不爭所有場景</text>

  <!-- 中央 question -->
  <g transform="translate(600, 110)">
    <rect x="-150" y="0" width="300" height="60" rx="30" fill="url(#g-indigo)" filter="url(#shadow)"/>
    <text x="0" y="38" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">你的需求是什麼？</text>
  </g>

  <!-- 4 連線 -->
  <g stroke="#9C98FF" stroke-width="2" fill="none" opacity="0.5">
    <path d="M600 170 L180 240"/>
    <path d="M600 170 L460 240"/>
    <path d="M600 170 L740 240"/>
    <path d="M600 170 L1020 240"/>
  </g>

  <!-- 4 case cards -->
  <!-- Case 1: Cloud sync -->
  <g transform="translate(60, 250)" filter="url(#shadow)">
    <rect width="240" height="240" rx="10" fill="#ffffff" stroke="#E0E7FF"/>
    <rect width="240" height="44" rx="10" fill="#6F6AF0"/>
    <rect y="30" width="240" height="14" fill="#6F6AF0"/>
    <text x="120" y="28" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">情境 1</text>

    <text x="120" y="82" font-size="15" font-weight="800" fill="#312E81" text-anchor="middle">跨裝置雲端同步</text>

    <g transform="translate(20, 110)">
      <text x="0" y="14" font-size="12" font-weight="700" fill="#4338CA" opacity="0.7">建議</text>
      <text x="0" y="38" font-size="14" font-weight="800" fill="#312E81">IDrive</text>
      <text x="0" y="58" font-size="12" font-weight="500" fill="#4338CA" opacity="0.6">Backblaze</text>
    </g>

    <g transform="translate(20, 190)">
      <text x="0" y="14" font-size="11" font-weight="700" fill="#DC2626" opacity="0.65">Keeply 不適合</text>
      <text x="0" y="32" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.7">local-first，不是雲端原生</text>
    </g>
  </g>

  <!-- Case 2: System restore -->
  <g transform="translate(340, 250)" filter="url(#shadow)">
    <rect width="240" height="240" rx="10" fill="#ffffff" stroke="#E0E7FF"/>
    <rect width="240" height="44" rx="10" fill="#6F6AF0"/>
    <rect y="30" width="240" height="14" fill="#6F6AF0"/>
    <text x="120" y="28" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">情境 2</text>

    <text x="120" y="82" font-size="15" font-weight="800" fill="#312E81" text-anchor="middle">系統還原 / 整顆磁碟</text>

    <g transform="translate(20, 110)">
      <text x="0" y="14" font-size="12" font-weight="700" fill="#4338CA" opacity="0.7">建議</text>
      <text x="0" y="38" font-size="14" font-weight="800" fill="#312E81">Acronis True Image</text>
    </g>

    <g transform="translate(20, 190)">
      <text x="0" y="14" font-size="11" font-weight="700" fill="#DC2626" opacity="0.65">Keeply 不適合</text>
      <text x="0" y="32" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.7">不做整顆磁碟備份</text>
    </g>
  </g>

  <!-- Case 3: IT pro -->
  <g transform="translate(620, 250)" filter="url(#shadow)">
    <rect width="240" height="240" rx="10" fill="#ffffff" stroke="#E0E7FF"/>
    <rect width="240" height="44" rx="10" fill="#6F6AF0"/>
    <rect y="30" width="240" height="14" fill="#6F6AF0"/>
    <text x="120" y="28" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">情境 3</text>

    <text x="120" y="82" font-size="15" font-weight="800" fill="#312E81" text-anchor="middle">IT 管 50+ 台機器</text>

    <g transform="translate(20, 110)">
      <text x="0" y="14" font-size="12" font-weight="700" fill="#4338CA" opacity="0.7">建議</text>
      <text x="0" y="38" font-size="14" font-weight="800" fill="#312E81">MSP360</text>
    </g>

    <g transform="translate(20, 190)">
      <text x="0" y="14" font-size="11" font-weight="700" fill="#DC2626" opacity="0.65">Keeply 不適合</text>
      <text x="0" y="32" font-size="11" font-weight="500" fill="#6F6AF0" opacity="0.7">給個人 / 小團隊用</text>
    </g>
  </g>

  <!-- Case 4: Personal — Keeply 是主場 -->
  <g transform="translate(900, 250)" filter="url(#shadow)">
    <rect width="240" height="240" rx="10" fill="#ffffff" stroke="url(#g-amber)" stroke-width="2"/>
    <rect width="240" height="44" rx="10" fill="url(#g-amber)"/>
    <rect y="30" width="240" height="14" fill="url(#g-amber)"/>
    <text x="120" y="28" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">情境 4 ★</text>

    <text x="120" y="82" font-size="15" font-weight="800" fill="#312E81" text-anchor="middle">個人 / 小團隊版本記事</text>

    <g transform="translate(20, 110)">
      <text x="0" y="14" font-size="12" font-weight="700" fill="url(#g-amber)" opacity="0.85">建議</text>
      <text x="0" y="38" font-size="16" font-weight="900" fill="url(#g-amber)">Keeply</text>
      <text x="0" y="58" font-size="12" font-weight="500" fill="#4338CA" opacity="0.7">或 Windows File History</text>
    </g>

    <g transform="translate(20, 190)">
      <text x="0" y="14" font-size="11" font-weight="700" fill="url(#g-amber)" opacity="0.85">Keeply 適合</text>
      <text x="0" y="32" font-size="11" font-weight="500" fill="#312E81" opacity="0.85">第 1 天就上手</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="568" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">選工具像選同事 · 每個有它擅長的場景</text>

</svg>
