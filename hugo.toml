baseURL = "https://blog.keeply.work/"
languageCode = "en"
title = "Keeply Blog"
theme = "hugo-theme-stack"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true  # 英文也走 /en/ 子路徑，19 語言一致

# 啟用 emoji
enableEmoji = true

# Build 優化
[build]
  writeStats = true

[services]
  [services.googleAnalytics]
    ID = "G-W08QHBQWDK"

[markup]
  [markup.goldmark.renderer]
    unsafe = true  # 允許 HTML in markdown
  [markup.highlight]
    noClasses = false
    lineNos = true

[params]
  mainSections = ["post"]
  featuredImageField = "image"
  rssFullContent = true
  clarityProjectID = "wknecyjli8"

  [params.footer]
    since = 2026
    customText = "Keeply — Your files have a story."

  [params.sidebar]
    compact = false
    emoji = "📂"
    subtitle = "Your file-management guardian"

  # avatar is a string path to an image in assets/
  # [params.sidebar.avatar] — disabled until we add assets/img/avatar.png

  [params.article]
    math = false
    toc = true
    readingTime = true

  [params.comments]
    enabled = false  # Phase 1 不開

# 19 語言設定
[languages]
  [languages.en]
    languageName = "English"
    title = "Keeply Blog"
    weight = 1
    contentDir = "content/english"
  [languages.zh-tw]
    languageCode = "zh-Hant-TW"
    languageName = "繁體中文"
    title = "Keeply 部落格"
    weight = 2
    contentDir = "content/zh-tw"
    [languages.zh-tw.params.sidebar]
      subtitle = "你的檔案管理守護神"
  [languages.zh-cn]
    languageName = "简体中文"
    title = "Keeply 博客"
    weight = 3
    contentDir = "content/zh-cn"
    [languages.zh-cn.params.sidebar]
      subtitle = "你的文件管理守护神"
  [languages.ja]
