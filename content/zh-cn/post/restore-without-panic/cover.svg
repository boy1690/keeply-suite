<!-- =============================================================
     Cover: restore-without-panic (T1 cluster, 6 launch locales)
     Recipe: empty-bin — the empty Recycle Bin + 4 failure scenarios
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>

    <symbol id="bin-empty" viewBox="0 0 80 100">
      <path d="M10 20 L70 20 L65 95 L15 95 Z" fill="none" stroke="url(#grad-indigo)" stroke-width="3"/>
      <path d="M5 20 L75 20" stroke="url(#grad-indigo)" stroke-width="4" stroke-linecap="round"/>
      <path d="M30 12 L50 12 L52 20 L28 20 Z" fill="none" stroke="url(#grad-indigo)" stroke-width="3"/>
      <text x="40" y="68" font-size="32" font-weight="900" fill="url(#grad-amber)" text-anchor="middle">∅</text>
    </symbol>

    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>

    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">文件管理 · 恢复指南</text>
  </g>

  <g transform="translate(120, 320)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="64" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-1">你按了 Delete。</text>
    <text x="0" y="86" font-size="64" font-weight="900" fill="url(#grad-amber)" letter-spacing="-1">回收站是空的。</text>
  </g>

  <g transform="translate(120, 540)">
    <text x="0" y="0" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">4 种情境里，<tspan fill="#F59E0B">恢复软件帮不上忙</tspan>。</text>
  </g>

  <g transform="translate(960, 250)" filter="url(#soft-shadow)">
    <rect width="500" height="380" fill="#FFFBEB" rx="10" opacity="0.85"/>
    <rect x="0" y="0" width="6" height="380" fill="url(#grad-amber)" rx="2"/>
    <use href="#bin-empty" x="380" y="20" width="80" height="100"/>
    <text x="32" y="50" font-size="14" font-weight="700" fill="#4338CA" letter-spacing="2">空的 4 种原因</text>
    <text x="32" y="100" font-size="20" font-weight="700" fill="#312E81">1. 前天刚清过</text>
    <text x="32" y="170" font-size="20" font-weight="700" fill="#312E81">2. 在共享磁盘</text>
    <text x="32" y="240" font-size="20" font-weight="700" fill="#312E81">3. 按了 Shift+Del</text>
    <text x="32" y="310" font-size="20" font-weight="700" fill="#F59E0B">4. 云端 trash 过 30 天</text>
  </g>

  <g transform="translate(120, 720)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#312E81">事前装文件层版本工具，<tspan fill="#F59E0B">才是真的答案</tspan>。</text>
  </g>

  <g transform="translate(120, 845)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="2">TING-WEI TSAO · KEEPLY 创办人</text>
  </g>

  <use href="#keeply-lockup" x="1280" y="810" width="200" height="50"/>

  <g transform="translate(1480, 875)">
    <text x="0" y="0" font-size="11" font-weight="500" fill="#4338CA" opacity="0.45" letter-spacing="1.5" text-anchor="end">GUIDE / 6 LOCALES · 2026</text>
  </g>

</svg>
