<!-- =============================================================
     Cover: file-version-management-complete-guide (universal, 19 locales)
     Kit version: 0.1
     Recipe: 場景共鳴——folder UI 顯示真實命名混亂
     Layout: 上方 folder 視窗 (視覺錨點) + 下方文字
     用到零件: #keeply-lockup
     設計核心: 6 個同 base name 不同尾段的 .docx 檔案，
              模擬讀者打開資料夾時看到的真實場景。
              file_FINAL 用 amber 強調 = 諷刺核心。
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grad-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-indigo-soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9C98FF"/><stop offset="1" stop-color="#6F6AF0"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="grad-window-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <pattern id="pat-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="window-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#312E81" flood-opacity="0.18"/>
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.12"/>
    </filter>
  </defs>

  <symbol id="keeply-mark" viewBox="0 0 512 512">
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#grad-indigo)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#grad-amber)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#grad-amber)"/>
    <rect x="220" y="150" width="152" height="206" rx="32" fill="url(#grad-indigo-soft)" opacity="0.48"/>
    <rect x="192" y="167" width="152" height="206" rx="32" fill="url(#grad-indigo-soft)" opacity="0.72"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#grad-indigo)"/>
  </symbol>

  <symbol id="keeply-lockup" viewBox="0 0 260 64">
    <g transform="translate(0,4) scale(0.11)"><use href="#keeply-mark"/></g>
    <text x="66" y="28" font-size="24" font-weight="800" fill="#312E81" font-family="system-ui,sans-serif" letter-spacing="0.2">Keeply</text>
    <text x="66" y="50" font-size="11" font-weight="600" fill="#4338CA" opacity="0.72" font-family="system-ui,sans-serif" letter-spacing="1.5">KEEPLY.WORK</text>
  </symbol>

  <!-- Word doc icon (small) -->
  <symbol id="doc-icon" viewBox="0 0 32 36">
    <path d="M4 0 L20 0 L28 8 L28 34 Q28 36 26 36 L4 36 Q2 36 2 34 L2 2 Q2 0 4 0 Z" fill="#4F46E5"/>
    <path d="M20 0 L20 8 L28 8 Z" fill="#312E81" opacity="0.5"/>
    <text x="15" y="26" font-size="9" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">W</text>
  </symbol>

  <symbol id="doc-icon-amber" viewBox="0 0 32 36">
    <path d="M4 0 L20 0 L28 8 L28 34 Q28 36 26 36 L4 36 Q2 36 2 34 L2 2 Q2 0 4 0 Z" fill="url(#grad-amber)"/>
    <path d="M20 0 L20 8 L28 8 Z" fill="#D97706" opacity="0.5"/>
    <text x="15" y="26" font-size="9" font-weight="800" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">W</text>
  </symbol>

  <!-- ============ COMPOSITION ============ -->

  <!-- 背景 -->
  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <rect width="1600" height="900" fill="url(#pat-grid)"/>

  <!-- 背景氛圍色斑 -->
  <circle cx="180" cy="160" r="200" fill="#DDD6FE" opacity="0.35"/>
  <circle cx="1450" cy="780" r="240" fill="#FDE68A" opacity="0.30"/>

  <!-- ============ Eyebrow ============ -->
  <g transform="translate(120, 96)">
    <rect x="0" y="2" width="14" height="14" fill="url(#grad-amber)"/>
    <text x="28" y="14" font-size="17" font-weight="800" fill="#312E81" letter-spacing="4">文件版本管理</text>
    <text x="28" y="40" font-size="14" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="2">PILLAR · EDITORIAL</text>
  </g>

  <!-- ============ FOLDER WINDOW（視覺錨點） ============ -->
  <g transform="translate(220, 180)" filter="url(#window-shadow)">

    <!-- Window 框 -->
    <rect width="1160" height="510" rx="14" fill="#ffffff"/>

    <!-- Title bar -->
    <path d="M0 14 Q0 0 14 0 L1146 0 Q1160 0 1160 14 L1160 60 L0 60 Z" fill="url(#grad-window-bar)"/>

    <!-- Window controls (Windows-ish square + minimize) -->
    <g transform="translate(1080, 18)">
      <rect x="0" y="6" width="14" height="2" fill="#ffffff" opacity="0.72"/>
      <rect x="26" y="0" width="14" height="14" rx="1" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.72"/>
      <g transform="translate(52,0)" stroke="#ffffff" stroke-width="2" opacity="0.72" stroke-linecap="round">
        <line x1="0" y1="0" x2="14" y2="14"/>
        <line x1="14" y1="0" x2="0" y2="14"/>
      </g>
    </g>

    <!-- Folder breadcrumb -->
    <text x="32" y="38" font-size="18" font-weight="600" fill="#ffffff" font-family="system-ui,sans-serif">📁  Documents  ›  Projects  ›  <tspan font-weight="700">Q4 Proposal</tspan></text>

    <!-- Column header -->
    <rect x="0" y="60" width="1160" height="40" fill="#F8F7FF"/>
    <text x="32" y="86" font-size="13" font-weight="700" fill="#4338CA" letter-spacing="2" opacity="0.85">名称</text>
    <text x="800" y="86" font-size="13" font-weight="700" fill="#4338CA" letter-spacing="2" opacity="0.85">修改日期</text>
    <text x="1020" y="86" font-size="13" font-weight="700" fill="#4338CA" letter-spacing="2" opacity="0.85">大小</text>
    <line x1="0" y1="100" x2="1160" y2="100" stroke="#E0E7FF" stroke-width="1"/>

    <!-- File rows (6 個版本演化) -->

    <!-- Row 1: proposal.docx -->
    <g transform="translate(0, 100)">
      <rect width="1160" height="60" fill="#ffffff"/>
      <use href="#doc-icon" x="32" y="13" width="32" height="36"/>
      <text x="80" y="38" font-size="22" font-weight="500" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal.docx</text>
      <text x="800" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">Mar 14</text>
      <text x="1020" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">2.1 MB</text>
    </g>

    <!-- Row 2: proposal_v2.docx -->
    <g transform="translate(0, 160)">
      <rect width="1160" height="60" fill="#F8F7FF"/>
      <use href="#doc-icon" x="32" y="13" width="32" height="36"/>
      <text x="80" y="38" font-size="22" font-weight="500" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_v2.docx</text>
      <text x="800" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">Mar 18</text>
      <text x="1020" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">2.4 MB</text>
    </g>

    <!-- Row 3: proposal_v3.docx -->
    <g transform="translate(0, 220)">
      <rect width="1160" height="60" fill="#ffffff"/>
      <use href="#doc-icon" x="32" y="13" width="32" height="36"/>
      <text x="80" y="38" font-size="22" font-weight="500" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_v3_revised.docx</text>
      <text x="800" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">Mar 22</text>
      <text x="1020" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">2.6 MB</text>
    </g>

    <!-- Row 4: proposal_final.docx -->
    <g transform="translate(0, 280)">
      <rect width="1160" height="60" fill="#F8F7FF"/>
      <use href="#doc-icon" x="32" y="13" width="32" height="36"/>
      <text x="80" y="38" font-size="22" font-weight="500" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_final.docx</text>
      <text x="800" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">Mar 28</text>
      <text x="1020" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">2.8 MB</text>
    </g>

    <!-- Row 5: proposal_final_v2.docx -->
    <g transform="translate(0, 340)">
      <rect width="1160" height="60" fill="#ffffff"/>
      <use href="#doc-icon" x="32" y="13" width="32" height="36"/>
      <text x="80" y="38" font-size="22" font-weight="500" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_final_v2.docx</text>
      <text x="800" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">Apr 02</text>
      <text x="1020" y="38" font-size="15" font-weight="500" fill="#6F6AF0" opacity="0.75">3.0 MB</text>
    </g>

    <!-- Row 6 (HERO): proposal_final_FINAL.docx 高亮 amber -->
    <g transform="translate(0, 400)">
      <rect width="1160" height="60" fill="#FFFBEB"/>
      <rect x="0" y="0" width="6" height="60" fill="url(#grad-amber)"/>
      <use href="#doc-icon-amber" x="32" y="13" width="32" height="36"/>
      <text x="80" y="38" font-size="22" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_final_<tspan fill="#F59E0B">FINAL</tspan>.docx</text>
      <text x="800" y="38" font-size="15" font-weight="700" fill="#F59E0B">Apr 04</text>
      <text x="1020" y="38" font-size="15" font-weight="700" fill="#F59E0B">3.2 MB</text>
    </g>

    <!-- Row 7 (附帶 row): _真的最終 ironic icing -->
    <g transform="translate(0, 460)" opacity="0.95">
      <rect width="1160" height="50" fill="#F8F7FF" rx="0"/>
      <use href="#doc-icon" x="32" y="8" width="28" height="32"/>
      <text x="76" y="32" font-size="20" font-weight="500" fill="#6F6AF0" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_REALLY_final.docx</text>
      <text x="800" y="32" font-size="14" font-weight="500" fill="#6F6AF0" opacity="0.65">Apr 05</text>
      <text x="1020" y="32" font-size="14" font-weight="500" fill="#6F6AF0" opacity="0.65">3.2 MB</text>
    </g>

  </g>

  <!-- ============ Subtitle（universal English） ============ -->
  <g transform="translate(220, 740)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#312E81">用共享文件夹的人</text>
    <text x="0" y="38" font-size="28" font-weight="700" fill="#312E81">都会发明自己的<tspan fill="#F59E0B">命名规则</tspan></text>
  </g>

  <!-- ============ Bottom note ============ -->
  <g transform="translate(220, 832)">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#4338CA" opacity="0.65" letter-spacing="2">4 个你的工具没设计给你的结构性原因</text>
  </g>

  <!-- ============ 右下：Keeply lockup ============ -->
  <use href="#keeply-lockup" x="1180" y="800" width="200" height="50"/>

  <!-- ============ 右下角 metadata ============ -->
  <g transform="translate(1380, 870)">
    <text x="0" y="0" font-size="11" font-weight="500" fill="#4338CA" opacity="0.45" letter-spacing="1.5" text-anchor="end">PILLAR 1 / 19 LOCALES · 2026</text>
  </g>

</svg>
