<!-- Image 3: 拖資料夾進 Keeply 3 步動作示意 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','Noto Sans TC',system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <text x="600" y="48" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">動作 1 · 把資料夾拖進 KEEPLY · 3 秒</text>

  <!-- Frame 1: 桌面上的資料夾 + cursor -->
  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="320" height="380" rx="10" fill="#ffffff"/>
    <rect width="320" height="36" rx="10" fill="#312E81"/>
    <rect y="22" width="320" height="14" fill="#312E81"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#ffffff">桌面 / Desktop</text>

    <!-- 資料夾 icon (大) -->
    <g transform="translate(108, 130)" filter="url(#shadow)">
      <path d="M0 24 Q0 12 12 12 L52 12 L72 36 L188 36 Q200 36 200 48 L200 154 Q200 166 188 166 L12 166 Q0 166 0 154 Z" fill="url(#g-amber)"/>
      <text x="100" y="116" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">my-project</text>
    </g>

    <!-- cursor -->
    <g transform="translate(196, 230)">
      <path d="M0 0 L20 8 L8 12 L12 24 L8 26 L4 14 L-4 18 Z" fill="#312E81" stroke="#ffffff" stroke-width="1.5"/>
    </g>

    <!-- step number -->
    <g transform="translate(20, 320)">
      <circle cx="20" cy="20" r="20" fill="url(#g-indigo)"/>
      <text x="20" y="26" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">1</text>
      <text x="56" y="20" font-size="14" font-weight="700" fill="#312E81">點選資料夾</text>
      <text x="56" y="38" font-size="12" font-weight="500" fill="#4338CA" opacity="0.7">桌面上 my-project</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(380, 290)" opacity="0.7">
    <path d="M0 0 L48 0 L48 -8 L70 8 L48 24 L48 16 L0 16 Z" fill="url(#g-amber)"/>
  </g>

  <!-- Frame 2: 拖移中 -->
  <g transform="translate(460, 110)" filter="url(#shadow)">
    <rect width="320" height="380" rx="10" fill="#ffffff"/>
    <rect width="320" height="36" rx="10" fill="#312E81"/>
    <rect y="22" width="320" height="14" fill="#312E81"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#ffffff">拖移中 / Dragging</text>

    <!-- 拖移軌跡 -->
    <g opacity="0.5">
      <path d="M80 200 Q160 230 240 240" stroke="url(#g-amber)" stroke-width="3" stroke-dasharray="4 6" fill="none"/>
    </g>

    <!-- 資料夾在中途 (半透明) -->
    <g transform="translate(160, 180)" opacity="0.85" filter="url(#shadow)">
      <path d="M0 18 Q0 9 9 9 L40 9 L56 27 L144 27 Q156 27 156 39 L156 117 Q156 126 144 126 L9 126 Q0 126 0 117 Z" fill="url(#g-amber)"/>
      <text x="78" y="84" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">my-project</text>
    </g>

    <!-- cursor 抓取中 -->
    <g transform="translate(290, 230)">
      <path d="M0 0 L20 8 L8 12 L12 24 L8 26 L4 14 L-4 18 Z" fill="#312E81" stroke="#ffffff" stroke-width="1.5"/>
    </g>

    <g transform="translate(20, 320)">
      <circle cx="20" cy="20" r="20" fill="url(#g-indigo)"/>
      <text x="20" y="26" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">2</text>
      <text x="56" y="20" font-size="14" font-weight="700" fill="#312E81">拖進 Keeply 視窗</text>
      <text x="56" y="38" font-size="12" font-weight="500" fill="#4338CA" opacity="0.7">不思考結構，直接拖</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(800, 290)" opacity="0.7">
    <path d="M0 0 L48 0 L48 -8 L70 8 L48 24 L48 16 L0 16 Z" fill="url(#g-amber)"/>
  </g>

  <!-- Frame 3: 已進 Keeply -->
  <g transform="translate(880, 110)" filter="url(#shadow)">
    <rect width="280" height="380" rx="10" fill="#ffffff" stroke="url(#g-amber)" stroke-width="2"/>
    <rect width="280" height="36" rx="10" fill="url(#g-amber)"/>
    <rect y="22" width="280" height="14" fill="url(#g-amber)"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#ffffff">Keeply</text>

    <!-- 資料夾安全在 Keeply 內 -->
    <g transform="translate(64, 130)">
      <path d="M0 18 Q0 9 9 9 L40 9 L56 27 L144 27 Q156 27 156 39 L156 117 Q156 126 144 126 L9 126 Q0 126 0 117 Z" fill="url(#g-amber)"/>
      <text x="78" y="84" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif">my-project</text>
    </g>

    <!-- 保險網 effect -->
    <g transform="translate(140, 270)">
      <circle cx="0" cy="0" r="22" fill="url(#g-indigo)" filter="url(#shadow)"/>
      <path d="M-9 0 L-2 7 L10 -7" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </g>

    <g transform="translate(20, 320)">
      <circle cx="20" cy="20" r="20" fill="url(#g-indigo)"/>
      <text x="20" y="26" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">3</text>
      <text x="56" y="20" font-size="14" font-weight="700" fill="#312E81">完成</text>
      <text x="56" y="38" font-size="12" font-weight="500" fill="url(#g-amber)" opacity="0.9">保險網生效</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="568" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">3 秒 · 不改命名 · 不分類 · 不思考結構</text>

</svg>
