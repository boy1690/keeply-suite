<!-- Cover: departing-employee-data-risk · ko baseline · cost-hero recipe -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif">
  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>
    <symbol id="folder-icon-amber" viewBox="0 0 36 28">
      <path d="M0 4 Q0 0 4 0 L12 0 L16 4 L32 4 Q36 4 36 8 L36 24 Q36 28 32 28 L4 28 Q0 28 0 24 Z" fill="url(#grad-amber)" opacity="0.95"/>
    </symbol>
    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">퇴사 자료 위험 · EDITORIAL</text>
  </g>
  <g transform="translate(120, 360)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="280" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-12">23:03</text>
  </g>
  <g transform="translate(120, 470)">
    <text x="0" y="0" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">폴더를 휴지통에 끌어 비운 그 순간.</text>
    <text x="0" y="46" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">필요한 건 <tspan fill="#F59E0B">버전 기록 + 불변 스냅샷</tspan>.</text>
  </g>
  <g transform="translate(960, 230)">
    <g transform="translate(0, 0)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#folder-icon-amber" x="22" y="21" width="36" height="28"/>
      <text x="74" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">brand-book/</text>
      <text x="410" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">22:50 복사</text>
    </g>
    <g transform="translate(0, 90)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#folder-icon-amber" x="22" y="21" width="36" height="28"/>
      <text x="74" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">brand-book/</text>
      <text x="410" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">23:03 삭제</text>
    </g>
    <g transform="translate(0, 180)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#folder-icon-amber" x="22" y="21" width="36" height="28"/>
      <text x="74" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">brand-book/</text>
      <text x="395" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">+30d 만료</text>
    </g>
    <g transform="translate(0, 290)">
      <text x="0" y="0" font-size="16" font-weight="600" fill="#4338CA" opacity="0.7" letter-spacing="0.5">같은 폴더 · 두 동작 · 어디에 기록?</text>
    </g>
  </g>
  <g transform="translate(120, 720)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#312E81">동기화 도구는 둘 다 막지 못한다. <tspan fill="#F59E0B">카테고리를 바꿔라</tspan>.</text>
  </g>
  <g transform="translate(120, 845)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="2">DROPBOX · GOOGLE DRIVE · ONEDRIVE · 어디에도 닿지 않는다</text>
  </g>
  <use href="#keeply-lockup" x="1280" y="810" width="200" height="50"/>
  <g transform="translate(1480, 875)">
    <text x="0" y="0" font-size="11" font-weight="500" fill="#4338CA" opacity="0.45" letter-spacing="1.5" text-anchor="end">P2 CLUSTER · JA-MASTER · 2026</text>
  </g>
</svg>
