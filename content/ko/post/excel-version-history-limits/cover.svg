<!-- =============================================================
     Cover: excel-version-history-limits (6 launch locales, per-locale translated)
     Recipe: cost-hero — hero "1-2" big number for the AutoSave limit
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>

    <symbol id="doc-icon-amber" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="url(#grad-amber)" opacity="0.95"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#FFB300" opacity="0.7"/>
    </symbol>

    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">파일 버전 관리 · EDITORIAL</text>
  </g>

  <g transform="translate(120, 360)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="280" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-12">1-2</text>
  </g>

  <g transform="translate(120, 470)">
    <text x="0" y="0" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">엑셀 버전 기록 돌아가는 버전 수.</text>
    <text x="0" y="46" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">버그 아닌 <tspan fill="#F59E0B">Microsoft 설계</tspan>입니다.</text>
  </g>

  <g transform="translate(960, 230)">
    <g transform="translate(0, 0)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">monthly_close.xlsx</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">17:15</text>
    </g>
    <g transform="translate(0, 90)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">monthly_close.xlsx</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">17:30</text>
    </g>
    <g transform="translate(0, 180)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">monthly_close.xlsx</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">17:47 실수</text>
    </g>

    <g transform="translate(0, 290)">
      <text x="0" y="0" font-size="16" font-weight="600" fill="#4338CA" opacity="0.7" letter-spacing="0.5">같은 이름 · 다른 내용 · 30 분 전 버전 복구 불가</text>
    </g>
  </g>

  <g transform="translate(120, 720)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#312E81">AutoSave 는 <tspan fill="#F59E0B">cloud bait</tspan>, history layer 가 아닙니다.</text>
  </g>

  <g transform="translate(120, 845)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="2">ONEDRIVE · SHAREPOINT · AUTOSAVE · 4 조건 모두 만족해야 작동</text>
  </g>

  <use href="#keeply-lockup" x="1280" y="810" width="200" height="50"/>

  <g transform="translate(1480, 875)">
    <text x="0" y="0" font-size="11" font-weight="500" fill="#4338CA" opacity="0.45" letter-spacing="1.5" text-anchor="end">P1 CLUSTER / 6 LOCALES · 2026</text>
  </g>

</svg>
