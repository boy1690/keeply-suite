<!-- =============================================================
     Cover: keeply-getting-started-from-zero (universal, 19 locales)
     Kit version: 0.1
     Recipe: 對比視覺——30 vs 2 motif 載點
     Layout: 兩欄 split + amber divider
     用到零件: #keeply-lockup
     設計核心: 左欄堆疊 30 個功能勾選格(faded)；右欄 2 個簡潔動作；
              中間 amber chevron 分隔；底部標題 + lockup
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter','Noto Sans TC','PingFang TC','Microsoft JhengHei',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grad-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="pat-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#312E81" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Brand lockup -->
  <symbol id="keeply-mark" viewBox="0 0 512 512">
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#grad-indigo)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#grad-amber)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#grad-amber)"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#grad-indigo)"/>
  </symbol>

  <symbol id="keeply-lockup" viewBox="0 0 280 70">
    <g transform="translate(0,4) scale(0.13)"><use href="#keeply-mark"/></g>
    <text x="78" y="32" font-size="28" font-weight="800" fill="#312E81" font-family="system-ui,sans-serif" letter-spacing="0.2">Keeply</text>
    <text x="78" y="56" font-size="12" font-weight="600" fill="#4338CA" opacity="0.72" font-family="system-ui,sans-serif" letter-spacing="1.5">KEEPLY.WORK</text>
  </symbol>

  <!-- 背景 -->
  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <rect width="1600" height="900" fill="url(#pat-grid)"/>

  <!-- 背景氛圍色斑 -->
  <circle cx="200" cy="200" r="220" fill="#DDD6FE" opacity="0.28"/>
  <circle cx="1400" cy="700" r="260" fill="#FDE68A" opacity="0.26"/>

  <!-- ============ Eyebrow ============ -->
  <g transform="translate(120, 88)">
    <rect x="0" y="2" width="14" height="14" fill="url(#grad-amber)"/>
    <text x="28" y="14" font-size="17" font-weight="800" fill="#312E81" letter-spacing="4">GETTING STARTED · BRANDED PILLAR</text>
    <text x="28" y="40" font-size="14" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="2">PILLAR · KEEPLY 入門</text>
  </g>

  <!-- ============ LEFT COLUMN: 30 個功能 (faded) ============ -->
  <g transform="translate(160, 220)">
    <!-- 巨型 "30" -->
    <text x="0" y="120" font-size="240" font-weight="900" fill="#312E81" opacity="0.18" font-family="'Inter',system-ui,sans-serif">30</text>
    <text x="280" y="80" font-size="22" font-weight="700" fill="#312E81" opacity="0.55" letter-spacing="2">個功能</text>
    <text x="280" y="110" font-size="14" font-weight="500" fill="#4338CA" opacity="0.45" letter-spacing="1">不用學</text>

    <!-- 堆疊 checklist (faded grey-out 表示「不用學」) -->
    <g transform="translate(20, 200)" font-family="'JetBrains Mono',ui-monospace,monospace" opacity="0.42">
      <g>
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">Auto-sync to cloud</text>
      </g>
      <g transform="translate(0, 32)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">Configure team permissions</text>
      </g>
      <g transform="translate(0, 64)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">Set up backup schedule</text>
      </g>
      <g transform="translate(0, 96)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">Train your colleagues</text>
      </g>
      <g transform="translate(0, 128)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">Customize keyboard shortcuts</text>
      </g>
      <g transform="translate(0, 160)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">Define version retention rules</text>
      </g>
      <g transform="translate(0, 192)">
        <rect x="0" y="0" width="20" height="20" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="32" y="15" font-size="14" fill="#6F6AF0">+ 24 more features...</text>
      </g>
    </g>

    <!-- "VS" badge 14 天 stamp 效果 -->
    <g transform="translate(160, 510)" opacity="0.55">
      <rect x="0" y="0" width="180" height="36" rx="6" fill="#EEF2FF" stroke="#6F6AF0" stroke-width="1.5"/>
      <text x="90" y="24" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle" letter-spacing="2">14 天才有 VALUE</text>
    </g>
  </g>

  <!-- ============ AMBER DIVIDER ============ -->
  <g transform="translate(800, 250)">
    <line x1="0" y1="0" x2="0" y2="450" stroke="url(#grad-amber)" stroke-width="3" opacity="0.55"/>
    <!-- VS badge -->
    <g transform="translate(0, 200)">
      <circle cx="0" cy="0" r="48" fill="url(#grad-amber)" filter="url(#soft-shadow)"/>
      <text x="0" y="9" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" font-family="system-ui,sans-serif" letter-spacing="1">VS</text>
    </g>
  </g>

  <!-- ============ RIGHT COLUMN: 2 個動作 (vivid) ============ -->
  <g transform="translate(900, 220)">
    <!-- 巨型 "2" -->
    <text x="0" y="120" font-size="240" font-weight="900" fill="url(#grad-indigo)" font-family="'Inter',system-ui,sans-serif">2</text>
    <text x="160" y="80" font-size="22" font-weight="700" fill="#312E81" letter-spacing="2">個動作</text>
    <text x="160" y="110" font-size="14" font-weight="600" fill="url(#grad-amber)" letter-spacing="1">就上手</text>

    <!-- 動作 1: 拖資料夾 -->
    <g transform="translate(20, 220)" filter="url(#soft-shadow)">
      <rect x="0" y="0" width="540" height="84" rx="10" fill="#ffffff"/>
      <g transform="translate(20, 18)">
        <!-- 資料夾 icon -->
        <path d="M0 12 Q0 6 6 6 L24 6 L32 16 L60 16 Q66 16 66 22 L66 44 Q66 50 60 50 L6 50 Q0 50 0 44 Z" fill="url(#grad-amber)"/>
      </g>
      <text x="110" y="36" font-size="20" font-weight="700" fill="#312E81">動作 1</text>
      <text x="110" y="62" font-size="15" font-weight="500" fill="#4338CA">把一個資料夾拖進 Keeply</text>
      <!-- arrow -->
      <g transform="translate(485, 36)" opacity="0.6">
        <path d="M0 0 L20 8 L0 16 L4 8 Z" fill="url(#grad-amber)"/>
      </g>
    </g>

    <!-- 動作 2: 繼續工作 -->
    <g transform="translate(20, 320)" filter="url(#soft-shadow)">
      <rect x="0" y="0" width="540" height="84" rx="10" fill="#ffffff"/>
      <g transform="translate(20, 18)">
        <!-- 鉛筆 icon -->
        <rect x="0" y="20" width="50" height="14" rx="2" fill="url(#grad-indigo)"/>
        <path d="M50 20 L62 27 L50 34 Z" fill="url(#grad-amber)"/>
      </g>
      <text x="110" y="36" font-size="20" font-weight="700" fill="#312E81">動作 2</text>
      <text x="110" y="62" font-size="15" font-weight="500" fill="#4338CA">繼續做今天的事</text>
      <!-- check -->
      <g transform="translate(485, 36)" opacity="0.85">
        <circle cx="0" cy="0" r="14" fill="url(#grad-indigo)"/>
        <path d="M-6 0 L-2 4 L6 -4" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
      </g>
    </g>

    <!-- 第 1 天就上手 stamp -->
    <g transform="translate(160, 510)">
      <rect x="0" y="0" width="220" height="36" rx="6" fill="url(#grad-amber)" filter="url(#soft-shadow)"/>
      <text x="110" y="24" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">第 1 天就上手</text>
    </g>
  </g>

  <!-- ============ Title (bottom) ============ -->
  <g transform="translate(120, 800)">
    <text x="0" y="0" font-size="36" font-weight="800" fill="#312E81" letter-spacing="1">不用學 <tspan fill="url(#grad-indigo)">30</tspan> 個功能，<tspan fill="url(#grad-amber)">2</tspan> 個動作就<tspan fill="url(#grad-amber)">上手</tspan></text>
    <text x="0" y="32" font-size="15" font-weight="500" fill="#4338CA" opacity="0.72" letter-spacing="1">Keeply 怎麼用 — 不必先變專家</text>
  </g>

  <!-- ============ Keeply lockup (bottom right) ============ -->
  <use href="#keeply-lockup" x="1380" y="790" width="180" height="48"/>

</svg>
