<!-- =============================================================
     Cover: deleted-files-recovery-list (ja)
     Layout: 編集マガジン式の左右分割（左テキスト、右シーン）
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="grad-indigo-deep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="grad-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0E7FF"/><stop offset="1" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="grad-number" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4338CA"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <pattern id="pat-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.12"/>
    </filter>
  </defs>

  <symbol id="keeply-mark" viewBox="0 0 512 512">
    <path d="M396 129C429 159 448 200 448 255C448 363 360 451 252 451C145 451 58 368 56 263C55 206 75 158 111 123" stroke="url(#grad-indigo)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M111 123C145 91 190 72 239 72C253 72 265 73 278 76" stroke="url(#grad-amber)" stroke-width="44" stroke-linecap="round" fill="none"/>
    <path d="M236 54L313 79L254 134L236 54Z" fill="url(#grad-amber)"/>
    <rect x="220" y="150" width="152" height="206" rx="32" fill="url(#grad-indigo-deep)" opacity="0.48"/>
    <rect x="192" y="167" width="152" height="206" rx="32" fill="url(#grad-indigo-deep)" opacity="0.72"/>
    <rect x="164" y="184" width="152" height="206" rx="32" fill="url(#grad-indigo)"/>
  </symbol>

  <symbol id="keeply-lockup" viewBox="0 0 260 64">
    <g transform="translate(0,4) scale(0.11)"><use href="#keeply-mark"/></g>
    <text x="66" y="28" font-size="24" font-weight="800" fill="#312E81" font-family="system-ui,sans-serif" letter-spacing="0.2">Keeply</text>
    <text x="66" y="50" font-size="11" font-weight="600" fill="#4338CA" opacity="0.72" font-family="system-ui,sans-serif" letter-spacing="1.5">KEEPLY.WORK</text>
  </symbol>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>
  <rect width="1600" height="900" fill="url(#pat-grid)"/>
  <circle cx="1450" cy="780" r="200" fill="#FDE68A" opacity="0.28"/>
  <circle cx="1180" cy="200" r="240" fill="#DDD6FE" opacity="0.30"/>
  <line x1="720" y1="120" x2="720" y2="780" stroke="#C7D2FE" stroke-width="1" opacity="0.55" stroke-dasharray="4 8"/>

  <g transform="translate(120, 120)">
    <rect x="0" y="2" width="14" height="14" fill="url(#grad-amber)"/>
    <text x="28" y="14" font-size="17" font-weight="800" fill="#312E81" letter-spacing="4">THE MISSING BUTTON</text>
    <text x="28" y="40" font-size="14" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="2">欠落した UX パターン · EDITORIAL</text>
  </g>

  <g transform="translate(120, 230)">
    <text x="0" y="120" font-size="170" font-weight="900" fill="url(#grad-number)" letter-spacing="-6">最近</text>
    <text x="0" y="300" font-size="170" font-weight="900" fill="url(#grad-number)" letter-spacing="-6">削除</text>
    <path d="M0 330 L420 330" stroke="url(#grad-amber)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g transform="translate(120, 600)">
    <text x="0" y="0" font-size="28" font-weight="800" fill="#312E81">あなたのツールにこのボタン、ある？</text>
    <text x="0" y="34" font-size="15" font-weight="500" fill="#4338CA" opacity="0.75">THE BUTTON YOU EXPECT BUT NEVER FIND</text>
  </g>

  <g transform="translate(120, 690)">
    <text x="0" y="0" font-size="20" font-weight="700" fill="#312E81">iOS はボタンをくれる／</text>
    <text x="0" y="30" font-size="20" font-weight="700" fill="#312E81">デスクトップは<tspan fill="#F59E0B">復元ソフト</tspan>を買わせる</text>
  </g>

  <use href="#keeply-lockup" x="120" y="790" width="200" height="50"/>

  <g transform="translate(820, 120)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="340" height="320" rx="28" fill="#ffffff"/>
    <rect x="0" y="0" width="340" height="320" rx="28" fill="none" stroke="#C7D2FE" stroke-width="2"/>
    <rect x="0" y="0" width="340" height="56" rx="28" fill="url(#grad-indigo-deep)"/>
    <rect x="0" y="28" width="340" height="28" fill="url(#grad-indigo-deep)"/>
    <text x="170" y="36" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">iOS · 写真</text>
    <text x="20" y="92" font-size="20" font-weight="800" fill="#312E81">最近削除した項目</text>
    <text x="295" y="92" font-size="14" font-weight="600" fill="#4338CA" opacity="0.65">(24)</text>
    <circle cx="318" cy="105" r="11" fill="#059669"/>
    <path d="M312 105 L317 110 L324 101" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g font-family="'JetBrains Mono',monospace" font-size="13" fill="#4338CA">
      <rect x="20" y="120" width="300" height="36" rx="6" fill="#F8F7FF"/>
      <rect x="32" y="130" width="16" height="16" fill="#C7D2FE"/>
      <text x="60" y="142">IMG_2025_05_04.jpg</text>
      <text x="280" y="142" fill="#9C98FF" font-size="11">残り28日</text>

      <rect x="20" y="166" width="300" height="36" rx="6" fill="#F8F7FF"/>
      <rect x="32" y="176" width="16" height="16" fill="#C7D2FE"/>
      <text x="60" y="188">IMG_2025_04_28.jpg</text>
      <text x="280" y="188" fill="#9C98FF" font-size="11">残り23日</text>

      <rect x="20" y="212" width="300" height="36" rx="6" fill="#F8F7FF"/>
      <rect x="32" y="222" width="16" height="16" fill="#C7D2FE"/>
      <text x="60" y="234" font-size="11">Note_顧客プレゼン下書き.txt</text>
      <text x="280" y="234" fill="#9C98FF" font-size="11">残り12日</text>
    </g>
    <text x="20" y="285" font-size="13" font-weight="600" fill="#059669">✓ 内蔵の復元ボタン、ソフト不要</text>
  </g>

  <g transform="translate(820, 470)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="540" height="320" rx="12" fill="#ffffff"/>
    <rect x="0" y="0" width="540" height="320" rx="12" fill="none" stroke="#C7D2FE" stroke-width="2"/>
    <rect x="0" y="0" width="540" height="38" rx="12" fill="#E0E7FF"/>
    <rect x="0" y="20" width="540" height="18" fill="#E0E7FF"/>
    <circle cx="20" cy="19" r="6" fill="#DC2626" opacity="0.5"/>
    <circle cx="40" cy="19" r="6" fill="#FFB300" opacity="0.5"/>
    <circle cx="60" cy="19" r="6" fill="#059669" opacity="0.5"/>
    <text x="270" y="25" font-size="13" font-weight="700" fill="#312E81" text-anchor="middle">Finder</text>
    <rect x="0" y="38" width="160" height="282" rx="0" fill="#F8F7FF"/>
    <g font-size="12" fill="#4338CA" opacity="0.85">
      <text x="20" y="68" font-weight="700" fill="#312E81">よく使う項目</text>
      <text x="20" y="92">デスクトップ</text>
      <text x="20" y="116">書類</text>
      <text x="20" y="140">ダウンロード</text>
      <text x="20" y="164">ムービー</text>
      <text x="20" y="188" font-weight="700" fill="#312E81">場所</text>
      <text x="20" y="212">Macintosh HD</text>
      <text x="20" y="236">iCloud Drive</text>
    </g>
    <g transform="translate(180, 80)">
      <text x="0" y="0" font-size="16" font-weight="700" fill="#312E81">最近の項目</text>
      <text x="0" y="24" font-size="12" fill="#4338CA" opacity="0.7">最近使ったフォルダ、最近開いたファイル...</text>
      <g transform="translate(0, 60)">
        <rect x="0" y="0" width="320" height="56" rx="8" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4" fill="#FEE2E2" opacity="0.4"/>
        <text x="16" y="28" font-size="15" font-weight="700" fill="#DC2626">最近削除した項目</text>
        <text x="16" y="48" font-size="12" font-weight="600" fill="#DC2626" opacity="0.85">— このオプションは存在しない —</text>
        <circle cx="296" cy="28" r="14" fill="#DC2626"/>
        <path d="M289 21 L303 35 M303 21 L289 35" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(0, 140)">
        <rect x="0" y="0" width="320" height="60" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
        <text x="14" y="24" font-size="13" font-weight="700" fill="#F59E0B">だから検索する：</text>
        <text x="14" y="46" font-size="14" font-weight="800" fill="#312E81" font-family="'JetBrains Mono',monospace">"Disk Drill 価格"</text>
      </g>
    </g>
  </g>

  <g transform="translate(820, 820)">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#4338CA" opacity="0.72" letter-spacing="1">iOS · iCloud · Outlook は内蔵　·　Finder にはない</text>
  </g>

</svg>
