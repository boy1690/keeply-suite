<!-- Image 3: CLOUD「Latest同步」vs Keeply「History保留無上限」對比 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/><stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <text x="600" y="48" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">Cloud · vs · KEEPLY · history-length difference</text>

  <!-- LEFT: CLOUD 30-day history -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <rect width="500" height="430" rx="10" fill="#ffffff" stroke="url(#g-teal)" stroke-width="2"/>
    <rect width="500" height="42" rx="10" fill="url(#g-teal)"/>
    <rect y="28" width="500" height="14" fill="url(#g-teal)"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">Cloud tool — latest + 30-day history</text>

    <text x="250" y="84" font-size="14" font-weight="700" fill="#14B8A6" text-anchor="middle" letter-spacing="2">Dropbox / iCloud / OneDrive / Google Drive</text>

    <!-- 30-day timeline -->
    <g transform="translate(60, 120)" font-family="system-ui,sans-serif">
      <!-- timeline bar -->
      <rect x="0" y="40" width="380" height="40" rx="4" fill="#F0FDFA" stroke="#14B8A6"/>

      <!-- 標Today -->
      <g transform="translate(360, 60)">
        <line x1="0" y1="-26" x2="0" y2="-4" stroke="#14B8A6" stroke-width="2"/>
        <circle cx="0" cy="-30" r="4" fill="#14B8A6"/>
        <text x="0" y="-38" font-size="11" font-weight="700" fill="#14B8A6" text-anchor="middle">Today</text>
      </g>

      <!-- 30 days ago -->
      <g transform="translate(20, 60)">
        <line x1="0" y1="26" x2="0" y2="50" stroke="#DC2626" stroke-width="2" stroke-dasharray="3 3"/>
        <text x="0" y="68" font-size="11" font-weight="700" fill="#DC2626" text-anchor="middle">30 days ago</text>
        <text x="0" y="84" font-size="10" font-weight="500" fill="#DC2626" text-anchor="middle">↑ cut off</text>
      </g>

      <!-- 30 days marker fade -->
      <g font-size="10" font-weight="500" fill="#312E81" opacity="0.55">
        <text x="120" y="56" text-anchor="middle">3 weeks ago</text>
        <text x="220" y="56" text-anchor="middle">2 weeks ago</text>
        <text x="300" y="56" text-anchor="middle">1 week ago</text>
      </g>

      <!-- 之前的History (chopped off) -->
      <g transform="translate(0, 110)">
        <rect width="380" height="100" rx="6" fill="#FEE2E2" opacity="0.4"/>
        <text x="190" y="38" font-size="13" font-weight="700" fill="#DC2626" text-anchor="middle">Version from 3 months ago?</text>
        <text x="190" y="64" font-size="14" font-weight="900" fill="#DC2626" text-anchor="middle">A U T O - D E L E T E D</text>
        <text x="190" y="86" font-size="11" font-weight="500" fill="#DC2626" text-anchor="middle" opacity="0.85">History older than 30 days not kept</text>
      </g>

      <!-- 跨裝置 sync hint -->
      <text x="190" y="248" font-size="12" font-weight="600" fill="#14B8A6" text-anchor="middle">Latest · sync · multi-device</text>
      <text x="190" y="272" font-size="11" font-weight="500" fill="#312E81" opacity="0.7" text-anchor="middle">This is the cloud tool's job</text>
    </g>

    <text x="250" y="412" font-size="12" font-weight="600" fill="#312E81" text-anchor="middle">Sync the latest copy across devices</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(595, 320)">
    <circle cx="0" cy="0" r="32" fill="url(#g-amber)" filter="url(#shadow)"/>
    <text x="0" y="6" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">VS</text>
  </g>

  <!-- RIGHT: Keeply 無上限History -->
  <g transform="translate(620, 100)" filter="url(#shadow)">
    <rect width="500" height="430" rx="10" fill="#ffffff" stroke="url(#g-amber)" stroke-width="2"/>
    <rect width="500" height="42" rx="10" fill="url(#g-amber)"/>
    <rect y="28" width="500" height="14" fill="url(#g-amber)"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">Keeply — no limit on history length</text>

    <text x="250" y="84" font-size="14" font-weight="700" fill="url(#g-amber)" text-anchor="middle" letter-spacing="2">Every change · all kept</text>

    <!-- timeline 無上限 -->
    <g transform="translate(60, 120)" font-family="system-ui,sans-serif">
      <rect x="0" y="40" width="380" height="40" rx="4" fill="#FFFBEB" stroke="url(#g-amber)" stroke-width="1.5"/>

      <!-- 標Today -->
      <g transform="translate(360, 60)">
        <line x1="0" y1="-26" x2="0" y2="-4" stroke="url(#g-amber)" stroke-width="2"/>
        <circle cx="0" cy="-30" r="4" fill="url(#g-amber)"/>
        <text x="0" y="-38" font-size="11" font-weight="700" fill="url(#g-amber)" text-anchor="middle">Today</text>
      </g>

      <!-- 6 months ago -->
      <g transform="translate(140, 60)">
        <circle cx="0" cy="20" r="3" fill="url(#g-amber)" opacity="0.85"/>
        <text x="0" y="50" font-size="10" font-weight="600" fill="#312E81" text-anchor="middle" opacity="0.85">6 months ago</text>
      </g>

      <!-- 1 year ago -->
      <g transform="translate(60, 60)">
        <circle cx="0" cy="20" r="3" fill="url(#g-amber)" opacity="0.7"/>
        <text x="0" y="50" font-size="10" font-weight="600" fill="#312E81" text-anchor="middle" opacity="0.7">1 year ago</text>
      </g>

      <!-- Start -->
      <g transform="translate(20, 60)">
        <line x1="0" y1="-26" x2="0" y2="-4" stroke="url(#g-amber)" stroke-width="2" stroke-dasharray="3 3"/>
        <text x="0" y="-30" font-size="10" font-weight="700" fill="url(#g-amber)" text-anchor="middle">Start</text>
      </g>

      <!-- 之前的History（保留） -->
      <g transform="translate(0, 110)">
        <rect width="380" height="100" rx="6" fill="#D1FAE5" opacity="0.5"/>
        <text x="190" y="38" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">Version from 3 months ago?</text>
        <text x="190" y="64" font-size="14" font-weight="900" fill="#059669" text-anchor="middle">S T I L L  H E R E</text>
        <text x="190" y="86" font-size="11" font-weight="500" fill="#059669" text-anchor="middle" opacity="0.85">Never auto-deleted · only deleted when you do</text>
      </g>

      <!-- 主功能 hint -->
      <text x="190" y="248" font-size="12" font-weight="600" fill="url(#g-amber)" text-anchor="middle">Every version · kept forever</text>
      <text x="190" y="272" font-size="11" font-weight="500" fill="#312E81" opacity="0.7" text-anchor="middle">Local storage · you're in control</text>
    </g>

    <text x="250" y="412" font-size="12" font-weight="600" fill="#312E81" text-anchor="middle">Want to recover a version from 3 months ago</text>
  </g>

  <text x="600" y="568" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">Cloud holds the latest · KEEPLY holds the history · together they're complete</text>

</svg>
