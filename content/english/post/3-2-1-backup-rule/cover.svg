<!-- =============================================================
     Cover: 3-2-1-backup-rule (universal English, 5 launch locales)
     Kit version: 0.1
     Recipe: cost-hero — hero number + ironic file cards
     Layout: 左 hero「3-2-1」+ 右 3 張同名 file card（3 backups, all wrong）
     設計核心: 1985 → 2005 校正後，hero 數字 3-2-1 + tagline
              「20 YEARS UNCHANGED. YOUR PAIN MOVED.」
              右側 3 張 file card 全是 proposal_v7_FINAL.psd
              視覺諷刺：3 份備份保護了同一個錯版。
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>

    <symbol id="doc-icon-amber" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="url(#grad-amber)" opacity="0.95"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#FFB300" opacity="0.7"/>
    </symbol>

    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <!-- Eyebrow top -->
  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">BACKUP STRATEGY · EDITORIAL</text>
  </g>

  <!-- Hero number "3-2-1" -->
  <g transform="translate(120, 360)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="280" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-12">3-2-1</text>
  </g>

  <!-- Hero subtitle (amber accent on "PAIN MOVED") -->
  <g transform="translate(120, 480)">
    <text x="0" y="0" font-size="34" font-weight="800" fill="#312E81" letter-spacing="0.5">20 YEARS UNCHANGED.</text>
    <text x="0" y="48" font-size="34" font-weight="800" fill="#312E81" letter-spacing="0.5">YOUR <tspan fill="#F59E0B">PAIN MOVED</tspan>.</text>
  </g>

  <!-- Right side: 3 file cards (visual irony) -->
  <g transform="translate(960, 230)">
    <!-- Card 1 -->
    <g transform="translate(0, 0)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="20" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_v7_FINAL.psd</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">LATEST</text>
    </g>
    <!-- Card 2 -->
    <g transform="translate(0, 90)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="20" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_v7_FINAL.psd</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">LATEST</text>
    </g>
    <!-- Card 3 -->
    <g transform="translate(0, 180)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="20" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">proposal_v7_FINAL.psd</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">LATEST</text>
    </g>

    <!-- Card group annotation -->
    <g transform="translate(0, 290)">
      <text x="0" y="0" font-size="16" font-weight="600" fill="#4338CA" opacity="0.7" letter-spacing="0.5">3 backups · all the wrong version</text>
    </g>
  </g>

  <!-- Bottom subtitle (universal English) -->
  <g transform="translate(120, 720)">
    <text x="0" y="0" font-size="30" font-weight="700" fill="#312E81">What it covers,</text>
    <text x="0" y="42" font-size="30" font-weight="700" fill="#312E81">what it <tspan fill="#F59E0B">misses</tspan>.</text>
  </g>

  <!-- Bottom note (metadata, all caps tracking) -->
  <g transform="translate(120, 845)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="2">PETER KROGH · 2005 → 2026 · BACKUP RULE EXPLAINED</text>
  </g>

  <!-- Keeply lockup bottom-right -->
  <use href="#keeply-lockup" x="1280" y="810" width="200" height="50"/>

  <!-- Metadata corner -->
  <g transform="translate(1480, 875)">
    <text x="0" y="0" font-size="11" font-weight="500" fill="#4338CA" opacity="0.45" letter-spacing="1.5" text-anchor="end">P1 CLUSTER / 5 LOCALES · 2026</text>
  </g>

</svg>
