<!-- Image 1: 30  features勾選清單 vs 「拖進去就好」對比視覺 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none"
     font-family="'Inter','SF Pro Display',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#4338CA" stroke-width="1" opacity="0.05"/>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.14"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#g-paper)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Top label -->
  <text x="600" y="48" font-size="13" font-weight="800" fill="#312E81" text-anchor="middle" letter-spacing="3">Traditional onboarding · vs · just drag it in</text>

  <!-- LEFT: 30 功能勾選清單 -->
  <g transform="translate(80, 90)" filter="url(#shadow)">
    <rect width="460" height="430" rx="10" fill="#ffffff"/>
    <rect width="460" height="46" rx="10" fill="url(#g-indigo)"/>
    <rect y="32" width="460" height="14" fill="url(#g-indigo)"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">Traditional software — 30 features</text>

    <g transform="translate(28, 70)" font-family="system-ui,sans-serif">
      <g>
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Sign up + verify email</text>
      </g>
      <g transform="translate(0, 36)">
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Set cloud sync preferences</text>
      </g>
      <g transform="translate(0, 72)">
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Create workspace + invite team</text>
      </g>
      <g transform="translate(0, 108)">
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Set permissions / roles</text>
      </g>
      <g transform="translate(0, 144)">
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Configure backup schedule + retention rules</text>
      </g>
      <g transform="translate(0, 180)">
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Learn keyboard shortcuts</text>
      </g>
      <g transform="translate(0, 216)">
        <rect x="0" y="0" width="22" height="22" rx="3" fill="none" stroke="#6F6AF0" stroke-width="2"/>
        <text x="36" y="17" font-size="14" fill="#312E81">Read docs chapters 1-3</text>
      </g>
      <g transform="translate(0, 252)" opacity="0.55">
        <text x="0" y="17" font-size="13" fill="#6F6AF0" font-weight="500">+ 23 more features...</text>
      </g>
      <!-- 14 天 negative tag -->
      <g transform="translate(0, 290)">
        <rect width="180" height="32" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
        <text x="90" y="22" font-size="13" font-weight="700" fill="#DC2626" text-anchor="middle">14 days before value</text>
      </g>
    </g>
  </g>

  <!-- VS divider -->
  <g transform="translate(600, 290)">
    <circle cx="0" cy="0" r="32" fill="url(#g-amber)" filter="url(#shadow)"/>
    <text x="0" y="6" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">VS</text>
  </g>

  <!-- RIGHT: 2  actions -->
  <g transform="translate(660, 90)" filter="url(#shadow)">
    <rect width="460" height="430" rx="10" fill="#ffffff" stroke="url(#g-amber)" stroke-width="2"/>
    <rect width="460" height="46" rx="10" fill="url(#g-amber)"/>
    <rect y="32" width="460" height="14" fill="url(#g-amber)"/>
    <text x="20" y="30" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">Keeply — 2 actions</text>

    <g transform="translate(28, 90)" font-family="system-ui,sans-serif">
      <!-- Action 1 -->
      <g>
        <circle cx="20" cy="20" r="20" fill="url(#g-indigo)"/>
        <text x="20" y="26" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">1</text>
        <text x="56" y="18" font-size="18" font-weight="700" fill="#312E81">Drag one folder into Keeply</text>
        <text x="56" y="40" font-size="13" font-weight="500" fill="#4338CA" opacity="0.7">No renaming, no categorizing, no structuring</text>
      </g>

      <!-- Action 2 -->
      <g transform="translate(0, 90)">
        <circle cx="20" cy="20" r="20" fill="url(#g-indigo)"/>
        <text x="20" y="26" font-size="18" font-weight="900" fill="#ffffff" text-anchor="middle">2</text>
        <text x="56" y="18" font-size="18" font-weight="700" fill="#312E81">Keep doing today's work</text>
        <text x="56" y="40" font-size="13" font-weight="500" fill="#4338CA" opacity="0.7">Edit, save, delete and redo — all fine</text>
      </g>

      <!-- Result stamp -->
      <g transform="translate(0, 220)">
        <rect width="404" height="56" rx="8" fill="#FFFBEB" stroke="url(#g-amber)" stroke-width="2"/>
        <text x="202" y="24" font-size="13" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">Result</text>
        <text x="202" y="46" font-size="17" font-weight="800" fill="url(#g-amber)" text-anchor="middle">On board on day 1</text>
      </g>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="568" font-size="14" font-weight="700" fill="#312E81" text-anchor="middle" letter-spacing="2">Two paths · same destination · 13 days apart</text>

</svg>
