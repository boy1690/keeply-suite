<!-- =============================================================
     Cover: photoshop-autosave-not-version-history (it)
     Recipe: cost-hero — big "0" = autosave folder count for today
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>

    <symbol id="doc-icon-amber" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="url(#grad-amber)" opacity="0.95"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#FFB300" opacity="0.7"/>
    </symbol>

    <symbol id="doc-icon-gray" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="#94A3B8" opacity="0.6"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#94A3B8" opacity="0.4"/>
    </symbol>

    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">GESTIONE VERSIONI FILE · EDITORIAL</text>
  </g>

  <g transform="translate(120, 380)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="320" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-12">0</text>
  </g>

  <g transform="translate(280, 320)">
    <text x="0" y="0" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">File nella cartella autosave</text>
    <text x="0" y="46" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">di Photoshop <tspan fill="#F59E0B">di oggi</tspan>.</text>
  </g>

  <g transform="translate(960, 230)">
    <g transform="translate(0, 0)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFFFF" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="#94A3B8" rx="2"/>
      <use href="#doc-icon-gray" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="18" font-weight="700" fill="#475569" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">recovery_2025-05-04.psb</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1.5">sessione precedente</text>
    </g>
    <g transform="translate(0, 90)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFFFF" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="#94A3B8" rx="2"/>
      <use href="#doc-icon-gray" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="18" font-weight="700" fill="#475569" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">recovery_2025-05-03.psb</text>
      <text x="430" y="44" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1.5">sessione precedente</text>
    </g>
    <g transform="translate(0, 180)" filter="url(#soft-shadow)">
      <rect width="500" height="70" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="70" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="17" width="32" height="36"/>
      <text x="72" y="44" font-size="18" font-weight="700" fill="#312E81" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">_today_(missing).psb</text>
      <text x="408" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">oggi: mai scritto</text>
    </g>

    <g transform="translate(0, 290)">
      <text x="0" y="0" font-size="16" font-weight="600" fill="#4338CA" opacity="0.7" letter-spacing="0.5">Cmd+S non è un crash · l'autosave non scatta</text>
    </g>
  </g>

  <g transform="translate(1320, 820)">
    <use href="#keeply-lockup" width="200" height="50"/>
  </g>

  <g transform="translate(120, 840)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#4338CA" opacity="0.6" letter-spacing="1.5">P1 CLUSTER · 6 LOCALES · l'autosave non è cronologia delle versioni</text>
  </g>
</svg>
