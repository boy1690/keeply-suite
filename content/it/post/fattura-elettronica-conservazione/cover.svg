<!-- =============================================================
     Cover: fattura-elettronica-conservazione (it master)
     Recipe: cost-hero — big "3" = 3 strati per arrivare al 2036
     ============================================================= -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none"
     font-family="'Inter',system-ui,sans-serif">

  <defs>
    <linearGradient id="grad-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB300"/><stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="grad-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F7FF"/><stop offset="1" stop-color="#E4E3FF"/>
    </linearGradient>

    <symbol id="doc-icon-indigo" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="url(#grad-indigo)" opacity="0.92"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#4338CA" opacity="0.7"/>
    </symbol>

    <symbol id="doc-icon-amber" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="url(#grad-amber)" opacity="0.95"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#FFB300" opacity="0.7"/>
    </symbol>

    <symbol id="doc-icon-gray" viewBox="0 0 32 36">
      <path d="M2 0 L20 0 L30 10 L30 36 L2 36 Z" fill="#94A3B8" opacity="0.5"/>
      <path d="M20 0 L30 10 L20 10 Z" fill="#94A3B8" opacity="0.35"/>
    </symbol>

    <symbol id="keeply-lockup" viewBox="0 0 200 50">
      <circle cx="22" cy="25" r="16" fill="url(#grad-indigo)"/>
      <path d="M16 18 L16 32 M16 25 L26 18 M16 25 L26 32" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <text x="48" y="33" font-size="22" font-weight="800" fill="#312E81">Keeply</text>
    </symbol>

    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
    <filter id="hero-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#312E81" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#grad-paper)"/>

  <!-- Top eyebrow -->
  <g transform="translate(120, 100)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#4338CA" letter-spacing="3">CONSERVAZIONE FISCALE · EDITORIAL</text>
  </g>

  <!-- Big hero number "3" -->
  <g transform="translate(120, 470)" filter="url(#hero-shadow)">
    <text x="0" y="0" font-size="320" font-weight="900" fill="url(#grad-indigo)" letter-spacing="-12">3</text>
  </g>

  <!-- Subtitle to the right of the number -->
  <g transform="translate(290, 320)">
    <text x="0" y="0" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">strati per leggere</text>
    <text x="0" y="46" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">le tue fatture</text>
    <text x="0" y="92" font-size="32" font-weight="800" fill="#312E81" letter-spacing="0.5">nel <tspan fill="#F59E0B">2036</tspan>.</text>
  </g>

  <!-- Three layered cards on right: SaaS / AdE / Local XML -->
  <g transform="translate(960, 230)">
    <!-- Strato 1: SaaS (most fragile) -->
    <g transform="translate(0, 0)" filter="url(#soft-shadow)">
      <rect width="500" height="100" fill="#FFFFFF" rx="6"/>
      <rect x="0" y="0" width="6" height="100" fill="#94A3B8" rx="2"/>
      <use href="#doc-icon-gray" x="24" y="32" width="32" height="36"/>
      <text x="72" y="44" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="2">STRATO 1</text>
      <text x="72" y="74" font-size="20" font-weight="800" fill="#312E81">Gestionale SaaS</text>
      <text x="380" y="62" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1.5">fragile</text>
    </g>
    <!-- Strato 2: AdE 15 yr -->
    <g transform="translate(0, 120)" filter="url(#soft-shadow)">
      <rect width="500" height="100" fill="#FFFFFF" rx="6"/>
      <rect x="0" y="0" width="6" height="100" fill="#4338CA" rx="2"/>
      <use href="#doc-icon-indigo" x="24" y="32" width="32" height="36"/>
      <text x="72" y="44" font-size="13" font-weight="700" fill="#4338CA" letter-spacing="2">STRATO 2</text>
      <text x="72" y="74" font-size="20" font-weight="800" fill="#312E81">Agenzia Entrate · 15 anni</text>
      <text x="380" y="62" font-size="13" font-weight="700" fill="#4338CA" letter-spacing="1.5">gratuito</text>
    </g>
    <!-- Strato 3: Local XML (you control) -->
    <g transform="translate(0, 240)" filter="url(#soft-shadow)">
      <rect width="500" height="100" fill="#FFFBEB" rx="6"/>
      <rect x="0" y="0" width="6" height="100" fill="url(#grad-amber)" rx="2"/>
      <use href="#doc-icon-amber" x="24" y="32" width="32" height="36"/>
      <text x="72" y="44" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="2">STRATO 3</text>
      <text x="72" y="74" font-size="20" font-weight="800" fill="#312E81">FatturaPA XML locale</text>
      <text x="380" y="62" font-size="13" font-weight="700" fill="#F59E0B" letter-spacing="1.5">tuo controllo</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(120, 800)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#475569" letter-spacing="2">FATTURA ELETTRONICA · OBBLIGO 10 ANNI · DPR 633/72 + D.LGS. 471/1997</text>
  </g>

  <!-- Keeply lockup bottom-right -->
  <g transform="translate(1400, 825)">
    <use href="#keeply-lockup" x="0" y="0" width="200" height="50"/>
  </g>

</svg>
