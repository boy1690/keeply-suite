name: Deploy apps/website to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cf-pages-website"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/website/package-lock.json

      - name: Install npm deps
        working-directory: apps/website
        run: npm ci

      - name: Build (8-step pipeline)
        working-directory: apps/website
        # Fetches latest SHA-256 checksums from GitHub releases, compiles
        # Tailwind CSS, regenerates localized pages, injects JSON-LD, and
        # recomputes SRI hashes. Mirrors original keeply-website deploy.yml.
        run: npm run build

      # TEMPORARY diagnostic (Ahrefs RC-2): live zh-TW/compare/* ship UNHASHED JS
      # refs (404) though local builds + committed files are hashed. Pinpoint
      # whether CI fingerprint skips ../../ depth, or a later step breaks it.
      # REMOVE once root cause is found.
      - name: DEBUG RC-2 compare fingerprint (temporary)
        working-directory: apps/website
        run: |
          set +e
          echo "### node: $(node --version)"
          echo "### POST-BUILD zh-TW/compare/dropbox.html (../../  depth):"
          grep -oE '<script[^>]*src="[^"]*"' zh-TW/compare/dropbox.html
          echo "### POST-BUILD en compare/dropbox.html (../ depth):"
          grep -oE '<script[^>]*src="[^"]*"' compare/dropbox.html
          echo "### manifest consent-api entry:"
          grep -i 'consent-api' fingerprint-manifest.json
          echo "### re-run build:fingerprint (2nd idempotent pass):"
          node _dev/build-fingerprint.js | tail -2
          echo "### AFTER 2nd fingerprint pass, zh-TW/compare/dropbox.html:"
          grep -oE 'src="[^"]*consent-api[^"]*"' zh-TW/compare/dropbox.html
          echo "### total .html files under zh-TW/compare:"
          ls -1 zh-TW/compare/*.html | wc -l
          true

      - name: Stage deployable assets (exclude node_modules / dev tooling)
        run: |
          mkdir -p _stage_website
          # NOTE (spec 111): sri-manifest.json is NOT excluded — i18n-loader.js
          # fetches it at runtime to apply SRI to dynamically-injected i18n
          # packs. fingerprint-manifest.json IS build-only (inlined into
          # i18n-loader at build time) so it stays excluded.
          rsync -a \
            --exclude='node_modules' \
            --exclude='_dev' \
            --exclude='cloudflare/' \
            --exclude='package*.json' \
            --exclude='fingerprint-manifest.json' \
            --exclude='CLAUDE.md' \
            --exclude='KEEPLY_*.md' \
            --exclude='RELEASE_*.md' \
            --exclude='.git*' \
            apps/website/ _stage_website/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _stage_website --project-name=keeply-website --branch=main --commit-dirty=true
