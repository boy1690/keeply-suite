name: SEO Site Audit (crawl + Lighthouse)

on:
  schedule:
    # 1st of each month, 02:00 UTC = 10:00 Asia/Taipei. Full crawl + Lighthouse
    # is heavier than the weekly fetch — monthly cadence keeps runner minutes sane.
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Site to audit (default: https://blog.keeply.work/)"
        required: false
        default: "https://blog.keeply.work/"
      max_routes:
        description: "Max routes (pages) to crawl"
        required: false
        default: "200"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://blog.keeply.work/' }}
      MAX_ROUTES: ${{ github.event.inputs.max_routes || '200' }}
      OUT_DIR: ${{ github.workspace }}/.unlighthouse
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Unlighthouse (crawl + Lighthouse per page)
        run: |
          npx --yes unlighthouse-ci@latest \
            --site "$TARGET_URL" \
            --build-static \
            --reporter jsonExpanded \
            --output-path "$OUT_DIR"
        env:
          # `unlighthouse-ci` exits non-zero only on bad config; per-page
          # score failures are reported in the JSON. We let it propagate.
          UNLIGHTHOUSE_MAX_ROUTES: ${{ env.MAX_ROUTES }}

      - name: Summarise top issues
        id: summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT="$OUT_DIR/summary.md"
          REPORT_JSON="$OUT_DIR/ci-result.json"
          {
            echo "# SEO Site Audit — $DATE"
            echo ""
            echo "- **Target:** $TARGET_URL"
            echo "- **Max routes:** $MAX_ROUTES"
            echo "- **Tool:** [unlighthouse](https://unlighthouse.dev/)"
            echo ""
            if [ -f "$REPORT_JSON" ]; then
              echo "## Score summary"
              echo ""
              echo "\`\`\`"
              node -e "
                const r = require('$REPORT_JSON');
                const cats = ['performance','accessibility','best-practices','seo'];
                const rows = Array.isArray(r) ? r : (r.routes || []);
                if (!rows.length) { console.log('(no routes)'); process.exit(0); }
                const avg = c => Math.round(100 * rows.reduce((a,b)=>a+(b.score?.[c]??b.report?.categories?.[c]?.score??0),0)/rows.length);
                cats.forEach(c => console.log(c.padEnd(16), avg(c)));
              " 2>/dev/null || echo "(score parse failed — see ci-result.json)"
              echo "\`\`\`"
              echo ""
              echo "## Worst-scoring routes (SEO)"
              echo ""
              echo "\`\`\`"
              node -e "
                const r = require('$REPORT_JSON');
                const rows = Array.isArray(r) ? r : (r.routes || []);
                rows
                  .map(x => ({ url: x.url || x.route?.url, seo: x.score?.seo ?? x.report?.categories?.seo?.score ?? 0 }))
                  .filter(x => x.url)
                  .sort((a,b) => a.seo - b.seo)
                  .slice(0, 10)
                  .forEach(x => console.log((Math.round(100*x.seo)+'').padStart(3), x.url));
              " 2>/dev/null || echo "(parse failed)"
              echo "\`\`\`"
            else
              echo "_ci-result.json not produced — check workflow logs._"
            fi
            echo ""
            echo "Full HTML report + per-page JSON in artifact \`seo-audit-report\` (90-day retention)."
          } > "$REPORT"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-audit-report
          path: ${{ env.OUT_DIR }}
          retention-days: 90

      - name: Open GitHub Issue with summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "SEO audit — $DATE" \
            --body-file "${{ steps.summary.outputs.report }}" \
            --label seo-audit \
            --repo "${{ github.repository }}" \
            || echo "Issue creation failed (create label 'seo-audit' once if missing)"
