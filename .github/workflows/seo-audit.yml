name: SEO Site Audit (crawl + Lighthouse)

on:
  schedule:
    # 1st of each month, 02:00 UTC = 10:00 Asia/Taipei. Full crawl + Lighthouse
    # is heavier than the weekly fetch — monthly cadence keeps runner minutes sane.
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Override target (default: both sites via matrix)"
        required: false
        default: ""
      max_routes:
        description: "Max routes (pages) to crawl per site"
        required: false
        default: "200"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    # Two siblings — keeply.work (apex) + blog.keeply.work (sub). See
    # memory feedback_main_site_parity.md: treat them as one stack.
    strategy:
      fail-fast: false
      matrix:
        site:
          - name: blog
            url: https://blog.keeply.work/
          - name: main
            url: https://keeply.work/
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ github.event.inputs.target_url != '' && github.event.inputs.target_url || matrix.site.url }}
      MAX_ROUTES: ${{ github.event.inputs.max_routes || '200' }}
      OUT_DIR: ${{ github.workspace }}/unlighthouse-${{ matrix.site.name }}
      SITE_LABEL: ${{ matrix.site.name }}
    steps:
      - name: Skip when dispatch overrides target on non-blog matrix leg
        if: github.event.inputs.target_url != '' && matrix.site.name != 'blog'
        run: |
          echo "Manual dispatch override provided — only running on the 'blog' matrix leg to avoid duplicate audits."
          echo "SKIP=true" >> $GITHUB_ENV

      - name: Checkout
        if: env.SKIP != 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: env.SKIP != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run Unlighthouse (crawl + Lighthouse per page)
        if: env.SKIP != 'true'
        run: |
          npx --yes unlighthouse-ci@latest \
            --site "$TARGET_URL" \
            --build-static \
            --reporter jsonExpanded \
            --output-path "$OUT_DIR"
        env:
          UNLIGHTHOUSE_MAX_ROUTES: ${{ env.MAX_ROUTES }}

      - name: Summarise top issues
        if: env.SKIP != 'true'
        id: summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT="$OUT_DIR/summary.md"
          REPORT_JSON="$OUT_DIR/ci-result.json"
          {
            echo "# SEO Site Audit — $SITE_LABEL — $DATE"
            echo ""
            echo "- **Target:** $TARGET_URL"
            echo "- **Max routes:** $MAX_ROUTES"
            echo "- **Tool:** [unlighthouse](https://unlighthouse.dev/)"
            echo ""
            if [ -f "$REPORT_JSON" ]; then
              echo "## Category scores (avg across $MAX_ROUTES routes)"
              echo ""
              echo '```'
              node -e "
                const r = require('$REPORT_JSON');
                const cats = ['performance','accessibility','best-practices','seo'];
                cats.forEach(c => {
                  const s = r.summary?.categories?.[c]?.score ?? 0;
                  console.log(c.padEnd(16), Math.round(100 * s));
                });
              " 2>/dev/null || echo "(score parse failed — see ci-result.json)"
              echo '```'
              echo ""
              echo "## Core Web Vitals"
              echo ""
              echo '```'
              node -e "
                const r = require('$REPORT_JSON');
                const m = r.summary?.metrics || {};
                const show = (k, label) => console.log(label.padEnd(28), m[k]?.displayValue ?? '—');
                show('largest-contentful-paint', 'LCP');
                show('cumulative-layout-shift', 'CLS');
                show('first-contentful-paint', 'FCP');
                show('total-blocking-time', 'TBT');
                show('interactive', 'TTI');
              " 2>/dev/null || echo "(metrics parse failed)"
              echo '```'
              echo ""
              echo "## Worst-scoring routes (SEO)"
              echo ""
              echo '```'
              node -e "
                const r = require('$REPORT_JSON');
                (r.routes || [])
                  .map(x => ({ path: x.path, seo: x.categories?.seo?.score ?? 0 }))
                  .filter(x => x.path)
                  .sort((a,b) => a.seo - b.seo)
                  .slice(0, 10)
                  .forEach(x => console.log((Math.round(100*x.seo)+'').padStart(3), x.path));
              " 2>/dev/null || echo "(parse failed)"
              echo '```'
            else
              echo "_ci-result.json not produced — check workflow logs._"
            fi
            echo ""
            echo "Full HTML report + per-page JSON in artifact \`seo-audit-report-$SITE_LABEL\` (90-day retention)."
          } > "$REPORT"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Performance budget assertion
        if: env.SKIP != 'true' && always()
        id: budget
        continue-on-error: true
        run: |
          REPORT_JSON="$OUT_DIR/ci-result.json"
          [ -f "$REPORT_JSON" ] || { echo "no ci-result.json"; exit 0; }
          node -e "
            const r = require('$REPORT_JSON');
            // Thresholds (Web Vitals + Lighthouse scoring):
            //   performance avg ≥ 0.85, accessibility ≥ 0.90, best-practices ≥ 0.80, seo ≥ 0.90
            //   any route CLS p75 > 0.25 = breach
            //   any route LCP p75 > 4000ms = breach
            const T = { performance: 0.85, accessibility: 0.90, 'best-practices': 0.80, seo: 0.90 };
            const breaches = [];
            for (const [cat, min] of Object.entries(T)) {
              const score = r.summary?.categories?.[cat]?.score ?? 0;
              if (score < min) breaches.push(\`category \${cat}: \${Math.round(100*score)} < \${Math.round(100*min)}\`);
            }
            for (const route of (r.routes || [])) {
              const cls = route.categories?.['cumulative-layout-shift']?.score
                       ?? route.metrics?.['cumulative-layout-shift']?.numericValue;
              const lcp = route.metrics?.['largest-contentful-paint']?.numericValue;
              if (cls !== undefined && cls > 0.25) breaches.push(\`\${route.path} CLS \${cls.toFixed(3)} > 0.25\`);
              if (lcp !== undefined && lcp > 4000) breaches.push(\`\${route.path} LCP \${Math.round(lcp)}ms > 4000ms\`);
            }
            if (breaches.length) {
              console.log('BUDGET BREACHES:');
              for (const b of breaches) console.log('  - ' + b);
              process.exit(1);
            } else {
              console.log('All thresholds met.');
            }
          "

      - name: Append budget result to summary
        if: env.SKIP != 'true' && always()
        run: |
          REPORT="$OUT_DIR/summary.md"
          if [ "${{ steps.budget.outcome }}" = "failure" ]; then
            echo "" >> "$REPORT"
            echo "## 🚨 Performance budget breached" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "One or more thresholds did not meet the Web Vitals / Lighthouse SLA. See \"Performance budget assertion\" step log for the specific category / route." >> "$REPORT"
          fi

      - name: Upload audit artifact
        if: env.SKIP != 'true' && always()
        uses: actions/upload-artifact@v6
        with:
          name: seo-audit-report-${{ matrix.site.name }}
          path: ${{ env.OUT_DIR }}
          retention-days: 90

      - name: Open GitHub Issue with summary
        if: env.SKIP != 'true' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TITLE_PREFIX="SEO audit ($SITE_LABEL) — $DATE"
          if [ "${{ steps.budget.outcome }}" = "failure" ]; then
            TITLE_PREFIX="🚨 $TITLE_PREFIX (budget breach)"
          fi
          gh issue create \
            --title "$TITLE_PREFIX" \
            --body-file "${{ steps.summary.outputs.report }}" \
            --label seo-audit \
            --repo "${{ github.repository }}" \
            || echo "Issue creation failed (create label 'seo-audit' once if missing)"

      - name: Fail workflow if budget breached
        if: env.SKIP != 'true' && steps.budget.outcome == 'failure'
        run: |
          echo "::error::Performance budget breached for $SITE_LABEL — see Issue + Performance budget assertion step log"
          exit 1
