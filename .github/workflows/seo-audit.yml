name: SEO Site Audit (crawl + Lighthouse)

on:
  schedule:
    # 1st of each month, 02:00 UTC = 10:00 Asia/Taipei. Full crawl + Lighthouse
    # is heavier than the weekly fetch — monthly cadence keeps runner minutes sane.
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Site to audit (default: https://blog.keeply.work/)"
        required: false
        default: "https://blog.keeply.work/"
      max_requests:
        description: "Max pages to crawl"
        required: false
        default: "200"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://blog.keeply.work/' }}
      MAX_REQUESTS: ${{ github.event.inputs.max_requests || '200' }}
      OUT_DIR: /tmp/seo-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Chromium (for Lighthouse)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser
          echo "CHROME_PATH=$(which chromium-browser)" >> $GITHUB_ENV

      - name: Prepare output dir
        run: mkdir -p "$OUT_DIR"

      - name: Run site-audit-seo (crawl + Lighthouse)
        run: |
          npx --yes site-audit-seo@latest \
            -u "$TARGET_URL" \
            --lighthouse \
            --json \
            --csv \
            --xlsx \
            --max-requests "$MAX_REQUESTS" \
            --out-dir "$OUT_DIR" \
            --no-color \
            --remove-csv \
          || echo "site-audit-seo exited non-zero — keeping partial output"

      - name: Summarise top issues
        id: summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT=$OUT_DIR/summary.md
          {
            echo "# SEO Site Audit — $DATE"
            echo ""
            echo "- **Target:** $TARGET_URL"
            echo "- **Max pages:** $MAX_REQUESTS"
            echo "- **Tool:** [site-audit-seo](https://github.com/viasite/site-audit-seo)"
            echo ""
            echo "## Artifacts"
            echo ""
            ls -la "$OUT_DIR" | awk 'NR>1 {print "- `" $NF "`"}'
            echo ""
            echo "Full JSON / CSV / XLSX + Lighthouse reports attached as workflow artifact \`seo-audit-report\`."
            echo ""
            echo "## How to read"
            echo ""
            echo "Open the XLSX in the artifact — one row per crawled URL, columns include status code, title length, description length, h1 count, canonical, Lighthouse perf/SEO/accessibility scores. Filter \`status_code != 200\` first, then sort by Lighthouse SEO ascending."
          } > "$REPORT"
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-audit-report
          path: ${{ env.OUT_DIR }}
          retention-days: 90

      - name: Open GitHub Issue with summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "SEO audit — $DATE" \
            --body-file "${{ steps.summary.outputs.report }}" \
            --label seo-audit \
            --repo "${{ github.repository }}" \
            || echo "Issue creation failed (create label 'seo-audit' once if missing)"
